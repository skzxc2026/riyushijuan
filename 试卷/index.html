  <script>
    const DATA = {"exams": [{"id": "guangdong", "title": "广东省全国统一考试预测卷", "pages": [{"page": 1, "text": "绝密★启用前\n2026年普通高等学校招生全国统一考试预测卷 日  语\n(考试时间:120分钟;试卷满分:150分)\n注意事项：\n1. 答卷前，考生务必将自己的姓名、准考证号填写在答题卡上。\n2. 回答选择题时，选出每小题答案后，用铅笔把答题卡上对应题目的答案标号涂黑。如需改 动，用橡皮擦干净后，再选涂其它答案标号。回答非选择题时，将答案写在答题卡上。写在本试卷 上无效。\n3. 考试结束后，将本试卷和答题卡一并交回。\n第一部分  听力(共两节，满分30分)\n做题时，先将答案标在试卷上。录音内容结束后，你将有两分钟的时间将试卷 上的答案转涂到答题卡上。\n第一节  (共5小题;每小题1.5分,满分7.5分)\n听下面5段录音，每段录音后有1个小题，从A、B、C 三个选项中选出最佳选项。每段录音后， 都留有10秒钟的时间回答该小题和阅读下一小题。每段录音播放两遍。\n1. レストランはどこにありますか。\nA. 本屋の隣                 B.銀行の前               C. 駅の南口\n2. 参加者は何人になりそうです。\nA.22 人                    B.24 人                   C. 25 人\n3.        男の人はなぜ早く帰るようにしていますか。\nA.      疲れを取るため           B.       仕事が減ったため       C .試験の勉強をするため\n4.      二人はこれからどうしますか。\nA.       雨がやむまで家で待つ。\nB.       予定どおり映画を見に行く。\nC. 映画をやめて别の日にする。\n5.        正しいのはどれですか。\nA. コートは  来週安くなる可能性がある。\nB.       女の人は今日コートを買うことにした。\nC.       男の人はコートが似合わないと思っている。", "image": "ocr_pages/page-01.png"}, {"page": 2, "text": "日语试题  第1页(共10页)\n\n第二节  (共15小题；每小题1.5分，满分22.5分)\n听下面5段录音,每段录音后有3个小题,从A、B、C 三个选项中选出最佳选项。听每段录音 前，你将有时间阅读各个小题，每小题5秒钟；听完后，每小题给出5秒钟的作答时间。 每段录音 播放两遍。\n听下面的录音，回答第6至8题。\n6.         女の人はなぜ急いですか。\nA .電 車 が 遅れたから         B.       忘れ物に気づいたから    C.        会議が早く始まったから\n7.        女の人が忘れたものは何ですか。\nA. 名刺                      B.     资料                      C. 携 带\n8.        女の人は最終的にどうしますか。\nA.     一度家に戻る。          B. 会議を欠席する。           C.       会議の開始まで待つ。\n听下面的录音，回答第9至11题。\n9.        女の人は何を予約しましたか。\nA. 病 院                      B. 美容室                  C. レス 卜ラン\n10.          女の人はなぜ予約時間を変更しましたか。\nA.店が混んでいたから      B.       体調が悪くなったから    C.        急に用事ができたから\n11.          変更後の予約時間はいつですか。\nA.午前10時              B. 午 後 1 時                C. 午 後 2 時 听下面的录音，回答第12至14题。\n12.          女の人はなぜ図書館で勉強することが多いです;\nA.      家に近くて便利だから\nB.      静かで資料が使えるから\nC. いつも 席が空いているから\n13.          女の人は一回にどのくらい勉強しますか。\nA.1 時間 < らい            B.2 時間くらい            C . 3時間以上\n14.          女の人が集中するためにしていることは何ですか。\nA. 携带を見ないようにする。\nB. 音楽を聞きながら勉強する。\nC. 勉強の後で必ず友達と話す。", "image": "ocr_pages/page-02.png"}, {"page": 3, "text": "日语试题 第2页(共10页)\n\n听下面的录音，回答第15至17题。\n15. ハムスターの現在の様子はどれですか。\nA. すでに  手に慣れていて活発だ。\nB.       昼も夜も活発に動き回っている。\nC. まだ   怖がるが、人の手に乗ることもある。\n16.          女の人が夜にしていることはどれですか。\nA.ハムスターと遊んでいる。\nB.       様子を見るだけにしている。\nC.運動させるようにしている。\n17.          女の人が特に気をつけていることは何ですか。\nA.       毎日同じ時間に触ること\nB.       生活リズムを崩さないこと\nC.運動の時間を長くすること  听下面的录音，回答第18至20题。\n18. この教室はどんな教室ですか。\nA.       子ども向けの科学教室\nB. 図書館の職員を育てる教室\nC. 実験道具の使い方を学ぶ教室\n19.        教室の先生は誰ですか。\nA. 図書館の職員            B. 地域の科学者            C. 小学生の保護者\n20. この教室について正しいのはどれですか。\nA.       教室は平日に行われている。\nB. 空気や水の性質について学んでいる。\nC.       実験の前に、子どもたちが説明をする。\n第二部分  阅读(共20小题；每小题2.5分，满分50分)\n阅读下列短文，从每题所给的A、B、C、D四个选项中选出最佳选项。\n(一)\n人と接するとき、円滑なコミュニケーションを妨げる最大の原因は、意外にも「自分は相手 の話をきちんと聞けている」という錯觉である。多くの人は、うなずいたり簡単な返事をした りすれば、十分に話を理解していると思いがちだ。\nしかし、その態度だけでは、本当に相手の考えや気持ちを理解できているとは限らない。\n\n自分の価値観や経験を無意識に優先してしまうと、相手が伝えたい大切な部分を見落として しまうことも少なくない。さらに、言葉の表面だけを追って聞くと、相手の気持ちや背景を 十分に読み取る余裕がなくなり、意図しないすれ違いが生まれやすくなる。\n( ア ) 、 相手の意図が「まだよくわからない」と感じるとき、人は逆に真剣に耳を傾け、 質問したり確認したりするようになる。理解できない状態は、自然に注意を集中させ、相手 の話をより深く受け止める力を引き出すのだ。\nそのため、話を一度聞いて「わかった」と思い込むことほど危険なことはない。実際には理 解が浅く、相手の本当の気持ちや意図を十分に汲み取れていない場合が多いのである。した がって、私たちは一つひとつの言葉を丁寧に受け止め、相手の考えや気持ちを正しく理解す るよう努めなければならない。\n自分の中にある「聞けているつもり」という状態を見直すことこそ、相手との本当的理解に 近づく大切な一歩である。\n21.         文中の「その態度」とはどんな態度か。\nA.       相手の話を深く理解しようとする態度\nB. 相手に質問したり確認したりする態度\nC.        相手の話を聞いたつもりになってしまう態度\nD. 相手の表情だけを見て判断しようとする態度\n22.    文中の(ア)に入れるのに最も適当なものはどれか。\nA.一方          B. または             C. つまり              D. たとえば\n23. 文中の「理解できない状態」は人にどんな影響があるか。\nA.       自分の考えに固執し、相手の意図を無視してしまう。\nB.       真剣に耳を傾け、質問や確認をする行動を引き出す。\nC.       会話の途中で興味を失い、話を早く終わらせたくなる。\nD.       表面的な反応だけで満足し、深く理解することができない。\n24.         文中の「危険なこと」 とは何のことか。\nA.       浅い理解なのに理解できたと考えること\nB.        会話の途中で相手の話を遮ってしまうこと\nC.       相手の話を聞かずに結論だけ急いで出すこと\nD.       自分の経験だけで相手を理解しようとすること\n25. この文章で筆者が最も言いたいことはどれか。\nA. 理解できない話は無理に聞き続ける必要はない。", "image": "ocr_pages/page-03.png"}, {"page": 4, "text": "日语试题 第4页(共10页)\n\nB.       会話では自分の価値観を積極的に主張すべきである。\nC.       相手より先に自分の意見を述べて会話を進めるべきである。\nD.       相手の言葉を丁寧に受け止めて理解することが大切である。\n(二)\n冬になると、高校の教室では「パチッ」 という小さな音があちこちで聞こえる。ドアノブ(门 把手)に触れただけで指が痛くなったり、友だちの肩に手を置くと火花が出たりする。寒さよ りも前に、静電気で目が覚める朝もある。高校生には少し困るが、思わず笑ってしまう季節 の出来事である。\nわがクラスには、特に静電気が起きやすい生徒がいる。上着を脱ぐたびに「パチッ」と音が して、近くの人が驚 く。黒板を消すときでさえ、チョークの粉が軽く跳ねて、周りの生徒が 笑う。本人は真面目な顔で「またか......」と言うが、その様子がかえってみんなを笑わせる。\nある休み時間、その生徒はぼそっと(小声地)「なんで僕だけ毎日こんなにパチパチするんだ ろう」と呟いた。すると、友だちが「冬は空気が乾燥しているからだよ。心まで乾かさないよ うに気をつけろ」 と軽く冗談を言った。教室の空気がぱっと明るくなり、みんなが笑った。\n静電気は空気が乾燥すると起きやすい。しかし、人間関係は少し違う。心が乾いてしまう と、人と衝突することが増える。(ア)、毎日の小さな会話や、くだらない冗談が教室の 雰囲気を柔らかくしてくれるのだと思う。\n痛い静電気の一瞬も、笑いに変えられれば、人との距離は缩まる。もし今日、静電気で痛 い思いをした高校生がいたら、その瞬間だけでも、近くにいる友だちの顔を思い出してみよ う。小さな火花が、むしろ心を温めてくれるかもしれない。\n26.          文中の「パチッ」という音は何の音を指すか。\nA.静電気が発生する音                    B. 友だちが手を叩いた音\nC. チョークの  粉が跳ねる音                  D. ドアノブに  触れたときの音\n27.         文中に「驚く」とあるが、なぜ驚くか。\nA.       触れた瞬間に火花が見えるから          B. 上着を脱ぐたびに音が鳴るから\nC.       黒板を消すたびに粉が跳ねるから         D. 教室の中で音が続けて起きるから\n28.         文中に「心まで乾かさないように気をつけろ」 とあるが、なぜそう言ったか。\nA. 冬は寒さで体調を崩しやすいから        B.       冬の勉強は集中力が続かないから\nC. 教室の空気を加湿する必要があるから    D.       心が乾くと人と衝突しやすくなるか\n29.     文中の (ア)  に入れるのに最も適当なものはどれか。\nA. それでも        B. それでは           C. ところで           D. だからこそ\n\n30.          文中に「小さな火花が、むしろ心を温めてくれる」 とあるが、なぜそう言うか。\nA.      冬の寒さを忘れられるから                B.        教室全体が明るくなるから\nC.      痛い瞬間が笑いに変わるから              D.       何気ない会話が続いていくから (三)\n先日、駅の階段を上っていると、手すり(扶手)のところに一枚の小さなメモが貼られてい た。「落とし物です。心当たりの方は駅員さんへ」と丁寧に書かれ、横には拾った人のイニシャ ル(姓名首字母缩写)もあった。私は思わ ずその紙に見入った。\n日本では、落とし物を見つけたら届けることが一般的だ。しかし、必ず持ち主が見つかる わけではないのに、多くの人が当たり前のように届けている。その習慣の背景には、どんな 理由があるのだろうか。\nちょうどそのとき、近くで女子高生がイヤホンを拾った。しばらく迷っていたが、最後には 駅員室の方へ歩き出した。きっと「誰かが困っているかもしれない」という想像が彼女を動か したのだろう。このような「見えない他人」を思いやる想像力こそ、日本の公共空間を支えて きた大切な要素なのかもしれない。信号を守ることも、列に並ぶことも、落とし物を届ける ことも、その多くは誰かのための行動である。\n一方で、最近は「自分さえ良ければいい」という態度も目立ち始めている。SNSでは、電車 内でのマナ一違反を撮影して晒し、炎上につながることもある。人を批判する前に、自分の 行動を見つめ直す余裕はどれほどあるのだろうか。\n階段を上り切るこころ、私はもう一度メモを振り返った。拾った人は、ただ失くし物をした誰 かのことを想像しただけだろう。しかし、その小さな想像力と勇気が、誰かの心を温め、社 会を静かに支えている。「当たり前」の裏には、いつも名もなき善意があるのだ。\n31.          文中に「その紙に見入った」とあるが、なぜそうしたか。\nA. メモの  文字がとても珍しかったから\nB. メモの   内容が丁寧で心に残ったから\nC.        手すりのところに人が集まっていたから\nD.       女子高生がイヤホンを拾うのを見たから\n32.         文中の「見えない他人」とは誰のことか。\nA.       駅の周りにいた観光客の人               B .階段を上っていたす  ての人\nC.        落とし物をしたかもしれない人            D.       公共空間で他人に迷惑をかけない人", "image": "ocr_pages/page-04.png"}, {"page": 5, "text": "日语试题 第6页(共10页)\n\n33.         文中の「炎上につながることもある」 は、どういう意味か。\nA. ほめる  声が増えて広がること            B.       情報が削除されて消えること\nC.       批判が集中して問題化すること            D. マナ   一違反がすぐ解決すること\n34.         文中に「もう一度メモを振り返った」とあるが、なぜそうしたか。\nA. メモの   内容が疑わしく思えたから\nB. メモの   落とし主を確認したかったから\nC . メモを書いた人を直接探したかったから\nD. メモに   迟められた思いやりに気づいたから\n35.        文章の内容に合っているのはどれか。\nA.       女子高生は落とし物を駅員に届けることにした。\nB.       信号を守る行動は自分の利益だけを考えている。\nC.       落とし物を届けるのは法律で義務付けられている。\nD.       日本では落とし物を見つけても持ち帰る人が多い。\n(四)\n街角を歩いていて、パンの焼ける香りがあっと漂ってくると、なぜか心が(ア)なること がある。また、季節の花の匂いを感じただけで、昔の出来事がよみがえることもある。人は なぜ、これほど「香り」に強く反応するのだろうか。嗅觉生理学を専門とするKさんに話を聞 いた。\n「嗅觉は五感の中で最も感情と結びつきやすい感觉です。香りの情報は大脳辺緣系に直接届 き、意識より先に心が反応します」とKさんは説明する。幼い頃の家の匂いを、大人になって 同じ香りで突然思い出すのは、この「直通ルート」 のためだという。\nさらに、好きな香りを嗅ぐと、人の体内ではリラックス作用のある物質が分泌される。「ア ロマテラピー(芳香疗法)が広く受け入れられたのは、科学的根拠があったからです。香りは自 律神経にも影響し、集中力や睡眠の質を高めることができます。\n一方、文化によって「良い香り」の基準は大きく異なる。Kさんによれば、同じ香りでも国に よって評価が分かれるのは珍しくない。日本では落ち着きを与える檜の香りが、海外では単 なる「木の匂い」と感じられ、落ち着かない人もいるという。香りの好みは遺伝より経験に左 右される部分が大きい。\nまた、香りは生活の質にも関わる。人は無意識に匂いで環境の安全性を判断するため、悪 臭が続く場所ではストレスが増える。「香りは目に見えませんが、心理状態を大きく左右しま す。良い香りを選ぶことは、自分の毎日を整える方法の一つなんです」。\n\n最後にKさんは、「香りは記憶を開く小さな鍵です」 と語った。気づかない匂いの中にこそ、 人の感情を動かす力が隠されているのかもしれない。\n36.    文中の(ア)に入れるのに最も適当なものはどれか。\nA.    寂しく            B.     温かく              C. 苦し<                D.     冷たく\n37.         文中の「直通ルート」は何を指すか。\nA.香りの情報が鼻から外に逃げる通路\nB.       香りと味覚が同時に脳に伝わる仕組み\nC.       香りの情報が大脳辺緣系に直接届く経路\nD.       香りと記憶が意識下で整理される仕組み\n38.        文中 に「同じ香り .....珍しくない」とあるが、それはなぜか。\nA.香りの分子構造が国ごとに異なるから\nB.       香りは遺伝で決まる部分が大きいから\nC. 香りは全ての文化で同じ意味を持つ ら\nD.       香りの好みは経験に左右されやすいから\n39.          文中の「香りは記憶を開く小さな鍵です」 とはどういう意味か。\nA.       香りは文化によって無意味になること\nB. 香りが直接物理的に記憶を保存すること\nC.       香りが人の感情や行動に影響を与えること\nD.       香りは心理状態に全く影響を与えないこと\n40.         文章の内容に合っているものはどれか。\nA.       悪臭のある環境ではストレスが増える。\nB.       香りは人の記憶を思い出させる力がない。\nC.       嗅觉は五感の中で最も記憶とは関係がない。\nD.       好きな香りを嗅いでも体内の変化は起こらない。\n第三部分 语言运用(共两节，满分30分)\n第一节  (共10小题;每小题1.5分,满分15分)\n阅读下面短文，从每题所给的A、B、C、D四个选项中选出最佳选项。\n僕は、朝、必ずコーヒーを淹れる。忙しい日々の中で、この時間だけは自分と   41     瞬間 だ。豆を挽き、湯を注ぎ、香りを嗅ぐ。その香りはまだ眠っている頭を    42    覚醒させ、今 日一日の流れを心の中で整理できる。たった数分の行為だが、心が落ち着き、身体も少しず つ目覚めていくのを感じられる。", "image": "ocr_pages/page-05.png"}, {"page": 6, "text": "日语试题 第8页(共10页)\n\nコーヒーを淹れる 43       によって、自然に僕の心が落ち着く。窓の外に差し込む朝の光 や、遠くで聞こえる鳥のさえずりさえも、普段44      豊かに感じられる。コーヒーの温かさ は、忙しさの隙間に訪れる静寂そのもので、この小さな時間を持つだけで、日常の慌ただし さに追われても、自分を見失わずに済む45      o\n時には、本を開いたり、今日やることを手帳に書き出したりすることもある。その瞬間 は、外界の喧騒から切り離され、自分だけの世界にいる 46       。コーヒーの一口一口が、心 に落ち着きをもたらし、体だけでなく頭   47    整理される。\n忙しい日々の中で、こうした小さな儀式は、僕    48    欠かせないものになった。 日常の中 のほんの些細な瞬間が、人生を豊かにし、心の余裕を与え       49。 こうして静かな朝を\n50    たびに、僕は自分の生活を大切にすることの意味を改めて感じるだ。\n41.A.支え合う        B. 助け合う           C. 向き合う           D.信じ合う\n42.A. たっぷり        B. あっさり           C. さっぱり           D.    ゆっくり\n43.A. リズム            B. コスト               C.サービス            D. チャンス\n44.A   . ほど             B. から                C. しか                   D. より\n45.A.気にいる        B. 気になる           C. 気がする           D.気をつける\n46.A. そうだ          B. ようだ            C. らしいだ           D. つもりだ\n47.A   . 二之             B. まで                  C.ばかり              D. ぐらい\n48.A. にとって        B. にかけて            C.  にっいて           D. にわたって\n49.A. てくれる        B. てもらう           C. てあげる           D. てしまう\n50.    A. えらぶ          B. さそう             C. むかえる           D. ならべる\n第二节  (共10小题;每小题1.5分,满分15分)\n阅读下面短文，在空白处填入适当的助词或括号内单词的正确形式，括号内单词有双下划线 时，写出该单词的汉字或假名。\n言葉は、人と人との距離  51       縮める大切な存在である。私たちは日常生活の中で、会話 や文章を通して考えや気持ちを伝え、相手を52         (理解する)ようとしている。同じ内容 であっても、使う言葉や言い方が53        (違う)ば、相手の受け取り方は大きく変わってしま う。\nとりわけ、感謝や励ましの言葉54      は、人の心を温かくする力がある。「ありがとう」や 「頑張って」という一言が、相手に安心感や勇気を与えることも  55     (少ない)ない。ま た、その言葉を発した自分自身も前向きな気持ちになれる点は興味深い。\n一方で、言葉は他者だけでなく、自分自身に    56    (向ける)て使うこともできる。迷い\n\nや不安を感じたとき、思いを言葉にすることで感情が整理され、冷静に物事を考え直せるよ うになる。言葉は、心を 57  (ささ)える静かな力とも言える。\nさらに、言葉は時を超えて、人の心に  58  (残る)続ける。書き記された文章や言葉 は、未来の誰   59  考え方を変えることもある。だからこそ、言葉を 60   (選)ぶこと には責任が伴い、その姿勢が自分自身と社会の両方を豊かにすると言えるだろう。\n第四部分 写作(共两节，满分40分)\n第一节 (满分10 分)\n假定你是李明，你的日本朋友山田即将结束在中国的留学生活回国。分别前，你们约定将来\n再见。请你给山田写一张祝福卡片，回顾相处的时光，并表达对再次见面的期待。\n注意：\n(1)字数80~120字;\n(2)格式正确，书写清楚；\n(3)使用「です · ます」体。\n第二节  (满分30分)\n生活中，一些看似微不足道的习惯，如每天背几个单词、出门前简单规划一天的安排或饭后散 步几分钟,长期坚持下来却能积蓄巨大的能量,悄然改变我们的生活。请以「小さな習慣の大きな 力」为题，用日语写一篇短文。内容包括：\n(1)介绍你正在坚持的一个小习惯；\n(2)结合具体经历说明这个习惯给你带来的积极影响；\n(3)谈谈你从中得到的感悟。\n注意：\n(1)字数280~320字;\n(2)格式正确，书写清楚；\n(3)使用「です · ます」体。", "image": "ocr_pages/page-06.png"}], "paperPages": [{"page": 1, "text": "绝密文启用前\n2026 年普通高等学校招生全国统一考试预测卷\nA iF\n(考试时间:120 分钟;试卷满分:150 分)\n1. 答卷前,考生务必将自己的姓名、准考证号填写在答题卡上。\n2. 回答选择题时,选出每小题答案后,用铅笔把答题卡上对应题目的答案标号涂黑。如需改\n动 ,用橡皮擦干净后,再选涂其它答案标号。回答非选择题时,将答案写在答题卡上。写在本试卷\n上无效。\n3. 考试结束后 ,将本试卷和答题卡一并交回。\n第一部分“听力(共两节,满分30 分)\n做题时 ,先将答案标在试卷上。录音内容结束后,你将有两分钟的时间将试卷\n上的答案转涂到答题卡上。\n第一节 (共5 小题;每小题 1. 分,满分7.5 分)\n听下面5 段录音,每段录音后有 1 个小题,从 A\\B、C 三个选项中选出最佳选项。每段录音后，\n都留有 10 秒钟的时间回答该小题和阅读下一小题。每段录音播放两遍。\n1.レストランはどこにありますか。\nA.本屋の隣                 B. 銀行の前                C.駅の南口\n2. 参加者は何人になりそうですか。\nA.22 人               B.24 人              C.25 人\n3.男の人はなぜ早く帰るようにしていますか。\nA. 疲れを取るため           B. 仕事が減ったため        C. 試験の勉強をするため\n4.二人人はこれからどうしますか。\nA.雨がやむまで家で待つ。\nB.予定どおり映画を見に行く。\nC. 映画をやめて別の日にする。\n$.正しいのはどれですか。\nA. コートは来週安くなる可能性がある。\nB. 女の人は今日コートを買うことにした。\nC. 男の人はコートが似合わないと思っている。\n日语试题 第1页(共10页)\n", "image": "ocr_pages/page-01.png"}, {"page": 2, "text": "第二节 (FES 小题;每小题 1.5 分,满分 22.5 分)\n听下面 5 段录音,每段录音后有 3 个小题,从 A、B、C 三个选项中选出最佳选项。听每段录音\n前,你将有时间阅读各个小题 ,每小题 5 秒钟;听完后 ,每小题给出 5 秒钟的作答时间。每段录音\n播放两遍。\n听下面的录音,回答第6至8题。\n6.女の人はなぜ急いでいますか。\nA. 電車が遅れたから         B. 忘れ物に気づいたから    C. 会議が早く始まったから\n7.女の人が忘れたものは何ですか。\nA. 名刺                            B. 資料                           C. 携带\n8.女の人は最終的にどうしますか。\nA. 一度家に戻る。                B. 会議を欠席する。            C. 会議の開始まで待つ。\n听下面的录音,回答第9至11 题。\n9.女の人は何を予約 しましたか。\nA. 病院                        B. 美容室                     C. レストラン\n10.女の人はなせぜ予約時間を変更しましたか。\nA. 店が混んでいたから      B. 体調が悪くなったから    C.急に用事ができたから\n11. 変更後の予約時間はいつですか。\nA. 午前 10 時               B. 午後1時                C. 午後2時\n听下面的录音,回答第 12 至 14 题。\n12. 女の人はなぜ図書館で勉強することが多いですか。\nA.家に近くて便利だから\nB. 静かで資料が使えるから\nC.いつも席が空いているから\n13.女の人は一回にどのくらい勉強しますか。\nA.1 時間くらい            B. 2 時間くらい            C.3 時間以上\n14.女の人が集中するためにしていることは何ですか。\nA. 携帯を見ないようにする。\nB. 音楽を聞きながら葛強する。\nC. 勉強の後で必ず友達と話す。\n日语试题 第2页(共10页)\n", "image": "ocr_pages/page-02.png"}, {"page": 3, "text": "听下面的录音,回答第 15 至17题。\n15.ハムスターの現在の様子はどれですか。\nA. すでに手に慣れていて活発だ。\nB.昼も夜も活発に動き回っている。\nC.まだ怖がるが、人の手に乗ることもある。\n16. 女の人が夜にしていることはどれですか。\nA. ハムスターと遊んでいる。\nB. 様子を見るだけにしている。\nC. 運動さきせるようにしている。\n17.女の人が特に気をつけていることは何ですか。\nA.毎日同じ時間に触ること\nB. 生活リズムを崩さないこと\nC. 運動の時間を長くすること\n听下面的录音,回答第 18 至 20 题。\n18.この教室はどんな教室ですか。\nA.子ども向けの科学教室\nB.図書館の職員を育てる教室\nC. 実験道具の使い方を学ぶ教室\n19. 教室の先生は誰ですか。\nA. 図書館の職員               B. 地域の科学者               C. 小学生の保護者\n20.この教室について正しいのはどれですか。\nA. 教室は平日に行われている。\nB. 空気や水の性質について学んでいる。\nC. 実験の前に、子どもたちが読明をする。\n第二部分“阅读(共 20 小题;每小题 2.5 分,满分50 分)\n阅读下列短文,从每题所给的A.B、C、D 四个选项中选出最佳选项。\n(一)\n\n人と接するとき、円滑なコミュニケーションを妨げる最大の原因は、意外にも「自分は相手\nの話をきちんと聞けている」という錯覚である。多くの人は、うなずいたり筒単な返事をした\nりすれば、十分に話を理解していると思いがちだ。\n\nしかし、その態度だけでは、本当に相手の考えや気持ちを理解できているとは限らない。\n\n日语试题 第3页(共10页)\n", "image": "ocr_pages/page-03.png"}, {"page": 4, "text": "自分の価値観や経験を無意識に優先してしまうと、相手が伝えたい大切な部分を見落として\nしまうことも少なくない。 さらに、言葉の表面だけを追って聞くと、相手の気持ちや背景を\n十分に読み取る余裕がなくなり、意図しないすれ違いが生まれやすくなる。\n\n( ア )、相手の意図が「まだよくわからない」と感じるとき、人は逆に真剣に耳を傾け、\n質問したり確認したりするようになる。 理解できない状態は、自然に注意を集中させ、相手\nの話をより深く受け止める力を引き出すのだ。\n\nそのため、話を一度聞いて「わかった」と思い込むことほど危険なことはない。実際には理\n解が浅く、相手の本当の気持ちや意図を十分に波み取れていない場合が多いのである。 した\nがって、私たちらは一つひとつの言葉を丁寧に受け止め、相手の考えや気持ちを正しく理解す\nるよう努めなければならない。\n\n自分の中にある「聞けているつもり」という状態を見直すことこそ、相手との本当の理解に\n近づく大切な一歩である。\n\n21. 文中の「その態度」とはどんな態度か。\n\nA. 相手の話を深く理解しようとする態度\n\nB. 相手に質問したり確認したりする態度\n\nC. 相手の話を聞いたつもりになってしまう態度\n\nD. 相手の表情だけを見て判断しようとする態度\n22. 文中の ( アア ) に入れるのに最も適当なものはどれか。\n\nA.一方           B.または            C.つまり            D.たとえば\n23. 文中の「理解できない状態」は人にどんな影響があるか。\n\nA. 自分の考えに固執し、相手の意図を無視してしまう。\n\nB. 真剣に耳を傾け、質問や確認をする行動を引き出す。\n\nC. 会話の途中で興味を失い、話を早く終わらせたくなる。\n\nD. 表面的な反応だけで満足 し、深く理解することができない。\n\n24. 文中の 「危険なこと」とは何のことか。\n\nA. 浅い理解なのに理解できたと考えること\n\nB. 会話の途中で相手の話を遮ってしまうこと\n\nC. 相手の話を聞かずに結論だけ急いで出すこと\n\nD. 自分の経験だけで相手を理解しようとすること\n25.この文章で筆者が最も言いたいことはどれか。\n\nA. 理解できない話は無理に聞き続ける必要はない。\n\n日语试题 第4页(共10页)\n", "image": "ocr_pages/page-04.png"}, {"page": 5, "text": "B. 会話では自分の価値観を積極的に主張すべきである。\n\nC. 相手より先に自分の意見をダ述べて会話を進めるべきである。\n\nD. 相手の言葉を丁寧に受け止めて理解することが大切である。\n\n(二)\n\n冬になると、高校の教室では「パチッ」という小さな音があちこちで聞こえる。 ドアノブ(」]\n把手) に触れただけで指が痛くなったり、友だちの肩に手を置くと火花が出たりする。 寒さよ\nりも前に、静電気で目が覚める朝もある。高校生には少し困るが、思わず笑ってしまう季節\nの出来事である。\n\nわがクラスには、特に静電気が起きやすい生徒がいる。上着を脱ぐたびに「パチッ」と音が\nして、近くの人が驚く。黒板を消すときでさえ、チョークの粉が軽く跳ねて、周りの生徒が\n笑う。本人は真面目な顔で「またか.…」と言うが、その様子がかえってみんなを笑わせる。\n\nある休み時間、その生徒はぼそっと(小声地)「なんで僕だけ毎日こんなにパチパチするんだ\nろう」と咳いた。すると、友だちが 「冬は空気が著燥しているからだよ。心まで乾かさないよ\nうに気をつけろ」と軽く冗談を言った。 教室の空気がぴっと明るくなり、みんなが笑った。\n\n静電気は空気が乾燥すると起きやすい。 しかし、人間関係は少し違う。心が乾いてしまう\nと、人と衝突することが増える。 ( ア )、毎日の小さな会話や、くだらない冗談が教室の\n究囲気を柔らかくしてくれるのだと思う。\n\n痛い静電気の一明も、笑いに変えられれば、人との距離は縮まる。 もし今日、静電気で痛\nい思いをした高校生がいたら、その瞬間だけでも、近くにいる友だちの顔を思い出してみよ\nう。小さな火花が、むしろ心を温めてくれるかもしれない。\n\n26. 文中の「パチッ」という音は何の音を指すか。\n\nA. 静電気が発生する音                  B.友だちが手を叩いた音\n\nC.チョークの粉が跳ねる音             D. ドアノブに触れたときの音\n27.文中に「驚く」とあるが、なぜ和驚くか。\n\nA. 触れた瞬間に火花が見えるから               B. 上着を脱ぐたびに音が鳴るから\n\nC. 黒板を消すたびに粉が跳ねるから      D. 教室の中で音が続けて起きるから\n28. 文中に「心まで電かさないように気をつけろ」とあるが、なぜそう言ったか。\n\nA.冬は寒さで体調を月 しやすいから      B.冬の勉強は集中が続かないから\n\nC. 教室の空気を加湿する必要があるから     D. 心が乾くと人と衝突しやすくなるかと\n29. 文中の ( F ) に入れるのに最も適当なものはどれか。\n\nA. それでも        B. それでは          C.ところで          D.だからこそ\n\n日语试题 第5页(共10页)\n", "image": "ocr_pages/page-05.png"}, {"page": 6, "text": "30. 文中に「小さな火花が、むしろ心を温めてくれる」とあるが、なぜそう言うか。\n\nA.冬の寒さを忘れられるから             B. 教室全体が明るくなるから\n\nC. 痛い瞬間が笑いに変わるから         D. 何気ない会話が続いていくから\n\n(三)\n\n先日、駅の階段を上っていると、手すり(挟手)のところに一枚の小さなメモが貼られてい\nた。「沙とし物です。心当たりの方は駅員さんへ」と丁祝に書かれ、横には拾った人のイニシャ\nJe 姓名首字母徐写)もあった。 私は思わずその紙に見入った。\n\n日本では、落とし物を見つけたら届けることが一般的だ。しかし、必ず持ち主が見つかる\nわけではないのに、多くの人が当たり前のように届けている。その習慣の背明には、どんな\n理由があるのだろうか。\n\nちょうどそのとき、近くで女子高生がイヤホンを拾った。しばらく迷っていたが、最後には\n駅員室の方へ歩き出した。きっと「誰かが困っているかもしれない」という想像が彼女を動か\nしたのだろう。このような「見えない他人」を思いやる想像力こそ、日本の公共空間を支えて\nきた大切な要素なのかも しれない。 信号を守ることも、列に並ぶことも、落とし物を届ける\nことも、その多くは誰かのための行動である。\n\n一方で、最近は「自分さえ良ければいい」という態度も目立ち始めている。SNSでは、電車\n内でのマナー違反を撮影して晒し、炎上につながることもある。 人を批判する前に、自分の\n行動を見つめ直す余裕はどれほどあるのだろうか。\n\n階段を上り切るころ、私はも う一度メモを振り返った。拾った人は、ただ失くし物をした誰\nかのことを想像しただけだろう。 しかし、その小さな想像力と勇気が、誰かの心を温め、社\n会を静かに支えている。「当たり前」の裏には、いつも名もなき善意があるのだ。\n\n31.文中に「その紙に見入った」とあるが、なぜそうしたか。\n\nA. メモの文字がとても珍しかったから\n\nB. メモの内容が丁寧で心に残ったから\n\nC.手すりのところに人が集まっていたから\n\nD. 女子高生がイヤホンを拾うのを見たから\n32. 文中の「見えない他人」とは誰のことか。\n\nA. 駅の周りにいた観光客の人            B. 階段を上っていたすべての人\n\nC.落とし物をしたかも しれない人            D. 公共空間で他人に迷惑をかけない人\n\n日语试题 第6页(共10页)\n", "image": "ocr_pages/page-06.png"}, {"page": 7, "text": "33. 文中の「炎上につながることもある」は、どういう意味か。\n\nA. ほめる声が増えて広がること      B. 情報が削除されて消えること\n\nC. 批判が集中して問題化すること              D. マナー佑反がすぐ解決すること\n34. 文中に「もう一度メモを振り返った」とあるが、なぜそうしたか。\n\nA.メモの内容が疑わしく思えたから\n\nB.メモの落とし主を確認したかったから\n\nC.メモを書いた人を直接探したかったから\n\nD.メモに込められた思いやりに気づいたから\n35. 文章の内容に合っているのはどれか。\n\nA. 女子高生は落とし物を駅員に届けることにした。\n\nB. 信号を守る行動は自分の利益だけを考えている。\n\nC.落とし物を届けるのは法律で義務付けられている。\n\nD. 日本では落とし物を見つけても持ち帰る人が多い。\n\n(四)\n\n街角を歩いていて、パンの焼ける香りがふっと漂ってくると、なぜか心が( ア ) なること\nがある。また、季節の花の匂いを感じただけで、昔の出来事がよみがえることもある。 人は\nなぜ、これほど「符り」に強く反応するのだろうか。喫覚生理学を専門とするKさんに話を聞\nいた。\n\n「嘆覚は五感の中で最も感情と結びつきやすい感覚です。香りの情報は大脳辺縁系に直接届\nき、意識より先に心が反応します」とKさんは説明する。幼い頃の家の匂いを、大人になって\n同じ香りで突然思い出すのは、この「直通ルート」のためだという。\n\nさらに、好きな香りを喚ぐと、人の体内ではリラックス作用のある物質が分泌るされる。「ア\nロマテラピー(芳香法)が広く受け入れられたのは、科学的根拠があったからです。 香りは自\n律神経にも影響し、集中力や睡眠の質を高めることができます」。\n\n一方、文化によって「良い香り」の基準は大きく異なる。Kさんによれば、同じ香りでも国に\nよって評価が分かれるのは珍しくない。 日本では落ち着きを与える檜の符りが、海外では単\nなる「木の匂い」と感じられ、落ち着かない人もいるという。 香りの好みは遺伝より経験に左\n右される部分が大きい。\n\nまた、香りは生 きょうしつ</rt></ruby>ですか。\n。A. <ruby>子ども<rt>こども</rt></ruby><ruby>向け<rt>むけ</rt></ruby>の<ruby>科学<rt>かがく</rt></ruby><ruby>教室<rt>きょうしつ</rt></ruby>\n<ruby>教室<rt>きょうしつ</rt></ruby>B. <ruby>図書館<rt>としょかん</rt></ruby>の<ruby>職員<rt>しょくいん</rt></ruby>を<ruby>育て<rt>そだて</rt></ruby>る<ruby>教室<rt>きょうしつ</rt></ruby>\n<ruby>教室<rt>きょうしつ</rt></ruby>C. <ruby>実験<rt>じっけん</rt></ruby><ruby>道具<rt>どうぐ</rt></ruby>の<ruby>使い方<rt>つかいかた</rt></ruby>を<ruby>学ぶ<rt>まなぶ</rt></ruby><ruby>教室<rt>きょうしつ</rt></ruby>", "translation_cn": "18.这是什么教室？ A. 儿童科学课 B. 培训图书馆工作人员的课程 C. 学习如何使用实验工具的课程"}, {"number": 19, "answer": "A", "body": "19. 教室の先生は誰ですか。\nA. 図書館の職員 B. 地域の科学者 C. 小学生の保護者", "ruby_html": "19. <ruby>教室<rt>きょうしつ</rt></ruby>の<ruby>先生<rt>せんせい</rt></ruby>は<ruby>誰<rt>だれ</rt></ruby>ですか。\n。A. <ruby>図書館<rt>としょかん</rt></ruby>の<ruby>職員<rt>しょくいん</rt></ruby> B. <ruby>地域<rt>ちいき</rt></ruby>の<ruby>科学者<rt>かがくしゃ</rt></ruby> C. <ruby>小学生<rt>しょうがくせい</rt></ruby>の<ruby>保護者<rt>ほごしゃ</rt></ruby>", "translation_cn": "19. 班主任是谁？ A. 图书馆工作人员 B. 社区科学家 C. 小学生家长"}, {"number": 20, "answer": "B", "body": "20. この教室について正しいのはどれですか。\nA. 教室は平日に行われている。\nB. 空気や水の性質について学んでいる。\nC. 実験の前に、子どもたちが説明をする。", "ruby_html": "20. この<ruby>教室<rt>きょうしつ</rt></ruby>について<ruby>正しい<rt>ただしい</rt></ruby>のはどれですか。\n。A. <ruby>教室<rt>きょうしつ</rt></ruby>は<ruby>平日<rt>へいじつ</rt></ruby>に<ruby>行わ<rt>おこなわ</rt></ruby>れている。\n。B. <ruby>空気<rt>くうき</rt></ruby>や<ruby>水<rt>みず</rt></ruby>の<ruby>性質<rt>せいしつ</rt></ruby>について<ruby>学ん<rt>まなん</rt></ruby>でいる。\n。C. <ruby>実験<rt>じっけん</rt></ruby>の<ruby>前<rt>まえ</rt></ruby>に、<ruby>子ども<rt>こども</rt></ruby>たちが<ruby>説明<rt>せつめい</rt></ruby>をする。", "translation_cn": "20. 关于这间教室，以下哪项描述是正确的？ A. 工作日上课。 B. 他们正在学习空气和水的特性。 C. 孩子们在实验前进行解释。"}, {"number": 21, "answer": "C", "body": "(一)\n人と接するとき、円滑なコミュニケーションを妨げる最大の原因は、意外にも「自分は相手 の話をきちんと聞けている」という錯觉である。多くの人は、うなずいたり簡単な返事をした りすれば、十分に話を理解していると思いがちだ。\nしかし、その態度だけでは、本当に相手の考えや気持ちを理解できているとは限らない。\n\n自分の価値観や経験を無意識に優先してしまうと、相手が伝えたい大切な部分を見落として しまうことも少なくない。さらに、言葉の表面だけを追って聞くと、相手の気持ちや背景を 十分に読み取る余裕がなくなり、意図しないすれ違いが生まれやすくなる。\n( ア ) 、 相手の意図が「まだよくわからない」と感じるとき、人は逆に真剣に耳を傾け、 質問したり確認したりするようになる。理解できない状態は、自然に注意を集中させ、相手 の話をより深く受け止める力を引き出すのだ。\nそのため、話を一度聞いて「わかった」と思い込むことほど危険なことはない。実際には理 解が浅く、相手の本当の気持ちや意図を十分に汲み取れていない場合が多いのである。した がって、私たちは一つひとつの言葉を丁寧に受け止め、相手の考えや気持ちを正しく理解す るよう努めなければならない。\n自分の中にある「聞けているつもり」という状態を見直すことこそ、相手との本当的理解に 近づく大切な一歩である。\n\n21. 文中の「その態度」とはどんな態度か。\nA. 相手の話を深く理解しようとする態度\nB. 相手に質問したり確認したりする態度\nC. 相手の話を聞いたつもりになってしまう態度\nD. 相手の表情だけを見て判断しようとする態度", "ruby_html": "(<ruby>一<rt>いち</rt></ruby>)\n)<ruby>人<rt>にん</rt></ruby>と<ruby>接す<rt>せっす</rt></ruby>るとき、<ruby>円滑<rt>えんかつ</rt></ruby>なコミュニケーションを<ruby>妨げ<rt>さまたげ</rt></ruby>る<ruby>最大<rt>さいだい</rt></ruby>の<ruby>原因<rt>げんいん</rt></ruby>は、<ruby>意外<rt>いがい</rt></ruby>にも「<ruby>自分<rt>じぶん</rt></ruby>は<ruby>相手<rt>あいて</rt></ruby> の<ruby>話<rt>はなし</rt></ruby>をきちんと<ruby>聞け<rt>きけ</rt></ruby>ている」という<ruby>錯<rt>さく</rt></ruby>觉ある。<ruby>多く<rt>おおく</rt></ruby>の<ruby>人<rt>にん</rt></ruby>は、うなずいたり<ruby>簡単<rt>かんたん</rt></ruby>な<ruby>返事<rt>へんじ</rt></ruby>をした りすれば、<ruby>十分<rt>じゅうぶん</rt></ruby>に<ruby>話<rt>はなし</rt></ruby>を<ruby>理解<rt>りかい</rt></ruby>していると<ruby>思い<rt>おもい</rt></ruby>がちだ。\n。しかし、その<ruby>態度<rt>たいど</rt></ruby>だけでは、<ruby>本当<rt>ほんとう</rt></ruby>に<ruby>相手<rt>あいて</rt></ruby>の<ruby>考え<rt>かんがえ</rt></ruby>や<ruby>気持ち<rt>きもち</rt></ruby>を<ruby>理解<rt>りかい</rt></ruby>できているとは<ruby>限ら<rt>かぎら</rt></ruby>ない。\n。\n。<ruby>自分<rt>じぶん</rt></ruby>の<ruby>価値観<rt>かちかん</rt></ruby>や<ruby>経験<rt>けいけん</rt></ruby>を<ruby>無意識<rt>むいしき</rt></ruby>に<ruby>優先<rt>ゆうせん</rt></ruby>してしまうと、<ruby>相手<rt>あいて</rt></ruby>が<ruby>伝え<rt>つたえ</rt></ruby>たい<ruby>大切<rt>たいせつ</rt></ruby>な<ruby>部分<rt>ぶぶん</rt></ruby>を__RUBYOVERRIDE9__ しまうことも<ruby>少なく<rt>すくなく</rt></ruby>ない。さらに、<ruby>言葉<rt>ことば</rt></ruby>の<ruby>表面<rt>ひょうめん</rt></ruby>だけを<ruby>追っ<rt>おっ</rt></ruby>て<ruby>聞く<rt>きく</rt></ruby>と、<ruby>相手<rt>あいて</rt></ruby>の<ruby>気持ち<rt>きもち</rt></ruby>や<ruby>背景<rt>はいけい</rt></ruby>を <ruby>十分<rt>じゅうぶん</rt></ruby>に<ruby>読み取る<rt>よみとる</rt></ruby><ruby>余裕<rt>よゆう</rt></ruby>がなくなり、<ruby>意図<rt>いと</rt></ruby>しないすれ<ruby>違い<rt>ちがい</rt></ruby>が<ruby>生まれ<rt>うまれ</rt></ruby>やすくなる。\n。( ア ) 、 <ruby>相手<rt>あいて</rt></ruby>の<ruby>意図<rt>いと</rt></ruby>が「まだよくわからない」と<ruby>感じ<rt>かんじ</rt></ruby>るとき、<ruby>人<rt>にん</rt></ruby>は<ruby>逆に<rt>ぎゃくに</rt></ruby><ruby>真剣<rt>しんけん</rt></ruby>に<ruby>耳<rt>みみ</rt></ruby>を<ruby>傾け<rt>かたむけ</rt></ruby>、 <ruby>質問<rt>しつもん</rt></ruby>したり<ruby>確認し<rt>かくにんし</rt></ruby>たりするようになる。<ruby>理解<rt>りかい</rt></ruby>できない<ruby>状態<rt>じょうたい</rt></ruby>は、<ruby>自然<rt>しぜん</rt></ruby>に<ruby>注意<rt>ちゅうい</rt></ruby>を<ruby>集中<rt>しゅうちゅう</rt></ruby>させ、<ruby>相手<rt>あいて</rt></ruby> の<ruby>話<rt>はなし</rt></ruby>をより<ruby>深く<rt>ふかく</rt></ruby><ruby>受け止める<rt>うけとめる</rt></ruby><ruby>力<rt>ちから</rt></ruby>を<ruby>引き出す<rt>ひきだす</rt></ruby>のだ。\n。そのため、<ruby>話<rt>はなし</rt></ruby>を<ruby>一度<rt>いちど</rt></ruby><ruby>聞い<rt>きい</rt></ruby>て「わかった」と<ruby>思い込むこと<rt>おもいこむこと</rt></ruby>ほど<ruby>危険<rt>きけん</rt></ruby>なことはない。<ruby>実際に<rt>じっさいに</rt></ruby>は<ruby>理<rt>り</rt></ruby> <ruby>解<rt>かい</rt></ruby>が<ruby>浅く<rt>あさく</rt></ruby>、<ruby>相手<rt>あいて</rt></ruby>の<ruby>本当<rt>ほんとう</rt></ruby>の<ruby>気持ち<rt>きもち</rt></ruby>や<ruby>意図<rt>いと</rt></ruby>を<ruby>十分<rt>じゅうぶん</rt></ruby>に<ruby>汲み取れて<rt>くみとれて</rt></ruby>いない<ruby>場合<rt>ばあい</rt></ruby>が<ruby>多い<rt>おおい</rt></ruby>のである。した がって、<ruby>私たち<rt>わたしたち</rt></ruby>は<ruby>一つ<rt>ひとつ</rt></ruby>ひとつの<ruby>言葉<rt>ことば</rt></ruby>を<ruby>丁寧<rt>ていねい</rt></ruby>に<ruby>受け止め<rt>うけとめ</rt></ruby>、<ruby>相手<rt>あいて</rt></ruby>の<ruby>考え<rt>かんがえ</rt></ruby>や<ruby>気持ち<rt>きもち</rt></ruby>を<ruby>正しく<rt>ただしく</rt></ruby><ruby>理解<rt>りかい</rt></ruby>す るよう<ruby>努め<rt>つとめ</rt></ruby>なければならない。\n。<ruby>自分<rt>じぶん</rt></ruby>の<ruby>中に<rt>なかに</rt></ruby>ある「<ruby>聞け<rt>きけ</rt></ruby>ているつもり」という<ruby>状態<rt>じょうたい</rt></ruby>を<ruby>見直すこと<rt>みなおすこと</rt></ruby>こそ、<ruby>相手<rt>あいて</rt></ruby>との<ruby>本当<rt>ほんとう</rt></ruby><ruby>的<rt>てき</rt></ruby><ruby>理解<rt>りかい</rt></ruby>に <ruby>近づ<rt>ちかづ</rt></ruby>く<ruby>大切<rt>たいせつ</rt></ruby>な<ruby>一歩<rt>いっぽ</rt></ruby>である。\n。\n。21. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「その<ruby>態度<rt>たいど</rt></ruby>」とはどんな<ruby>態度<rt>たいど</rt></ruby>か。\n。A. <ruby>相手<rt>あいて</rt></ruby>の<ruby>話<rt>はなし</rt></ruby>を<ruby>深く<rt>ふかく</rt></ruby><ruby>理解<rt>りかい</rt></ruby>しようとする<ruby>態度<rt>たいど</rt></ruby>\n<ruby>態度<rt>たいど</rt></ruby>B. <ruby>相手<rt>あいて</rt></ruby>に<ruby>質問<rt>しつもん</rt></ruby>したり<ruby>確認し<rt>かくにんし</rt></ruby>たりする<ruby>態度<rt>たいど</rt></ruby>\n<ruby>態度<rt>たいど</rt></ruby>C. <ruby>相手<rt>あいて</rt></ruby>の<ruby>話<rt>はなし</rt></ruby>を<ruby>聞い<rt>きい</rt></ruby>たつもりになってしまう<ruby>態度<rt>たいど</rt></ruby>\n<ruby>態度<rt>たいど</rt></ruby>D. <ruby>相手<rt>あいて</rt></ruby>の<ruby>表情<rt>ひょうじょう</rt></ruby>だけを<ruby>見て<rt>みて</rt></ruby><ruby>判断<rt>はんだん</rt></ruby>しようとする<ruby>態度<rt>たいど</rt></ruby>", "translation_cn": "(1) 与人打交道时，顺利沟通的最大障碍竟然是“我能正确地听清楚对方在说什么”的错觉。许多人倾向于认为，如果他们点头或做出简单的回应，他们就完全理解了对方所说的内容。然而，仅凭这种态度并不一定意味着你真正理解对方的想法和感受。如果你无意识地优先考虑自己的价值观和经历，你常常会忽视对方想要传达的重要观点。而且，如果你只听对方的表面话，你就没有足够的时间充分了解对方的感受和背景，很容易产生无意识的误会。 (a) 当人们感觉自己不太明白对方的意图时，他们往往会更专心地倾听、提出问题、提出问题。无法理解的状态自然会集中你的注意力，并激发你更深入地倾听对方所说内容的能力。因此，没有什么比听过一次就以为自己理解了更危险的了。现实中，他们的了解往往很肤浅，无法完全掌握对方的真实感受和意图。因此，我们必须认真对待每一句话，努力正确理解对方的想法和感受。重新考虑你“认为你可以倾听”的内心状态是接近与他人真正理解的重要一步。 21.句子中的“那种态度”是什么态度？ A. 试图深入理解对方所说内容的态度 B. 提出问题或检查对方的态度 C. 假装在听对方说话的态度 D. 试图仅根据对方的面部表情做出判断的态度"}, {"number": 22, "answer": "A", "body": "22. 文中の(ア)に入れるのに最も適当なものはどれか。\nA.一方 B. または C. つまり D. たとえば", "ruby_html": "22. <ruby>文中<rt>ぶんちゅう</rt></ruby>の(ア)に<ruby>入れ<rt>いれ</rt></ruby>るのに<ruby>最も<rt>もっとも</rt></ruby><ruby>適当<rt>てきとう</rt></ruby>なものはどれか。\n。A.<ruby>一方<rt>いっぽう</rt></ruby> B. または C. つまり D. たとえば", "translation_cn": "22. 以下哪项最适合放在句子的 (a) 中？ A. 而 B. 或 C. 即 D. 例如"}, {"number": 23, "answer": "B", "body": "23. 文中の「理解できない状態」は人にどんな影響があるか。\nA. 自分の考えに固執し、相手の意図を無視してしまう。\nB. 真剣に耳を傾け、質問や確認をする行動を引き出す。\nC. 会話の途中で興味を失い、話を早く終わらせたくなる。\nD. 表面的な反応だけで満足し、深く理解することができない。", "ruby_html": "23. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「<ruby>理解<rt>りかい</rt></ruby>できない<ruby>状態<rt>じょうたい</rt></ruby>」は<ruby>人<rt>にん</rt></ruby>にどんな<ruby>影響<rt>えいきょう</rt></ruby>があるか。\n。A. <ruby>自分<rt>じぶん</rt></ruby>の<ruby>考え<rt>かんがえ</rt></ruby>に<ruby>固執<rt>こしつ</rt></ruby>し、<ruby>相手<rt>あいて</rt></ruby>の<ruby>意図<rt>いと</rt></ruby>を<ruby>無視し<rt>むしし</rt></ruby>てしまう。\n。B. <ruby>真剣<rt>しんけん</rt></ruby>に<ruby>耳<rt>みみ</rt></ruby>を<ruby>傾け<rt>かたむけ</rt></ruby>、<ruby>質問<rt>しつもん</rt></ruby>や<ruby>確認<rt>かくにん</rt></ruby>をする<ruby>行動<rt>こうどう</rt></ruby>を<ruby>引き出す<rt>ひきだす</rt></ruby>。\n。C. <ruby>会話<rt>かいわ</rt></ruby>の<ruby>途中<rt>とちゅう</rt></ruby>で<ruby>興味<rt>きょうみ</rt></ruby>を<ruby>失い<rt>うしない</rt></ruby>、<ruby>話<rt>はなし</rt></ruby>を<ruby>早く<rt>はやく</rt></ruby><ruby>終わ<rt>おわ</rt></ruby>らせたくなる。\n。D. <ruby>表面的<rt>ひょうめんてき</rt></ruby>な<ruby>反応<rt>はんのう</rt></ruby>だけで<ruby>満足<rt>まんぞく</rt></ruby>し、<ruby>深く<rt>ふかく</rt></ruby><ruby>理解<rt>りかい</rt></ruby>することができない。", "translation_cn": "23.文中“听不懂的状态”对人有什么影响？ A、坚持自己的想法，忽视对方的意图。 B. 培养专心倾听、提出问题、提出问题的行为。 C. 谈话中途失去兴趣并想尽快结束谈话。 D.他们满足于肤浅的反应，无法深入理解。"}, {"number": 24, "answer": "A", "body": "24. 文中の「危険なこと」 とは何のことか。\nA. 浅い理解なのに理解できたと考えること\nB. 会話の途中で相手の話を遮ってしまうこと\nC. 相手の話を聞かずに結論だけ急いで出すこと\nD. 自分の経験だけで相手を理解しようとすること", "ruby_html": "24. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「<ruby>危険<rt>きけん</rt></ruby>なこと」 とは<ruby>何の<rt>なんの</rt></ruby>ことか。\n。A. <ruby>浅い<rt>あさい</rt></ruby><ruby>理解<rt>りかい</rt></ruby>なのに<ruby>理解<rt>りかい</rt></ruby>できたと<ruby>考え<rt>かんがえ</rt></ruby>ること\nることB. <ruby>会話<rt>かいわ</rt></ruby>の<ruby>途中<rt>とちゅう</rt></ruby>で<ruby>相手<rt>あいて</rt></ruby>の<ruby>話<rt>はなし</rt></ruby>を<ruby>遮って<rt>さえぎって</rt></ruby>しまうこと\nしまうことC. <ruby>相手<rt>あいて</rt></ruby>の<ruby>話<rt>はなし</rt></ruby>を<ruby>聞か<rt>きか</rt></ruby>ずに<ruby>結論<rt>けつろん</rt></ruby>だけ<ruby>急い<rt>いそい</rt></ruby>で<ruby>出す<rt>だす</rt></ruby>こと\nことD. <ruby>自分<rt>じぶん</rt></ruby>の<ruby>経験<rt>けいけん</rt></ruby>だけで<ruby>相手<rt>あいて</rt></ruby>を<ruby>理解<rt>りかい</rt></ruby>しようとすること", "translation_cn": "24.句子中的“危险的事情”是什么意思？ A. 理解很浅时就认为自己理解了 B. 在谈话中打断对方 C. 不听对方说的话就妄下结论 D. 试图仅根据自己的经验来理解对方"}, {"number": 25, "answer": "D", "body": "25. この文章で筆者が最も言いたいことはどれか。\nA. 理解できない話は無理に聞き続ける必要はない。\n日语试题 第4页(共10页)\n\nB. 会話では自分の価値観を積極的に主張すべきである。\nC. 相手より先に自分の意見を述べて会話を進めるべきである。\nD. 相手の言葉を丁寧に受け止めて理解することが大切である。", "ruby_html": "25. この<ruby>文章<rt>ぶんしょう</rt></ruby>で<ruby>筆者<rt>ひっしゃ</rt></ruby>が<ruby>最も<rt>もっとも</rt></ruby><ruby>言い<rt>いい</rt></ruby>たいことはどれか。\n。A. <ruby>理解<rt>りかい</rt></ruby>できない<ruby>話<rt>はなし</rt></ruby>は<ruby>無理<rt>むり</rt></ruby>に<ruby>聞き<rt>きき</rt></ruby><ruby>続け<rt>つづけ</rt></ruby>る<ruby>必要<rt>ひつよう</rt></ruby>はない。\n。<ruby>日<rt>にち</rt></ruby>语题<ruby>第<rt>だい</rt></ruby>4页<ruby>共<rt>とも</rt></ruby>10页\n\nB. <ruby>会話<rt>かいわ</rt></ruby>では<ruby>自分<rt>じぶん</rt></ruby>の<ruby>価値観<rt>かちかん</rt></ruby>を<ruby>積極的に<rt>せっきょくてきに</rt></ruby><ruby>主張<rt>しゅちょう</rt></ruby>すべきである。\n。C. <ruby>相手<rt>あいて</rt></ruby>より<ruby>先に<rt>さきに</rt></ruby><ruby>自分<rt>じぶん</rt></ruby>の<ruby>意見<rt>いけん</rt></ruby>を<ruby>述べ<rt>のべ</rt></ruby>て<ruby>会話<rt>かいわ</rt></ruby>を<ruby>進め<rt>すすめ</rt></ruby>るべきである。\n。D. <ruby>相手<rt>あいて</rt></ruby>の<ruby>言葉<rt>ことば</rt></ruby>を<ruby>丁寧<rt>ていねい</rt></ruby>に<ruby>受け止め<rt>うけとめ</rt></ruby>て<ruby>理解<rt>りかい</rt></ruby>することが<ruby>大切<rt>たいせつ</rt></ruby>である。", "translation_cn": "25.本文中作者最想表达的是什么？ A. 没必要强迫自己一直听不懂的故事。 B. 你应该在谈话中积极主张你的价值观。 C. 你应该先于对方表达你的意见，以推进对话。 D. 仔细聆听并理解对方的话很重要。"}, {"number": 26, "answer": "A", "body": "(二)\n冬になると、高校の教室では「パチッ」 という小さな音があちこちで聞こえる。ドアノブ(门 把手)に触れただけで指が痛くなったり、友だちの肩に手を置くと火花が出たりする。寒さよ りも前に、静電気で目が覚める朝もある。高校生には少し困るが、思わず笑ってしまう季節 の出来事である。\nわがクラスには、特に静電気が起きやすい生徒がいる。上着を脱ぐたびに「パチッ」と音が して、近くの人が驚 く。黒板を消すときでさえ、チョークの粉が軽く跳ねて、周りの生徒が 笑う。本人は真面目な顔で「またか......」と言うが、その様子がかえってみんなを笑わせる。\nある休み時間、その生徒はぼそっと(小声地)「なんで僕だけ毎日こんなにパチパチするんだ ろう」と呟いた。すると、友だちが「冬は空気が乾燥しているからだよ。心まで乾かさないよ うに気をつけろ」 と軽く冗談を言った。教室の空気がぱっと明るくなり、みんなが笑った。\n静電気は空気が乾燥すると起きやすい。しかし、人間関係は少し違う。心が乾いてしまう と、人と衝突することが増える。(ア)、毎日の小さな会話や、くだらない冗談が教室の 雰囲気を柔らかくしてくれるのだと思う。\n痛い静電気の一瞬も、笑いに変えられれば、人との距離は缩まる。もし今日、静電気で痛 い思いをした高校生がいたら、その瞬間だけでも、近くにいる友だちの顔を思い出してみよ う。小さな火花が、むしろ心を温めてくれるかもしれない。\n\n26. 文中の「パチッ」という音は何の音を指すか。\nA.静電気が発生する音 B. 友だちが手を叩いた音\nC. チョークの 粉が跳ねる音 D. ドアノブに 触れたときの音", "ruby_html": "(<ruby>二<rt>に</rt></ruby>)\n)<ruby>冬<rt>ふゆ</rt></ruby>になると、<ruby>高校<rt>こうこう</rt></ruby>の<ruby>教室<rt>きょうしつ</rt></ruby>では「パチッ」 という<ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>音<rt>おと</rt></ruby>があちこちで<ruby>聞こ<rt>きこ</rt></ruby>える。ドアノブ(门<ruby>把手<rt>はしゅ</rt></ruby>)に<ruby>触れた<rt>ふれた</rt></ruby>だけで<ruby>指<rt>ゆび</rt></ruby>が<ruby>痛く<rt>いたく</rt></ruby>なったり、<ruby>友<rt>とも</rt></ruby>だちの<ruby>肩<rt>かた</rt></ruby>に<ruby>手<rt>て</rt></ruby>を<ruby>置く<rt>おく</rt></ruby>と<ruby>火花<rt>ひばな</rt></ruby>が<ruby>出た<rt>でた</rt></ruby>りする。<ruby>寒さ<rt>さむさ</rt></ruby>よ りも<ruby>前<rt>まえ</rt></ruby>に、<ruby>静電気<rt>せいでんき</rt></ruby>で<ruby>目が覚める<rt>めがさめる</rt></ruby><ruby>朝<rt>あさ</rt></ruby>もある。<ruby>高校生<rt>こうこうせい</rt></ruby>には<ruby>少し<rt>すこし</rt></ruby><ruby>困る<rt>こまる</rt></ruby>が、<ruby>思わず<rt>おもわず</rt></ruby><ruby>笑っ<rt>わらっ</rt></ruby>てしまう<ruby>季節<rt>きせつ</rt></ruby> の<ruby>出来事<rt>できごと</rt></ruby>である。\n。わがクラスには、<ruby>特に<rt>とくに</rt></ruby><ruby>静電気<rt>せいでんき</rt></ruby>が<ruby>起き<rt>おき</rt></ruby>やすい<ruby>生徒<rt>せいと</rt></ruby>がいる。<ruby>上着<rt>うわぎ</rt></ruby>を<ruby>脱ぐ<rt>ぬぐ</rt></ruby>たびに「パチッ」と<ruby>音<rt>おと</rt></ruby>が して、<ruby>近く<rt>ちかく</rt></ruby>の<ruby>人<rt>にん</rt></ruby>が<ruby>驚く<rt>おどろく</rt></ruby>。<ruby>黒板<rt>こくばん</rt></ruby>を<ruby>消す<rt>けす</rt></ruby>ときでさえ、チョークの<ruby>粉<rt>こな</rt></ruby>が__RUBYOVERRIDE37____RUBYOVERRIDE38__て、<ruby>周り<rt>まわり</rt></ruby>の<ruby>生徒<rt>せいと</rt></ruby>が <ruby>笑う<rt>わらう</rt></ruby>。<ruby>本人<rt>ほんにん</rt></ruby>は<ruby>真面目<rt>まじめ</rt></ruby>な<ruby>顔<rt>かお</rt></ruby>で「またか......」と<ruby>言う<rt>いう</rt></ruby>が、その<ruby>様子<rt>ようす</rt></ruby>がかえってみんなを<ruby>笑わ<rt>わらわ</rt></ruby>せる。\n。ある<ruby>休み時間<rt>やすみじかん</rt></ruby>、その<ruby>生徒<rt>せいと</rt></ruby>はぼそっと(<ruby>小声<rt>こごえ</rt></ruby><ruby>地<rt>ち</rt></ruby>)「なんで<ruby>僕<rt>ぼく</rt></ruby>だけ<ruby>毎日<rt>まいにち</rt></ruby>こんなにパチパチするんだ ろう」と<ruby>呟<rt>げん</rt></ruby>いた。すると、<ruby>友<rt>とも</rt></ruby>だちが「<ruby>冬<rt>ふゆ</rt></ruby>は<ruby>空気<rt>くうき</rt></ruby>が<ruby>乾燥<rt>かんそう</rt></ruby>しているからだよ。<ruby>心<rt>こころ</rt></ruby>まで<ruby>乾か<rt>かわか</rt></ruby>さないよ うに<ruby>気を<rt>きを</rt></ruby>つけろ」 と<ruby>軽く<rt>かるく</rt></ruby><ruby>冗談<rt>じょうだん</rt></ruby>を<ruby>言った<rt>いった</rt></ruby>。<ruby>教室<rt>きょうしつ</rt></ruby>の<ruby>空気<rt>くうき</rt></ruby>がぱっと<ruby>明るく<rt>あかるく</rt></ruby>なり、みんなが<ruby>笑っ<rt>わらっ</rt></ruby>た。\n。<ruby>静電気<rt>せいでんき</rt></ruby>は<ruby>空気<rt>くうき</rt></ruby>が<ruby>乾燥<rt>かんそう</rt></ruby>すると<ruby>起き<rt>おき</rt></ruby>やすい。しかし、<ruby>人間関係<rt>にんげんかんけい</rt></ruby>は<ruby>少し<rt>すこし</rt></ruby><ruby>違う<rt>ちがう</rt></ruby>。<ruby>心<rt>こころ</rt></ruby>が<ruby>乾い<rt>かわい</rt></ruby>てしまう と、<ruby>人<rt>にん</rt></ruby>と<ruby>衝突<rt>しょうとつ</rt></ruby>することが<ruby>増え<rt>ふえ</rt></ruby>る。(ア)、<ruby>毎日<rt>まいにち</rt></ruby>の<ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>会話<rt>かいわ</rt></ruby>や、くだらない<ruby>冗談<rt>じょうだん</rt></ruby>が<ruby>教室<rt>きょうしつ</rt></ruby>の <ruby>雰囲気<rt>ふんいき</rt></ruby>を<ruby>柔らかく<rt>やわらかく</rt></ruby>してくれるのだと<ruby>思う<rt>おもう</rt></ruby>。\n。<ruby>痛い<rt>いたい</rt></ruby><ruby>静電気<rt>せいでんき</rt></ruby>の<ruby>一瞬<rt>いっしゅん</rt></ruby>も、<ruby>笑い<rt>わらい</rt></ruby>に<ruby>変え<rt>かえ</rt></ruby>られれば、<ruby>人<rt>にん</rt></ruby>との<ruby>距離<rt>きょり</rt></ruby>は缩る。もし<ruby>今日<rt>きょう</rt></ruby>、<ruby>静電気<rt>せいでんき</rt></ruby>で<ruby>痛<rt>つう</rt></ruby> い<ruby>思い<rt>おもい</rt></ruby>をした<ruby>高校生<rt>こうこうせい</rt></ruby>がいたら、その<ruby>瞬間<rt>しゅんかん</rt></ruby>だけでも、<ruby>近く<rt>ちかく</rt></ruby>にいる<ruby>友<rt>とも</rt></ruby>だちの<ruby>顔<rt>かお</rt></ruby>を<ruby>思い出して<rt>おもいだして</rt></ruby>みよ う。<ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>火花<rt>ひばな</rt></ruby>が、むしろ<ruby>心<rt>こころ</rt></ruby>を<ruby>温め<rt>あたため</rt></ruby>てくれるかもしれない。\n。\n。26. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「パチッ」という<ruby>音<rt>おと</rt></ruby>は<ruby>何の<rt>なんの</rt></ruby><ruby>音<rt>おと</rt></ruby>を<ruby>指す<rt>さす</rt></ruby>か。\n。A.<ruby>静電気<rt>せいでんき</rt></ruby>が<ruby>発生<rt>はっせい</rt></ruby>する<ruby>音<rt>おと</rt></ruby> B. <ruby>友<rt>とも</rt></ruby>だちが<ruby>手<rt>て</rt></ruby>を<ruby>叩い<rt>たたい</rt></ruby>た<ruby>音<rt>おと</rt></ruby>\n<ruby>音<rt>おと</rt></ruby>C. チョークの <ruby>粉<rt>こな</rt></ruby>が<ruby>跳ね<rt>はね</rt></ruby>る<ruby>音<rt>おと</rt></ruby> D. ドアノブに <ruby>触れた<rt>ふれた</rt></ruby>ときの<ruby>音<rt>おと</rt></ruby>", "translation_cn": "(2)冬天，高中教室里到处都可以听到噼啪的细小声音。我的手指一碰门把手就会痛，当我把手放在朋友的肩膀上时，就会冒出火花。有些早晨，我什至在感到寒冷之前就因静电而醒来。这对于高中生来说可能有点问题，但这是一个会让你发笑的季节性活动。我班上有一些学生特别容易产生静电。每次我脱下外套时，都会听到咔哒声，吓到附近的人。就连我擦黑板的时候，粉笔灰也轻轻飞溅，引得周围的同学哈哈大笑。他一脸严肃地说：“再见……”，但这实际上让大家都笑了。有一天，课间休息时，学生自言自语道：“我不知道为什么只有我一个人每天都这样。”然后我的朋友轻轻地开玩笑说：“那是因为冬天空气干燥。”小心别让你的心干涸了。”教室里的气氛一下子变得明亮起来，大家都笑了起来。空气干燥时更容易产生静电。然而，人际关系有点不同。当你的心枯竭时，你往往会与人发生更多的冲突。 (a) 我认为每天的闲聊和愚蠢的笑话都会使课堂气氛变得柔和。如果你能把哪怕是一瞬间痛苦的静电变成笑声，你和其他人之间的距离就会缩短。如果你现在是一名高中生，并且因静电而经历过痛苦的经历，请尝试记住附近朋友的面孔，即使只是那一刻。一个小小的火花实际上可能温暖你的心。 26.句子中的“咔哒”声指的是什么声音？ A. 静电声 B. 朋友拍手的声音 C. 粉笔灰飞溅的声音 D. 触摸门把手的声音"}, {"number": 27, "answer": "B", "body": "27. 文中に「驚く」とあるが、なぜ驚くか。\nA. 触れた瞬間に火花が見えるから B. 上着を脱ぐたびに音が鳴るから\nC. 黒板を消すたびに粉が跳ねるから D. 教室の中で音が続けて起きるから", "ruby_html": "27. <ruby>文中<rt>ぶんちゅう</rt></ruby>に「<ruby>驚く<rt>おどろく</rt></ruby>」とあるが、なぜ<ruby>驚く<rt>おどろく</rt></ruby>か。\n。A. <ruby>触れた<rt>ふれた</rt></ruby><ruby>瞬間<rt>しゅんかん</rt></ruby>に<ruby>火花<rt>ひばな</rt></ruby>が<ruby>見え<rt>みえ</rt></ruby>るから B. <ruby>上着<rt>うわぎ</rt></ruby>を<ruby>脱ぐ<rt>ぬぐ</rt></ruby>たびに<ruby>音<rt>おと</rt></ruby>が<ruby>鳴る<rt>なる</rt></ruby>から\nからC. <ruby>黒板<rt>こくばん</rt></ruby>を<ruby>消す<rt>けす</rt></ruby>たびに<ruby>粉<rt>こな</rt></ruby>が<ruby>跳ね<rt>はね</rt></ruby>るから D. <ruby>教室<rt>きょうしつ</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で<ruby>音<rt>おと</rt></ruby>が<ruby>続け<rt>つづけ</rt></ruby>て<ruby>起き<rt>おき</rt></ruby>るから", "translation_cn": "27. 文字说“我很惊讶”。你为什么感到惊讶？ A. 因为一碰就可以看到火花。 B. 因为每次脱掉夹克时它都会发出声音。 C. 因为每次关闭黑板时粉末都会飞溅。 D. 因为教室里不断传来噪音。"}, {"number": 28, "answer": "D", "body": "28. 文中に「心まで乾かさないように気をつけろ」 とあるが、なぜそう言ったか。\nA. 冬は寒さで体調を崩しやすいから B. 冬の勉強は集中力が続かないから\nC. 教室の空気を加湿する必要があるから D. 心が乾くと人と衝突しやすくなるか", "ruby_html": "28. <ruby>文中<rt>ぶんちゅう</rt></ruby>に「<ruby>心<rt>こころ</rt></ruby>まで<ruby>乾か<rt>かわか</rt></ruby>さないように<ruby>気を<rt>きを</rt></ruby>つけろ」 とあるが、なぜそう<ruby>言った<rt>いった</rt></ruby>か。\n。A. <ruby>冬<rt>ふゆ</rt></ruby>は<ruby>寒さ<rt>さむさ</rt></ruby>で<ruby>体調<rt>たいちょう</rt></ruby>を<ruby>崩し<rt>くずし</rt></ruby>やすいから B. <ruby>冬<rt>ふゆ</rt></ruby>の<ruby>勉強<rt>べんきょう</rt></ruby>は<ruby>集中力<rt>しゅうちゅうりょく</rt></ruby>が<ruby>続か<rt>つづか</rt></ruby>ないから\nないからC. <ruby>教室<rt>きょうしつ</rt></ruby>の<ruby>空気<rt>くうき</rt></ruby>を<ruby>加湿<rt>かしつ</rt></ruby>する<ruby>必要<rt>ひつよう</rt></ruby>があるから D. <ruby>心<rt>こころ</rt></ruby>が<ruby>乾く<rt>かわく</rt></ruby>と<ruby>人<rt>にん</rt></ruby>と<ruby>衝突<rt>しょうとつ</rt></ruby>しやすくなるか", "translation_cn": "28. 经文说：“小心不要让你的心枯竭。”他为什么这么说？ A. 冬天容易感冒 B. 冬天学习很难集中注意力 C. 需要给教室的空气加湿 D. 头脑干燥是否会让你更容易与他人发生冲突？"}, {"number": 29, "answer": "D", "body": "29. 文中の (ア) に入れるのに最も適当なものはどれか。\nA. それでも B. それでは C. ところで D. だからこそ", "ruby_html": "29. <ruby>文中<rt>ぶんちゅう</rt></ruby>の (ア) に<ruby>入れ<rt>いれ</rt></ruby>るのに<ruby>最も<rt>もっとも</rt></ruby><ruby>適当<rt>てきとう</rt></ruby>なものはどれか。\n。A. それでも B. それでは C. ところで D. だからこそ", "translation_cn": "29. 以下哪项最适合放在句子中的 (a) 中？ A. 还是 B. 然后 C. 顺便说一下 D. 这就是原因"}, {"number": 30, "answer": "C", "body": "30. 文中に「小さな火花が、むしろ心を温めてくれる」 とあるが、なぜそう言うか。\nA. 冬の寒さを忘れられるから B. 教室全体が明るくなるから\nC. 痛い瞬間が笑いに変わるから D. 何気ない会話が続いていくから", "ruby_html": "30. <ruby>文中<rt>ぶんちゅう</rt></ruby>に「<ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>火花<rt>ひばな</rt></ruby>が、むしろ<ruby>心<rt>こころ</rt></ruby>を<ruby>温め<rt>あたため</rt></ruby>てくれる」 とあるが、なぜそう<ruby>言う<rt>いう</rt></ruby>か。\n。A. <ruby>冬<rt>ふゆ</rt></ruby>の<ruby>寒さ<rt>さむさ</rt></ruby>を<ruby>忘れ<rt>わすれ</rt></ruby>られるから B. <ruby>教室<rt>きょうしつ</rt></ruby><ruby>全体<rt>ぜんたい</rt></ruby>が<ruby>明るく<rt>あかるく</rt></ruby>なるから\nなるからC. <ruby>痛い<rt>いたい</rt></ruby><ruby>瞬間<rt>しゅんかん</rt></ruby>が<ruby>笑い<rt>わらい</rt></ruby>に<ruby>変わ<rt>かわ</rt></ruby>るから D. <ruby>何気な<rt>なにげな</rt></ruby>い<ruby>会話<rt>かいわ</rt></ruby>が<ruby>続い<rt>つづい</rt></ruby>ていくから", "translation_cn": "30. 经文说：“小小的火花，其实温暖人心。”为什么这么说？ A. 因为你可以忘记冬天的寒冷 B. 因为整个教室会更明亮 C. 因为痛苦的时刻会变成欢笑 D. 因为随意的谈话会继续"}, {"number": 31, "answer": "B", "body": "(三)\n先日、駅の階段を上っていると、手すり(扶手)のところに一枚の小さなメモが貼られてい た。「落とし物です。心当たりの方は駅員さんへ」と丁寧に書かれ、横には拾った人のイニシャ ル(姓名首字母缩写)もあった。私は思わ ずその紙に見入った。\n日本では、落とし物を見つけたら届けることが一般的だ。しかし、必ず持ち主が見つかる わけではないのに、多くの人が当たり前のように届けている。その習慣の背景には、どんな 理由があるのだろうか。\nちょうどそのとき、近くで女子高生がイヤホンを拾った。しばらく迷っていたが、最後には 駅員室の方へ歩き出した。きっと「誰かが困っているかもしれない」という想像が彼女を動か したのだろう。このような「見えない他人」を思いやる想像力こそ、日本の公共空間を支えて きた大切な要素なのかもしれない。信号を守ることも、列に並ぶことも、落とし物を届ける ことも、その多くは誰かのための行動である。\n一方で、最近は「自分さえ良ければいい」という態度も目立ち始めている。SNSでは、電車 内でのマナ一違反を撮影して晒し、炎上につながることもある。人を批判する前に、自分の 行動を見つめ直す余裕はどれほどあるのだろうか。\n階段を上り切るこころ、私はもう一度メモを振り返った。拾った人は、ただ失くし物をした誰 かのことを想像しただけだろう。しかし、その小さな想像力と勇気が、誰かの心を温め、社 会を静かに支えている。「当たり前」の裏には、いつも名もなき善意があるのだ。\n\n31. 文中に「その紙に見入った」とあるが、なぜそうしたか。\nA. メモの 文字がとても珍しかったから\nB. メモの 内容が丁寧で心に残ったから\nC. 手すりのところに人が集まっていたから\nD. 女子高生がイヤホンを拾うのを見たから", "ruby_html": "(<ruby>三<rt>さん</rt></ruby>)\n)<ruby>先日<rt>せんじつ</rt></ruby>、<ruby>駅<rt>えき</rt></ruby>の<ruby>階段<rt>かいだん</rt></ruby>を<ruby>上っ<rt>あっ</rt></ruby>ていると、<ruby>手<rt>て</rt></ruby>すり(<ruby>扶<rt>ふ</rt></ruby><ruby>手<rt>て</rt></ruby>)のところに<ruby>一枚<rt>いちまい</rt></ruby>の<ruby>小さ<rt>ちいさ</rt></ruby>なメモが<ruby>貼ら<rt>はら</rt></ruby>れてい た。「<ruby>落とし物<rt>おとしもの</rt></ruby>です。<ruby>心当たり<rt>こころあたり</rt></ruby>の<ruby>方は<rt>かたは</rt></ruby><ruby>駅員<rt>えきいん</rt></ruby>さんへ」と<ruby>丁寧<rt>ていねい</rt></ruby>に<ruby>書か<rt>かか</rt></ruby>れ、<ruby>横<rt>よこ</rt></ruby>には<ruby>拾っ<rt>ひろっ</rt></ruby>た<ruby>人<rt>にん</rt></ruby>のイニシャ ル(<ruby>姓名<rt>せいめい</rt></ruby><ruby>首<rt>くび</rt></ruby><ruby>字母<rt>じぼ</rt></ruby>缩)もあった。<ruby>私<rt>わたし</rt></ruby>は<ruby>思わ<rt>おもわ</rt></ruby> ずその<ruby>紙<rt>かみ</rt></ruby>に<ruby>見入った<rt>みいった</rt></ruby>。\n。<ruby>日本<rt>にっぽん</rt></ruby>では、<ruby>落とし物<rt>おとしもの</rt></ruby>を<ruby>見つ<rt>みつ</rt></ruby>けたら<ruby>届け<rt>とどけ</rt></ruby>ることが<ruby>一般的<rt>いっぱんてき</rt></ruby>だ。しかし、<ruby>必ず<rt>かならず</rt></ruby><ruby>持ち主<rt>もちぬし</rt></ruby>が<ruby>見つ<rt>みつ</rt></ruby>かる わけではないのに、<ruby>多く<rt>おおく</rt></ruby>の<ruby>人<rt>にん</rt></ruby>が<ruby>当たり前<rt>あたりまえ</rt></ruby>のように<ruby>届け<rt>とどけ</rt></ruby>ている。その<ruby>習慣<rt>しゅうかん</rt></ruby>の<ruby>背景<rt>はいけい</rt></ruby>には、どんな <ruby>理由<rt>りゆう</rt></ruby>があるのだろうか。\n。ちょうどそのとき、<ruby>近く<rt>ちかく</rt></ruby>で<ruby>女子高生<rt>じょしこうせい</rt></ruby>がイヤホンを<ruby>拾っ<rt>ひろっ</rt></ruby>た。しばらく<ruby>迷っ<rt>まよっ</rt></ruby>ていたが、<ruby>最後<rt>さいご</rt></ruby>には <ruby>駅員<rt>えきいん</rt></ruby><ruby>室<rt>しつ</rt></ruby>の<ruby>方<rt>ほう</rt></ruby>へ<ruby>歩き出した<rt>あるきだした</rt></ruby>。きっと「<ruby>誰か<rt>だれか</rt></ruby>が<ruby>困っ<rt>こまっ</rt></ruby>ているかもしれない」という<ruby>想像<rt>そうぞう</rt></ruby>が<ruby>彼女<rt>かのじょ</rt></ruby>を<ruby>動か<rt>うごか</rt></ruby> したのだろう。このような「<ruby>見え<rt>みえ</rt></ruby>ない<ruby>他人<rt>たにん</rt></ruby>」を<ruby>思いやる<rt>おもいやる</rt></ruby><ruby>想像力<rt>そうぞうりょく</rt></ruby>こそ、<ruby>日本<rt>にっぽん</rt></ruby>の<ruby>公共<rt>こうきょう</rt></ruby><ruby>空間<rt>くうかん</rt></ruby>を<ruby>支え<rt>ささえ</rt></ruby>て きた<ruby>大切<rt>たいせつ</rt></ruby>な<ruby>要素<rt>ようそ</rt></ruby>なのかもしれない。<ruby>信号<rt>しんごう</rt></ruby>を<ruby>守る<rt>まもる</rt></ruby>ことも、<ruby>列に<rt>つらに</rt></ruby><ruby>並ぶ<rt>ならぶ</rt></ruby>ことも、<ruby>落とし物<rt>おとしもの</rt></ruby>を<ruby>届け<rt>とどけ</rt></ruby>る ことも、その<ruby>多く<rt>おおく</rt></ruby>は<ruby>誰か<rt>だれか</rt></ruby>のための<ruby>行動<rt>こうどう</rt></ruby>である。\n。<ruby>一方<rt>いっぽう</rt></ruby>で、<ruby>最近<rt>さいきん</rt></ruby>は「<ruby>自分さえ良ければ<rt>じぶんさえよければ</rt></ruby>いい」という<ruby>態度<rt>たいど</rt></ruby>も<ruby>目立ち始めている<rt>めだちはじめている</rt></ruby>。SNSでは、<ruby>電車<rt>でんしゃ</rt></ruby> <ruby>内<rt>ない</rt></ruby>でのマナ<ruby>一<rt>いち</rt></ruby><ruby>違反<rt>いはん</rt></ruby>を<ruby>撮影<rt>さつえい</rt></ruby>して<ruby>晒し<rt>さらし</rt></ruby>、<ruby>炎上につながる<rt>えんじょうにつながる</rt></ruby>こともある。<ruby>人<rt>にん</rt></ruby>を<ruby>批判<rt>ひはん</rt></ruby>する<ruby>前<rt>まえ</rt></ruby>に、<ruby>自分<rt>じぶん</rt></ruby>の <ruby>行動<rt>こうどう</rt></ruby>を<ruby>見つめ直す<rt>みつめなおす</rt></ruby><ruby>余裕<rt>よゆう</rt></ruby>はどれほどあるのだろうか。\n。<ruby>階段<rt>かいだん</rt></ruby>を<ruby>上り切る<rt>のぼりきる</rt></ruby>こころ、<ruby>私<rt>わたし</rt></ruby>はもう<ruby>一度<rt>いちど</rt></ruby>メモを<ruby>振り返った<rt>ふりかえった</rt></ruby>。<ruby>拾っ<rt>ひろっ</rt></ruby>た<ruby>人<rt>にん</rt></ruby>は、ただ<ruby>失く<rt>なく</rt></ruby>し<ruby>物<rt>もの</rt></ruby>をした<ruby>誰<rt>だれ</rt></ruby> かのことを<ruby>想像<rt>そうぞう</rt></ruby>しただけだろう。しかし、その<ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>想像力<rt>そうぞうりょく</rt></ruby>と<ruby>勇気<rt>ゆうき</rt></ruby>が、<ruby>誰か<rt>だれか</rt></ruby>の<ruby>心<rt>こころ</rt></ruby>を<ruby>温め<rt>あたため</rt></ruby>、<ruby>社<rt>しゃ</rt></ruby> <ruby>会を<rt>あを</rt></ruby><ruby>静か<rt>しずか</rt></ruby>に<ruby>支え<rt>ささえ</rt></ruby>ている。「<ruby>当たり前<rt>あたりまえ</rt></ruby>」の<ruby>裏<rt>うら</rt></ruby>には、いつも<ruby>名もなき<rt>なもなき</rt></ruby><ruby>善意<rt>ぜんい</rt></ruby>があるのだ。\n。\n。31. <ruby>文中<rt>ぶんちゅう</rt></ruby>に「その<ruby>紙<rt>かみ</rt></ruby>に<ruby>見入った<rt>みいった</rt></ruby>」とあるが、なぜそうしたか。\n。A. メモの <ruby>文字<rt>もじ</rt></ruby>がとても<ruby>珍しか<rt>めずらしか</rt></ruby>ったから\nったからB. メモの <ruby>内容<rt>ないよう</rt></ruby>が<ruby>丁寧<rt>ていねい</rt></ruby>で<ruby>心<rt>こころ</rt></ruby>に<ruby>残っ<rt>のこっ</rt></ruby>たから\nたからC. <ruby>手<rt>て</rt></ruby>すりのところに<ruby>人<rt>にん</rt></ruby>が<ruby>集ま<rt>あつま</rt></ruby>っていたから\nっていたからD. <ruby>女子高生<rt>じょしこうせい</rt></ruby>がイヤホンを<ruby>拾う<rt>ひろう</rt></ruby>のを<ruby>見た<rt>みた</rt></ruby>から", "translation_cn": "(3) 有一天，我在车站爬楼梯时，看到扶手上粘着一张小纸条。 “这是一件丢失的物品。如果你知道什么，请联系车站工作人员。”上面写得很仔细，旁边还有发现者的名字缩写。我忍不住盯着报纸。在日本，人们发现丢失物品后报告丢失的情况很常见。然而，尽管并不总是能找到失主，但许多人仍然理所当然地把物品送到了。这种习俗背后的原因是什么？就在这时，旁边的一名女高中生拿起了耳机。我犹豫了一会儿，最终还是朝车站工作人员的房间走去。她可能是因为想到有人可能遇到麻烦而感动。这种关心“看不见的他人”的想象力或许是支撑日本公共空间的重要元素。遵守交通灯、排队等候、运送丢失的物品通常是我们为别人所做的事情。另一方面，最近开始出现一种“只要我好就行”的态度。在社交媒体上，火车上违反规定的人被拍照曝光，可能会引起轩然大波。在批评别人之前，我们需要多少时间重新考虑自己的行为？正要爬楼梯的时候，我又看了一眼笔记。发现它的人可能只是想象一个失去了东西的人。然而，那一点点的想象力和勇气却温暖了一个人的心，默默地支持着社会。 “正常”的背后总有一些无名的善意。 31. 文字说：“我对那篇论文着迷。”你为什么这么做？ A. 因为备忘录上的文字很不寻常 B. 因为备忘录的内容详细且令人难忘 C. 因为栏杆处聚集了很多人 D. 因为我看到一个高中女生拿起了耳机"}, {"number": 32, "answer": "C", "body": "32. 文中の「見えない他人」とは誰のことか。\nA. 駅の周りにいた観光客の人 B .階段を上っていたす ての人\nC. 落とし物をしたかもしれない人 D. 公共空間で他人に迷惑をかけない人\n日语试题 第6页(共10页)", "ruby_html": "32. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「<ruby>見え<rt>みえ</rt></ruby>ない<ruby>他人<rt>たにん</rt></ruby>」とは<ruby>誰<rt>だれ</rt></ruby>のことか。\n。A. <ruby>駅<rt>えき</rt></ruby>の<ruby>周り<rt>まわり</rt></ruby>にいた<ruby>観光客<rt>かんこうきゃく</rt></ruby>の<ruby>人<rt>にん</rt></ruby> B .<ruby>階段<rt>かいだん</rt></ruby>を<ruby>上っ<rt>あっ</rt></ruby>ていたす ての<ruby>人<rt>にん</rt></ruby>\n<ruby>人<rt>にん</rt></ruby>C. <ruby>落とし物<rt>おとしもの</rt></ruby>をしたかもしれない<ruby>人<rt>にん</rt></ruby> D. <ruby>公共<rt>こうきょう</rt></ruby><ruby>空間<rt>くうかん</rt></ruby>で<ruby>他人<rt>たにん</rt></ruby>に<ruby>迷惑<rt>めいわく</rt></ruby>をかけない<ruby>人<rt>にん</rt></ruby>\n<ruby>人<rt>にん</rt></ruby><ruby>日<rt>にち</rt></ruby>语题<ruby>第<rt>だい</rt></ruby>6页<ruby>共<rt>とも</rt></ruby>10页", "translation_cn": "32.文中的“隐形陌生人”是谁？ A. 车站周围的游客 B. 正在爬楼梯的人 C. 可能丢失东西的人 D. 不在公共场所给他人造成麻烦的人"}, {"number": 33, "answer": "C", "body": "33. 文中の「炎上につながることもある」 は、どういう意味か。\nA. ほめる 声が増えて広がること B. 情報が削除されて消えること\nC. 批判が集中して問題化すること D. マナ 一違反がすぐ解決すること", "ruby_html": "33. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「<ruby>炎上につながる<rt>えんじょうにつながる</rt></ruby>こともある」 は、どういう<ruby>意味<rt>いみ</rt></ruby>か。\n。A. ほめる <ruby>声<rt>こえ</rt></ruby>が<ruby>増え<rt>ふえ</rt></ruby>て<ruby>広が<rt>ひろが</rt></ruby>ること B. <ruby>情報<rt>じょうほう</rt></ruby>が<ruby>削除<rt>さくじょ</rt></ruby>されて<ruby>消え<rt>きえ</rt></ruby>ること\nることC. <ruby>批判<rt>ひはん</rt></ruby>が<ruby>集中<rt>しゅうちゅう</rt></ruby>して<ruby>問題化<rt>もんだいか</rt></ruby>すること D. マナ <ruby>一<rt>いち</rt></ruby><ruby>違反<rt>いはん</rt></ruby>がすぐ<ruby>解決<rt>かいけつ</rt></ruby>すること", "translation_cn": "33.句子中的“可能导致火灾”是什么意思？ A. 赞扬：声音增加并传播 B. 信息被删除并消失 C. 批评集中并成为问题 D. 玛那：违规行为很快得到解决"}, {"number": 34, "answer": "D", "body": "34. 文中に「もう一度メモを振り返った」とあるが、なぜそうしたか。\nA. メモの 内容が疑わしく思えたから\nB. メモの 落とし主を確認したかったから\nC . メモを書いた人を直接探したかったから\nD. メモに 迟められた思いやりに気づいたから", "ruby_html": "34. <ruby>文中<rt>ぶんちゅう</rt></ruby>に「もう<ruby>一度<rt>いちど</rt></ruby>メモを<ruby>振り返った<rt>ふりかえった</rt></ruby>」とあるが、なぜそうしたか。\n。A. メモの <ruby>内容<rt>ないよう</rt></ruby>が<ruby>疑わしく<rt>うたがわしく</rt></ruby><ruby>思え<rt>おもえ</rt></ruby>たから\nたからB. メモの <ruby>落と<rt>おと</rt></ruby>し<ruby>主<rt>しゅ</rt></ruby>を<ruby>確認し<rt>かくにんし</rt></ruby>たかったから\nたかったからC . メモを<ruby>書い<rt>かい</rt></ruby>た<ruby>人<rt>にん</rt></ruby>を<ruby>直接<rt>ちょくせつ</rt></ruby><ruby>探し<rt>さがし</rt></ruby>たかったから\nたかったからD. メモに 迟られた<ruby>思いやり<rt>おもいやり</rt></ruby>に<ruby>気づ<rt>きづ</rt></ruby>いたから", "translation_cn": "34. 文字说：“我再次回顾了我的笔记。”你为什么这样做？ A. 因为我认为备忘录的内容可疑 B. 因为我想确认丢下备忘录的人 C. 因为我想找到写备忘录的人 D. 因为我意识到备忘录所表现出的同情心"}, {"number": 35, "answer": "A", "body": "35. 文章の内容に合っているのはどれか。\nA. 女子高生は落とし物を駅員に届けることにした。\nB. 信号を守る行動は自分の利益だけを考えている。\nC. 落とし物を届けるのは法律で義務付けられている。\nD. 日本では落とし物を見つけても持ち帰る人が多い。", "ruby_html": "35. <ruby>文章<rt>ぶんしょう</rt></ruby>の<ruby>内容<rt>ないよう</rt></ruby>に<ruby>合っ<rt>あっ</rt></ruby>ているのはどれか。\n。A. <ruby>女子高生<rt>じょしこうせい</rt></ruby>は<ruby>落とし物<rt>おとしもの</rt></ruby>を<ruby>駅員<rt>えきいん</rt></ruby>に<ruby>届け<rt>とどけ</rt></ruby>ることにした。\n。B. <ruby>信号<rt>しんごう</rt></ruby>を<ruby>守る<rt>まもる</rt></ruby><ruby>行動<rt>こうどう</rt></ruby>は<ruby>自分<rt>じぶん</rt></ruby>の<ruby>利益<rt>りえき</rt></ruby>だけを<ruby>考え<rt>かんがえ</rt></ruby>ている。\n。C. <ruby>落とし物<rt>おとしもの</rt></ruby>を<ruby>届け<rt>とどけ</rt></ruby>るのは<ruby>法律<rt>ほうりつ</rt></ruby>で<ruby>義務付け<rt>ぎむづけ</rt></ruby>られている。\n。D. <ruby>日本<rt>にっぽん</rt></ruby>では<ruby>落とし物<rt>おとしもの</rt></ruby>を<ruby>見つ<rt>みつ</rt></ruby>けても<ruby>持ち帰る<rt>もちかえる</rt></ruby><ruby>人<rt>にん</rt></ruby>が<ruby>多い<rt>おおい</rt></ruby>。", "translation_cn": "35.下列哪项与句子的内容相符？ A. 高中女生决定将丢失的物品交给车站工作人员。 B. 遵守交通灯的行为完全基于个人的自身利益。 C. 法律要求报告丢失的财产。 D. 在日本，很多人找到丢失的物品后都会带回家。"}, {"number": 36, "answer": "B", "body": "(四)\n街角を歩いていて、パンの焼ける香りがあっと漂ってくると、なぜか心が(ア)なること がある。また、季節の花の匂いを感じただけで、昔の出来事がよみがえることもある。人は なぜ、これほど「香り」に強く反応するのだろうか。嗅觉生理学を専門とするKさんに話を聞 いた。\n「嗅觉は五感の中で最も感情と結びつきやすい感觉です。香りの情報は大脳辺緣系に直接届 き、意識より先に心が反応します」とKさんは説明する。幼い頃の家の匂いを、大人になって 同じ香りで突然思い出すのは、この「直通ルート」 のためだという。\nさらに、好きな香りを嗅ぐと、人の体内ではリラックス作用のある物質が分泌される。「ア ロマテラピー(芳香疗法)が広く受け入れられたのは、科学的根拠があったからです。香りは自 律神経にも影響し、集中力や睡眠の質を高めることができます。\n一方、文化によって「良い香り」の基準は大きく異なる。Kさんによれば、同じ香りでも国に よって評価が分かれるのは珍しくない。日本では落ち着きを与える檜の香りが、海外では単 なる「木の匂い」と感じられ、落ち着かない人もいるという。香りの好みは遺伝より経験に左 右される部分が大きい。\nまた、香りは生活の質にも関わる。人は無意識に匂いで環境の安全性を判断するため、悪 臭が続く場所ではストレスが増える。「香りは目に見えませんが、心理状態を大きく左右しま す。良い香りを選ぶことは、自分の毎日を整える方法の一つなんです」。\n\n最後にKさんは、「香りは記憶を開く小さな鍵です」 と語った。気づかない匂いの中にこそ、 人の感情を動かす力が隠されているのかもしれない。\n\n36. 文中の(ア)に入れるのに最も適当なものはどれか。\nA. 寂しく B. 温かく C. 苦し< D. 冷たく", "ruby_html": "(<ruby>四<rt>し</rt></ruby>)\n)<ruby>街角<rt>まちかど</rt></ruby>を<ruby>歩い<rt>あるい</rt></ruby>ていて、パンの<ruby>焼け<rt>やけ</rt></ruby>る<ruby>香り<rt>かおり</rt></ruby>があっと<ruby>漂っ<rt>ただよっ</rt></ruby>てくると、なぜか<ruby>心<rt>こころ</rt></ruby>が(ア)なること がある。また、<ruby>季節<rt>きせつ</rt></ruby>の<ruby>花<rt>はな</rt></ruby>の<ruby>匂い<rt>におい</rt></ruby>を<ruby>感じ<rt>かんじ</rt></ruby>ただけで、<ruby>昔<rt>むかし</rt></ruby>の<ruby>出来事<rt>できごと</rt></ruby>が<ruby>よみがえる<rt>よみがえる</rt></ruby>こともある。<ruby>人<rt>にん</rt></ruby>は なぜ、これほど「<ruby>香り<rt>かおり</rt></ruby>」に<ruby>強く<rt>つよく</rt></ruby><ruby>反応<rt>はんのう</rt></ruby>するのだろうか。<ruby>嗅<rt>きゅう</rt></ruby>觉<ruby>理学<rt>りがく</rt></ruby>を<ruby>専門<rt>せんもん</rt></ruby>とするKさんに<ruby>話<rt>はなし</rt></ruby>を<ruby>聞<rt>ぶん</rt></ruby> いた。\n。「<ruby>嗅<rt>きゅう</rt></ruby>觉<ruby>五感<rt>ごかん</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で<ruby>最も<rt>もっとも</rt></ruby><ruby>感情<rt>かんじょう</rt></ruby>と<ruby>結び<rt>むすび</rt></ruby>つきやすい<ruby>感<rt>かん</rt></ruby>觉す。<ruby>香り<rt>かおり</rt></ruby>の<ruby>情報<rt>じょうほう</rt></ruby>は<ruby>大脳辺緣<rt>だいのうへんえん</rt></ruby><ruby>系<rt>けい</rt></ruby>に<ruby>直接<rt>ちょくせつ</rt></ruby><ruby>届<rt>とどけ</rt></ruby> き、<ruby>意識<rt>いしき</rt></ruby>より<ruby>先に<rt>さきに</rt></ruby><ruby>心<rt>こころ</rt></ruby>が<ruby>反応<rt>はんのう</rt></ruby>します」とKさんは<ruby>説明す<rt>せつめいす</rt></ruby>る。<ruby>幼い頃<rt>おさないころ</rt></ruby>の<ruby>家<rt>いえ</rt></ruby>の<ruby>匂い<rt>におい</rt></ruby>を、<ruby>大人<rt>おとな</rt></ruby>になって <ruby>同じ<rt>おなじ</rt></ruby><ruby>香り<rt>かおり</rt></ruby>で<ruby>突然<rt>とつぜん</rt></ruby><ruby>思い出す<rt>おもいだす</rt></ruby>のは、この「<ruby>直通<rt>ちょくつう</rt></ruby>ルート」 のためだという。\n。さらに、<ruby>好き<rt>すき</rt></ruby>な<ruby>香り<rt>かおり</rt></ruby>を<ruby>嗅ぐ<rt>かぐ</rt></ruby>と、<ruby>人<rt>にん</rt></ruby>の<ruby>体内<rt>たいない</rt></ruby>ではリラックス<ruby>作用<rt>さよう</rt></ruby>のある<ruby>物質<rt>ぶっしつ</rt></ruby>が<ruby>分泌<rt>ぶんぴつ</rt></ruby>される。「ア ロマテラピー(<ruby>芳香<rt>ほうこう</rt></ruby>疗)が<ruby>広く<rt>ひろく</rt></ruby><ruby>受け入れられた<rt>うけいれられた</rt></ruby>のは、<ruby>科学的根拠<rt>かがくてきこんきょ</rt></ruby>があったからです。<ruby>香り<rt>かおり</rt></ruby>は<ruby>自<rt>じ</rt></ruby> <ruby>律<rt>りつ</rt></ruby><ruby>神経<rt>しんけい</rt></ruby>にも<ruby>影響<rt>えいきょう</rt></ruby>し、<ruby>集中力<rt>しゅうちゅうりょく</rt></ruby>や<ruby>睡眠<rt>すいみん</rt></ruby>の<ruby>質<rt>しつ</rt></ruby>を<ruby>高め<rt>たかめ</rt></ruby>ることができます。\n。<ruby>一方<rt>いっぽう</rt></ruby>、<ruby>文化<rt>ぶんか</rt></ruby>によって「<ruby>良い<rt>よい</rt></ruby><ruby>香り<rt>かおり</rt></ruby>」の<ruby>基準<rt>きじゅん</rt></ruby>は<ruby>大きく<rt>おおきく</rt></ruby><ruby>異なる<rt>ことなる</rt></ruby>。Kさんによれば、<ruby>同じ<rt>おなじ</rt></ruby><ruby>香り<rt>かおり</rt></ruby>でも<ruby>国<rt>くに</rt></ruby>に よって<ruby>評価<rt>ひょうか</rt></ruby>が<ruby>分か<rt>わか</rt></ruby>れるのは<ruby>珍しく<rt>めずらしく</rt></ruby>ない。<ruby>日本<rt>にっぽん</rt></ruby>では<ruby>落ち着き<rt>おちつき</rt></ruby>を<ruby>与え<rt>あたえ</rt></ruby>る<ruby>檜<rt>ひのき</rt></ruby>の<ruby>香り<rt>かおり</rt></ruby>が、<ruby>海外<rt>かいがい</rt></ruby>では<ruby>単<rt>たん</rt></ruby> なる「<ruby>木<rt>き</rt></ruby>の<ruby>匂い<rt>におい</rt></ruby>」と<ruby>感じ<rt>かんじ</rt></ruby>られ、<ruby>落ち着か<rt>おちつか</rt></ruby>ない<ruby>人<rt>にん</rt></ruby>もいるという。<ruby>香り<rt>かおり</rt></ruby>の<ruby>好み<rt>このみ</rt></ruby>は<ruby>遺伝<rt>いでん</rt></ruby>より<ruby>経験<rt>けいけん</rt></ruby>に<ruby>左<rt>ひだり</rt></ruby> <ruby>右<rt>みぎ</rt></ruby>される<ruby>部分<rt>ぶぶん</rt></ruby>が<ruby>大きい<rt>おおきい</rt></ruby>。\n。また、<ruby>香り<rt>かおり</rt></ruby>は<ruby>生活<rt>せいかつ</rt></ruby>の<ruby>質<rt>しつ</rt></ruby>にも<ruby>関わ<rt>かかわ</rt></ruby>る。<ruby>人<rt>にん</rt></ruby>は<ruby>無意識<rt>むいしき</rt></ruby>に<ruby>匂い<rt>におい</rt></ruby>で<ruby>環境<rt>かんきょう</rt></ruby>の<ruby>安全性<rt>あんぜんせい</rt></ruby>を<ruby>判断<rt>はんだん</rt></ruby>するため、<ruby>悪<rt>あく</rt></ruby> <ruby>臭<rt>しゅう</rt></ruby>が<ruby>続く<rt>つづく</rt></ruby><ruby>場所<rt>ばしょ</rt></ruby>ではストレスが<ruby>増え<rt>ふえ</rt></ruby>る。「<ruby>香り<rt>かおり</rt></ruby>は<ruby>目に<rt>めに</rt></ruby><ruby>見え<rt>みえ</rt></ruby>ませんが、<ruby>心理状態<rt>しんりじょうたい</rt></ruby>を<ruby>大きく<rt>おおきく</rt></ruby><ruby>左右<rt>さゆう</rt></ruby>しま す。<ruby>良い<rt>よい</rt></ruby><ruby>香り<rt>かおり</rt></ruby>を<ruby>選ぶ<rt>えらぶ</rt></ruby>ことは、<ruby>自分<rt>じぶん</rt></ruby>の<ruby>毎日<rt>まいにち</rt></ruby>を<ruby>整え<rt>ととのえ</rt></ruby>る<ruby>方法<rt>ほうほう</rt></ruby>の<ruby>一つ<rt>ひとつ</rt></ruby>なんです」。\n。\n。<ruby>最後<rt>さいご</rt></ruby>にKさんは、「<ruby>香り<rt>かおり</rt></ruby>は<ruby>記憶<rt>きおく</rt></ruby>を<ruby>開く<rt>ひらく</rt></ruby><ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>鍵<rt>かぎ</rt></ruby>です」 と<ruby>語っ<rt>かたっ</rt></ruby>た。<ruby>気づ<rt>きづ</rt></ruby>かない<ruby>匂い<rt>におい</rt></ruby>の<ruby>中に<rt>なかに</rt></ruby>こそ、 <ruby>人<rt>にん</rt></ruby>の<ruby>感情<rt>かんじょう</rt></ruby>を<ruby>動か<rt>うごか</rt></ruby>す<ruby>力<rt>ちから</rt></ruby>が<ruby>隠さ<rt>かくさ</rt></ruby>れているのかもしれない。\n。\n。36. <ruby>文中<rt>ぶんちゅう</rt></ruby>の(ア)に<ruby>入れ<rt>いれ</rt></ruby>るのに<ruby>最も<rt>もっとも</rt></ruby><ruby>適当<rt>てきとう</rt></ruby>なものはどれか。\n。A. <ruby>寂しく<rt>さびしく</rt></ruby> B. <ruby>温かく<rt>あたたかく</rt></ruby> C. <ruby>苦し<rt>くるし</rt></ruby>< D. <ruby>冷たく<rt>つめたく</rt></ruby>", "translation_cn": "(4)当我走在街角，空气中突然飘散出烤面包的香味时，不知为何我感到(a)心碎。而且，光是时令花香就能唤起人们对往事的回忆。为什么人们对气味反应如此强烈？我们采访了专攻嗅觉生理学的 K 先生。 “嗅觉是五种感官中最容易与情感联系在一起的感觉。有关气味的信息直接到达大脑的边缘系统，大脑会先于意识对其做出反应。”K 先生解释说。据说，这条“直接路线”就是我们成年后突然想起童年家的气味的原因。此外，当您闻到自己喜欢的气味时，您的身体会分泌具有放松效果的物质。 “芳香疗法已被广泛接受，因为它有科学依据。气味也会影响自主神经系统，可以提高注意力和睡眠质量。然而，‘好气味’的标准因文化而异。 K先生表示，同一种香味在不同国家有不同评价的情况并不罕见。在日本，柏树的气味具有镇静作用，但在其他国家，它被认为只是“木头的气味”，有些人觉得它令人不安。香水偏好在很大程度上受到经验而非遗传的影响。香水还影响生活质量。人们下意识地根据气味来判断环境的安全性，因此持续存在难闻气味的地方会增加压力。 “香味是看不见的，但却对你的心理状态产生巨大的影响。选择好的香味是组织日常生活的一种方式。”最后，K先生说，“香味是一把打开记忆的小钥匙。”感动人们情绪的力量，可能就隐藏在不被注意的香味中。 36. 以下哪项最适合放在句子中的 (a) 中？ A. 孤独 B. 温暖 C. 苦涩 D. 寒冷"}, {"number": 37, "answer": "C", "body": "37. 文中の「直通ルート」は何を指すか。\nA.香りの情報が鼻から外に逃げる通路\nB. 香りと味覚が同時に脳に伝わる仕組み\nC. 香りの情報が大脳辺緣系に直接届く経路\nD. 香りと記憶が意識下で整理される仕組み", "ruby_html": "37. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「<ruby>直通<rt>ちょくつう</rt></ruby>ルート」は<ruby>何を<rt>なにを</rt></ruby><ruby>指す<rt>さす</rt></ruby>か。\n。A.<ruby>香り<rt>かおり</rt></ruby>の<ruby>情報<rt>じょうほう</rt></ruby>が<ruby>鼻<rt>はな</rt></ruby>から<ruby>外<rt>そと</rt></ruby>に<ruby>逃げ<rt>にげ</rt></ruby>る<ruby>通路<rt>つうろ</rt></ruby>\n<ruby>通路<rt>つうろ</rt></ruby>B. <ruby>香り<rt>かおり</rt></ruby>と<ruby>味覚<rt>みかく</rt></ruby>が<ruby>同時に<rt>どうじに</rt></ruby><ruby>脳<rt>のう</rt></ruby>に<ruby>伝わ<rt>つたわ</rt></ruby>る<ruby>仕組み<rt>しくみ</rt></ruby>\n<ruby>仕組み<rt>しくみ</rt></ruby>C. <ruby>香り<rt>かおり</rt></ruby>の<ruby>情報<rt>じょうほう</rt></ruby>が<ruby>大脳辺緣<rt>だいのうへんえん</rt></ruby><ruby>系<rt>けい</rt></ruby>に<ruby>直接<rt>ちょくせつ</rt></ruby><ruby>届く<rt>とどく</rt></ruby><ruby>経路<rt>けいろ</rt></ruby>\n<ruby>経路<rt>けいろ</rt></ruby>D. <ruby>香り<rt>かおり</rt></ruby>と<ruby>記憶<rt>きおく</rt></ruby>が<ruby>意識下<rt>いしきか</rt></ruby>で<ruby>整理<rt>せいり</rt></ruby>される<ruby>仕組み<rt>しくみ</rt></ruby>", "translation_cn": "37. 句子中的“直达路线”指的是什么？ A. 气味信息从鼻子逸出的路径 B. 气味和味觉同时传递到大脑的机制 C. 气味信息直接到达边缘系统的路径 D. 气味和记忆在意识下组织的机制"}, {"number": 38, "answer": "D", "body": "38. 文中 に「同じ香り .....珍しくない」とあるが、それはなぜか。\nA.香りの分子構造が国ごとに異なるから\nB. 香りは遺伝で決まる部分が大きいから\nC. 香りは全ての文化で同じ意味を持つ ら\nD. 香りの好みは経験に左右されやすいから", "ruby_html": "38. <ruby>文中<rt>ぶんちゅう</rt></ruby> に「<ruby>同じ<rt>おなじ</rt></ruby><ruby>香り<rt>かおり</rt></ruby> .....<ruby>珍しく<rt>めずらしく</rt></ruby>ない」とあるが、それはなぜか。\n。A.<ruby>香り<rt>かおり</rt></ruby>の<ruby>分子構造<rt>ぶんしこうぞう</rt></ruby>が<ruby>国<rt>くに</rt></ruby>ごとに<ruby>異なる<rt>ことなる</rt></ruby>から\nからB. <ruby>香り<rt>かおり</rt></ruby>は<ruby>遺伝<rt>いでん</rt></ruby>で<ruby>決ま<rt>きま</rt></ruby>る<ruby>部分<rt>ぶぶん</rt></ruby>が<ruby>大きい<rt>おおきい</rt></ruby>から\nからC. <ruby>香り<rt>かおり</rt></ruby>は<ruby>全て<rt>すべて</rt></ruby>の<ruby>文化<rt>ぶんか</rt></ruby>で<ruby>同じ<rt>おなじ</rt></ruby><ruby>意味<rt>いみ</rt></ruby>を<ruby>持つ<rt>もつ</rt></ruby> ら\nらD. <ruby>香り<rt>かおり</rt></ruby>の<ruby>好み<rt>このみ</rt></ruby>は<ruby>経験<rt>けいけん</rt></ruby>に<ruby>左右<rt>さゆう</rt></ruby>されやすいから", "translation_cn": "38. 文中说：“同样的气味……并不少见。”这是为什么？ A. 因为气味的分子结构因国家而异 B. 因为气味很大程度上由遗传决定 C. 因为气味在所有文化中具有相同的含义 D. 因为气味偏好很容易受到经验的影响"}, {"number": 39, "answer": "C", "body": "39. 文中の「香りは記憶を開く小さな鍵です」 とはどういう意味か。\nA. 香りは文化によって無意味になること\nB. 香りが直接物理的に記憶を保存すること\nC. 香りが人の感情や行動に影響を与えること\nD. 香りは心理状態に全く影響を与えないこと", "ruby_html": "39. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「<ruby>香り<rt>かおり</rt></ruby>は<ruby>記憶<rt>きおく</rt></ruby>を<ruby>開く<rt>ひらく</rt></ruby><ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>鍵<rt>かぎ</rt></ruby>です」 とはどういう<ruby>意味<rt>いみ</rt></ruby>か。\n。A. <ruby>香り<rt>かおり</rt></ruby>は<ruby>文化<rt>ぶんか</rt></ruby>によって<ruby>無意味<rt>むいみ</rt></ruby>になること\nになることB. <ruby>香り<rt>かおり</rt></ruby>が<ruby>直接<rt>ちょくせつ</rt></ruby><ruby>物理的<rt>ぶつりてき</rt></ruby>に<ruby>記憶<rt>きおく</rt></ruby>を<ruby>保存<rt>ほぞん</rt></ruby>すること\nすることC. <ruby>香り<rt>かおり</rt></ruby>が<ruby>人<rt>にん</rt></ruby>の<ruby>感情<rt>かんじょう</rt></ruby>や<ruby>行動<rt>こうどう</rt></ruby>に<ruby>影響<rt>えいきょう</rt></ruby>を<ruby>与え<rt>あたえ</rt></ruby>ること\nることD. <ruby>香り<rt>かおり</rt></ruby>は<ruby>心理状態<rt>しんりじょうたい</rt></ruby>に<ruby>全く<rt>まったく</rt></ruby><ruby>影響<rt>えいきょう</rt></ruby>を<ruby>与え<rt>あたえ</rt></ruby>ないこと", "translation_cn": "39.“气味是一把打开记忆的小钥匙”这句话是什么意思？ A. 文化使气味变得毫无意义 B. 气味直接存储记忆 C. 气味影响人们的情绪和行为 D. 气味对心理状态没有影响"}, {"number": 40, "answer": "A", "body": "40. 文章の内容に合っているものはどれか。\nA. 悪臭のある環境ではストレスが増える。\nB. 香りは人の記憶を思い出させる力がない。\nC. 嗅觉は五感の中で最も記憶とは関係がない。\nD. 好きな香りを嗅いでも体内の変化は起こらない。", "ruby_html": "40. <ruby>文章<rt>ぶんしょう</rt></ruby>の<ruby>内容<rt>ないよう</rt></ruby>に<ruby>合っ<rt>あっ</rt></ruby>ているものはどれか。\n。A. <ruby>悪臭<rt>あくしゅう</rt></ruby>のある<ruby>環境<rt>かんきょう</rt></ruby>ではストレスが<ruby>増え<rt>ふえ</rt></ruby>る。\n。B. <ruby>香り<rt>かおり</rt></ruby>は<ruby>人<rt>にん</rt></ruby>の<ruby>記憶<rt>きおく</rt></ruby>を<ruby>思い出さ<rt>おもいださ</rt></ruby>せる<ruby>力<rt>ちから</rt></ruby>がない。\n。C. <ruby>嗅<rt>きゅう</rt></ruby>觉<ruby>五感<rt>ごかん</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で<ruby>最も<rt>もっとも</rt></ruby><ruby>記憶<rt>きおく</rt></ruby>とは<ruby>関係<rt>かんけい</rt></ruby>がない。\n。D. <ruby>好き<rt>すき</rt></ruby>な<ruby>香り<rt>かおり</rt></ruby>を<ruby>嗅<rt>きゅう</rt></ruby>いでも<ruby>体内<rt>たいない</rt></ruby>の<ruby>変化<rt>へんか</rt></ruby>は<ruby>起こ<rt>おこ</rt></ruby>らない。", "translation_cn": "40.下列哪项与短文内容相符？ A. 在恶臭的环境中压力会增加。 B. 气味没有能力让人想起他们的记忆。 C. 在五种感官中，嗅觉与记忆的联系最小。 D. 闻到你最喜欢的气味不会导致你的身体发生任何变化。"}, {"number": 41, "answer": "C", "body": "僕は、朝、必ずコーヒーを淹れる。忙しい日々の中で、この時間だけは自分と 41 瞬間 だ。豆を挽き、湯を注ぎ、香りを嗅ぐ。その香りはまだ眠っている頭を 42 覚醒させ、今 日一日の流れを心の中で整理できる。たった数分の行為だが、心が落ち着き、身体も少しず つ目覚めていくのを感じられる。\n日语试题 第8页(共10页)\n\nコーヒーを淹れる 43 によって、自然に僕の心が落ち着く。窓の外に差し込む朝の光 や、遠くで聞こえる鳥のさえずりさえも、普段44 豊かに感じられる。コーヒーの温かさ は、忙しさの隙間に訪れる静寂そのもので、この小さな時間を持つだけで、日常の慌ただし さに追われても、自分を見失わずに済む45 o\n時には、本を開いたり、今日やることを手帳に書き出したりすることもある。その瞬間 は、外界の喧騒から切り離され、自分だけの世界にいる 46 。コーヒーの一口一口が、心 に落ち着きをもたらし、体だけでなく頭 47 整理される。\n忙しい日々の中で、こうした小さな儀式は、僕 48 欠かせないものになった。 日常の中 のほんの些細な瞬間が、人生を豊かにし、心の余裕を与え 49。 こうして静かな朝を\n50 たびに、僕は自分の生活を大切にすることの意味を改めて感じるだ。\n\n41.A.支え合う B. 助け合う C. 向き合う D.信じ合う", "ruby_html": "<ruby>僕は<rt>ぼくは</rt></ruby>、<ruby>朝<rt>あさ</rt></ruby>、<ruby>必ず<rt>かならず</rt></ruby>コーヒーを<ruby>淹<rt>えん</rt></ruby>れる。<ruby>忙しい<rt>いそがしい</rt></ruby><ruby>日々<rt>ひび</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で、この<ruby>時間<rt>じかん</rt></ruby>だけは<ruby>自分<rt>じぶん</rt></ruby>と 41 <ruby>瞬間<rt>しゅんかん</rt></ruby> だ。<ruby>豆<rt>まめ</rt></ruby>を<ruby>挽き<rt>ひき</rt></ruby>、<ruby>湯<rt>ゆ</rt></ruby>を<ruby>注ぎ<rt>そそぎ</rt></ruby>、<ruby>香り<rt>かおり</rt></ruby>を<ruby>嗅ぐ<rt>かぐ</rt></ruby>。その<ruby>香り<rt>かおり</rt></ruby>はまだ<ruby>眠っ<rt>ねむっ</rt></ruby>ている<ruby>頭<rt>あたま</rt></ruby>を 42 <ruby>覚醒<rt>かくせい</rt></ruby>させ、<ruby>今<rt>いま</rt></ruby> <ruby>日<rt>にち</rt></ruby><ruby>一日<rt>ついたち</rt></ruby>の<ruby>流れ<rt>ながれ</rt></ruby>を<ruby>心<rt>こころ</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で<ruby>整理<rt>せいり</rt></ruby>できる。たった<ruby>数分<rt>すうふん</rt></ruby>の<ruby>行為<rt>こうい</rt></ruby>だが、<ruby>心<rt>こころ</rt></ruby>が<ruby>落ち着き<rt>おちつき</rt></ruby>、<ruby>身体<rt>しんたい</rt></ruby>も<ruby>少し<rt>すこし</rt></ruby>ず つ<ruby>目覚め<rt>めざめ</rt></ruby>ていくのを<ruby>感じ<rt>かんじ</rt></ruby>られる。\n。<ruby>日<rt>にち</rt></ruby>语题<ruby>第<rt>だい</rt></ruby>8页<ruby>共<rt>とも</rt></ruby>10页\n\nコーヒーを<ruby>淹<rt>えん</rt></ruby>れる 43 によって、<ruby>自然<rt>しぜん</rt></ruby>に<ruby>僕<rt>ぼく</rt></ruby>の<ruby>心<rt>こころ</rt></ruby>が<ruby>落ち着く<rt>おちつく</rt></ruby>。<ruby>窓<rt>まど</rt></ruby>の<ruby>外<rt>そと</rt></ruby>に<ruby>差し込む<rt>さしこむ</rt></ruby><ruby>朝<rt>あさ</rt></ruby>の<ruby>光<rt>ひかり</rt></ruby> や、<ruby>遠く<rt>とおく</rt></ruby>で<ruby>聞こ<rt>きこ</rt></ruby>える<ruby>鳥<rt>とり</rt></ruby>のさえずりさえも、<ruby>普段<rt>ふだん</rt></ruby>44 <ruby>豊か<rt>ゆたか</rt></ruby>に<ruby>感じ<rt>かんじ</rt></ruby>られる。コーヒーの<ruby>温かさ<rt>あたたかさ</rt></ruby> は、<ruby>忙しさ<rt>いそがしさ</rt></ruby>の<ruby>隙間<rt>すきま</rt></ruby>に<ruby>訪れ<rt>おとずれ</rt></ruby>る<ruby>静寂<rt>せいじゃく</rt></ruby>そのもので、この<ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>時間<rt>じかん</rt></ruby>を<ruby>持つ<rt>もつ</rt></ruby>だけで、<ruby>日常<rt>にちじょう</rt></ruby>の<ruby>慌た<rt>あわた</rt></ruby>だし さに<ruby>追わ<rt>おわ</rt></ruby>れても、<ruby>自分<rt>じぶん</rt></ruby>を<ruby>見<rt>けん</rt></ruby><ruby>失わ<rt>うしなわ</rt></ruby>ずに<ruby>済む<rt>すむ</rt></ruby>45 o\n45 o<ruby>時に<rt>ときに</rt></ruby>は、<ruby>本<rt>ほん</rt></ruby>を<ruby>開い<rt>ひらい</rt></ruby>たり、<ruby>今日<rt>きょう</rt></ruby>やることを<ruby>手帳<rt>てちょう</rt></ruby>に<ruby>書き出し<rt>かきだし</rt></ruby>たりすることもある。その<ruby>瞬間<rt>しゅんかん</rt></ruby> は、<ruby>外界<rt>がいかい</rt></ruby>の<ruby>喧騒<rt>けんそう</rt></ruby>から<ruby>切り離さ<rt>きりはなさ</rt></ruby>れ、<ruby>自分<rt>じぶん</rt></ruby>だけの<ruby>世界<rt>せかい</rt></ruby>にいる 46 。コーヒーの<ruby>一口<rt>ひとくち</rt></ruby><ruby>一口<rt>ひとくち</rt></ruby>が、<ruby>心<rt>こころ</rt></ruby> に<ruby>落ち着き<rt>おちつき</rt></ruby>をもたらし、<ruby>体<rt>からだ</rt></ruby>だけでなく<ruby>頭<rt>あたま</rt></ruby> 47 <ruby>整理<rt>せいり</rt></ruby>される。\n。<ruby>忙しい<rt>いそがしい</rt></ruby><ruby>日々<rt>ひび</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で、こうした<ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>儀式<rt>ぎしき</rt></ruby>は、<ruby>僕<rt>ぼく</rt></ruby> 48 <ruby>欠か<rt>かか</rt></ruby>せないものになった。 <ruby>日常<rt>にちじょう</rt></ruby>の<ruby>中<rt>なか</rt></ruby> のほんの<ruby>些細<rt>ささい</rt></ruby>な<ruby>瞬間<rt>しゅんかん</rt></ruby>が、<ruby>人生<rt>じんせい</rt></ruby>を<ruby>豊か<rt>ゆたか</rt></ruby>にし、<ruby>心<rt>こころ</rt></ruby>の<ruby>余裕<rt>よゆう</rt></ruby>を<ruby>与え<rt>あたえ</rt></ruby> 49。 こうして<ruby>静か<rt>しずか</rt></ruby>な<ruby>朝<rt>あさ</rt></ruby>を\nを50 たびに、<ruby>僕は<rt>ぼくは</rt></ruby><ruby>自分<rt>じぶん</rt></ruby>の<ruby>生活<rt>せいかつ</rt></ruby>を<ruby>大切<rt>たいせつ</rt></ruby>にすることの<ruby>意味<rt>いみ</rt></ruby>を<ruby>改め<rt>あらため</rt></ruby>て<ruby>感じ<rt>かんじ</rt></ruby>るだ。\n。\n。41.A.<ruby>支え<rt>ささえ</rt></ruby><ruby>合う<rt>あう</rt></ruby> B. <ruby>助け<rt>たすけ</rt></ruby><ruby>合う<rt>あう</rt></ruby> C. <ruby>向き<rt>むき</rt></ruby><ruby>合う<rt>あう</rt></ruby> D.<ruby>信じ<rt>しんじ</rt></ruby><ruby>合う<rt>あう</rt></ruby>", "translation_cn": "我总是在早上煮咖啡。在我忙碌的生活中，这是我唯一与自己相处的时刻。将豆磨碎，倒入热水，闻香味。它的气味唤醒了我仍在沉睡的头脑，让我在精神上组织一天的流程。虽然只需要几分钟的时间，但你却能感觉到心灵平静下来，身体逐渐苏醒。煮咖啡 43 自然能让我的心平静下来。就连窗外照进来的晨光和远处的鸟鸣声都让我感到丰富。咖啡的温暖是繁忙日程之间的宁静，即使在日常生活的喧嚣中，仅仅拥有这个小小的时刻也能帮助我不迷失自己。45 o 有时我会打开一本书，或者在笔记本上写下今天要做的事情。那一刻，你远离了外界的喧嚣，沉浸在自己的世界中。46 每一口咖啡都会带来心灵的平静，不仅可以整理身体，还可以整理头脑。这些小仪式已成为我忙碌的日常生活中不可或缺的一部分。日常生活中最微小的时刻丰富了我们的生活，让我们内心平静49。每一次这样安静的早晨，我都会再次感受到珍惜生命的意义。 41. A. 互相支持 B. 互相帮助 C. 面对对方 D. 互相相信"}, {"number": 42, "answer": "D", "body": "42.A. たっぷり B. あっさり C. さっぱり D. ゆっくり", "ruby_html": "42.A. たっぷり B. あっさり C. さっぱり D. ゆっくり", "t 量，57（支撑）着心。而且，文字超越了时间，持续58（留在）人们的心中。书面的句子和单词可以改变人们未来的思维方式。因此，选择言语就意味着一种责任，可以说，这种态度既丰富了自己，也丰富了社会。六十号天空"}]}, {"id": "henan", "title": "金太阳·河南2026届高三5月联考", "pages": [{"page": 1, "text": "高 三 日 语\n第一部分听力(共两节,满分30分)\n第一节(共5小题；每小题1.5分，满分7.5分)\n听下面5段录音，每段录音后有1个小题，从A、B、C三个选项中选出最佳选项。每段录音后，都留有10秒钟 的时间回答该小题和阅读下一小题。每段录音播放两遍。\n1.   男の人は何に興味を持っていますか。\nA. 楽器                  B. 絵                     C. テ 二ス\n2.   男の学生は何時ごろに交流会の会場に着きそうですか。\nA.10時                  B . 10時10 分             C . 9時50 分\n3.   女の人はどこへ行きますか。\nA. レストラン              B. お  土産屋                 C  .遊 園 地の入口\n4.新入社員は誰ですか。\nA. 上田さん             B. 田村さん              C. 田中さん\n5.   女の人が高速列車に乗る理由として、正しくないのはどれですか。\nA.       深夜ではなくて、昼間に乗れるから\nB. 途中の風景が見られるから\nC. 使う時間は飛行機より少ないから\n第二节(共15小题；每小题1.5分，满分22.5分)\n听下面5段录音，每段录音后有几个小题，从A、B、C三个选项中选出最佳选项。听每段录音前，你将有时间阅 读各个小题，每小题5秒钟；听完后，每小题给出5秒钟的作答时间。每段录音播放两遍。\n听下面的录音，回答第6至8题。\n6.   男の人は郵便局へ何をしに行きますか。\nA. 荷物を送りに行く。         B.      荷物を取りに行く。            C.       荷物を運びに行く。\n7.   男の人は何を持って出かけますか。\nA. バッグ                       B.十分な現金                      C   .銀 行カードだけ\n8.   男の人はまず、何をしますか。\nA. 荷物を取る。                B. お  金を下ろす。                C. 水道代を払う。\n听下面的录音，回答第9至11题。\n9. どのズボンを買いましたか。\nA. 短 ズ ボ ン                 B.長いズボン                    C. 白いズボン\n10. どの半袖を買いましたか。\nA.     白い半袖                   B. 黑い半袖                         C. 青 半 袖\n11 . 誰がお金を払ます。\nA.女の人                     B. 男の子                        C.男のお父さん 听下面的录音，回答第12至14题。\n12.    男の人はいつ日本に来ましたか。\nA.2 年前の12月26日         B.2 年前の12月25日            C.2 年前の12月24日\n13.    男の人のお国はどこですか。\nA. イギリス                   B. アメリカ                        C. アフリ 力\n14.    男の人は今年、どこで、誰とクリスマスを過ごしますか。\nA. ふるさとで家族と過ごす。   B. ふるさとで女の人と過ごす。       C. 日本で家族と過ごす。 听下面的录音,回答第15至17题。\n15. ここはどこですか。\nA. 服の店                    B. クリーニング 屋                  C. 靴屋\n16.長いコートの価格はどうして安くなりましたか。\nA.      会員カードで値引きするから B. サービス  期間中だから    C.靴と合わせて値引きするから\n17.    男の人はいくら払いましたか。\nA.3,500  円                   B.3,200  円                          C.3,300  円\n听下面的录音，回答第18至20题。\n18.    吉田さんはどのパソコンがいいですか。\nA.A 型のパソコン            B.B 型のパソコン                  C.C 型のパソコン\n19.鈴木さんはパソコンで絵を描きます。どのパソコンがいいですか。\nA.A 型のパソコン             B.B 型のパソコン                  C.C 型のパソコン\n20.    松田さんはよくネットゲームをしています。どのパソコンがいいですか。\nA.A 型のパソコン            B.B      型のパソコン                  C.C  型のパソコン\n第二部分阅读理解(共20小题：每小题2.5分，满分50分)\n阅读下列短文，从A、B、C、D四个选项中选出符合文章内容的最佳选项，并在答题卡上将该项涂黑。\n(一)\n私たちの生活を便利で快適にしてくれるプラスチックですが、多くは自然に分解されないという課題があります。プラスチックは悪いものというイメージを持つ人が多いかもしれません。しかし、いまさらまったく使わない生活は考えられません。プラスチックとの共生を考えることが大切です。\nプラスチックのリサイクルも進んでいますが、最終的にはゴミとなり、焼かれることで二酸化炭素が発生します。(ア)、近年増えているのが、石油のかわりにサトウキビやトウモロコシ(甘蔗和玉米)といった植物を使った「バイオマスプラスチック」です。レジ袋の場合はサトウキビを原料としてエタノール(乙醇)を取り出し、エチレン(乙烯)を作ります。\nエチレンからポリエチレンにするのは、石油と同じ手順です。自然の中で分解される「生分解性プラスチック」もあります。土の中の微生物がプラスチックを分解してくれて、最後は二酸化炭素と水になります。\n使ったプラスチックを化学的に分解してナフサ(粗汽油)に戻し、再び材料として利用するリサイクルについても研究が進んでいます。\n21. 文中の「課題」に対して、どうすべきか。\nA. 分解できる材料で作られた製品を多めに生産すべきだ。\nB. 分解されないプラスチックの使用を禁止すべきだ。\nC. プラスチックの悪さをもう一度見直すべきだ。\nD. プラスチックとどう共生できるか考えるべきだ。\n22. 文中の(ア)に入れるのに最も適当なものはどれか。\nA. そこで B. それに C. そうしたら D. そのように\n23. 「バイオマスプラスチック」の製品として、正しいのはどれか。\nA. ガソリンから取り出した物質で作られたゴム手袋\nB. トウモロコシから取り出した物質で作られた食器\nC. 石油から取り出した物質で作られたレジ袋\nD. ナフサから取り出した物質で作られた包装資材\n24. 「生分解性プラスチック」はどんなプラスチックか。\nA. 植物から取り出した化学的な物質を使い、合成されるプラスチック\nB. 化学的に分解でき、そしてもう一度リサイクルできるプラスチック\nC. 土の中の微生物が分解でき、最後は二酸化炭素と水になるプラスチック\nD. 自然の微生物に分解され、植物の栄養として吸収されるプラスチック\n25. また研究が続いているのは何か。\nA. 地球にある再生可能な天然資源を探し、開発すること\nB. プラスチックを化学的に分解してナフサに戻し、再利用すること\nC. バイオマスプラスチックを作るに使える植物の種類を増やすこと\nD. 使われているプラスチックを合成する手順を簡易化させること\n(二)\n寒い季節に、虫がなかなか見られなくなります。少し寂しいですが、寒い時だけに出てくる虫もいます。冬に一番よく見られるのは、冬尺という小さな蛾の仲間です。幼虫が尺取虫なので、尺蛾と呼ばれ、その中の一部が冬に現れるのです。\n冬尺は秋遅くから、春になる前の寒い時期に出てきます。木の葉が落ちた森で、暖かい日に、ひらひらと飛ぶ様子が見られます。おもしろいのは、雌は飛ぶのが苦手なものが多いことです。なかには、羽がなくなって、まったく飛べなくなったものもいます。そういうものは、山の中の手すりや、木の枝を見て回って探してみましょう。また、寒い時期にずっといるわけではなく、種によって出る時期は決まっています。なかなか探すのは難しいかもしれませんが、この時期の暖かい日に山を歩いて探してみると楽しいと思います。\n(ア)、元気になるのは春や夏でも、成虫で冬を越す虫もいます。例えば、ホソミオツネントンボ(細身越冬蜻蜓)はそういう昆虫です。普段は水辺にいますが、この時期は森の中で過ごし、暖かい日に飛ぶのが見られます。枯れ枝のように目立たない色をしています。\nまた、キクテハやアカテハ(木叶蝶和赤蛱蝶)などの蝶も成虫で冬を越し、暖かい日には飛ぶこともあります。そのほか、蠅などの小さい虫にも、冬を好んで飛び回るものがいます。昆虫というのはいろいろ暮らし方で生きるものがいて、冬にも元気にしているものがいるというのは本当にびっくりです。\n26. 冬尺はいつ出てくるか。\nA. 初春から初秋までの暑い時期\nB. 深秋から春の前までの寒い時期\nC. 真冬から初春までの暖かい時期\nD. 真夏から真冬までの長い時期\n27. 文中の「そういうもの」の指すものは何か。\nA. 飛ぶのが苦手だが、ひらひらと飛べる雄の冬尺\nB. 飛ぶのが苦手だが、ひらひらと飛べる雌の冬尺\nC. 羽がなく、ぜんぜん飛べなくなった雄の冬尺\nD. 羽がなく、ぜんぜん飛べなくなった雌の冬尺\n28. 文中の(ア)に入れるのに最も適当なのはどれか。\nA. そのため B. そのように C. そのほか D. そのうえに\n29. 文中に「そういう昆虫」とあるが、どんな昆虫か。\nA. 成虫で冬を越す虫\nB. 幼虫で水の中に生きる虫\nC. 成虫で水辺で暮らす虫\nD. 幼虫で森の中で過ごす虫\n30. 文章の内容に合っているのはどれか。\nA. 寒い時に出てくる昆虫の種類は少ないが、量はほかの季節より多い。\nB. 寒い時期の暖かい日に森に行くと、冬に出る昆虫を見る可能性がある。\nC. 寒い時に出てくる昆虫はだいたい同じ時期に出て、探すのも簡単だ。\nD. 寒い時期に成虫で活躍している昆虫がいるのは筆者にとって珍しくない。\n(三)\n川根由美子さん(67歳)が今年2月に受け取った段ボール箱には、自費出版した小説200冊が入っていました。福祉の仕事をしながら文章を書き続けてきた彼女は、自信がなかったため、「誰も読まない」と言われるのを恐れていたそうです。(ア)表紙にはこだわり、砂浜の絵と大好きなカキツバタの青い色で和なデザインにしました。同人誌仲間から良い反応をもらえたことで、本にしてよかったと思えるようになりました。\n自費出版とは著者の思いを凝縮したものですが、多くの場合、それが広く読まれることなく消えてしまうことがあります。そこで、川根さんは5月に自宅で「本屋」を始めました。この本屋は利益を考えず、作者同士が交流できる場を指しています。訪れる人は少ないもの、自分の本も置いてほしいという希望者がおり、一生に一度だけでも形として残したいという意気込みが感じられます。「活字によって生き様を残す」という想いが伝わってくると言います。\nこの店には多種多様な自費出版物があります。例えば街の電器屋さんによる郷土史研究にもとづいた時代小説や、30年越しにあぜ道についての研究書などがあります。本を見ただけでも楽しいですが、その背後にある執筆者それぞれの背景やストーリーを知れば、一層その魅力が増します。\n店名「旅する本屋ラボール」には、自費出版された本たちが見知らぬ誰かへ渡り、「どこか遠くへと旅してほしい」という願いが込められています。このような活動が、小さなコミュニティ内外で新たなつながりや発見を生み出すことにつながっています。\n31. 文中の(ア)に入れるのに最も適当なものはどれか。\nA. それでも B. そのため C. しかも D. ところで\n32. 川根さんが始めた「本屋」の目的として、最も適当なものはどれか。\nA. 自費出版物を広く販売して利益を上げること\nB. 郷土史や研究書などの本を収集して展示すること\nC. 作者同士が交流できる場を提供すること\nD. 活字で書かれた本をデジタル化し保存すること\n33. 文中の「意気込み」を最も正しく表すものはどれか。\nA. 将来を考えた冷静な決断\nB. すぐに結果を出すための努力\nC. ビジネスとして成功させたいという考え\nD. 自分の本を世に出したいという強い思い\n34. 文中の「旅する本屋ラボール」の店名に込められた願いは何か。\nA. 自費出版された本が見知らぬ人の手に渡ることを願う。\nB. 多くの人が本を通じて旅行に出かけることを願う。\nC. 作者が自分の本を持って各地を旅することを願う。\nD. 小さなコミュニティの外に本屋を広げることを願う。\n35. この文章の内容と合っているものはどれか。\nA. 川根さんは最初から自費出版に自信を持っていた。\nB. 自費出版物には、作者の経験や思いが反映されている。\nC. この本屋は訪れる人が多く、常ににぎわっている。\nD. この本屋では、利益を上げるための販売戦略を行っている。\n\n(四)\n日本ではよく「若者はもっと個性を出すべきだ」や「個性を磨くべきだ」と言われますが、 私はこうした意見にはあまり意味がないと感じています。特に、日本で「個性」という言葉\nが外見に関して使われることにも違和感があります。「個性的なファッション」や「個性的な ハアスタイル」といえば、多くの場合、人々を驚かせるような奇抜さを指しています。\nこのように考えると、「個性=目立つこと」という誤解が広まっているのではないでしょう うか。(ア) 、本質的には、この世に生まれた人は誰もがそれぞれ異なる個性を持っていま す。そのため、誰かから「磨け」と命じられて義務のように努力する必要はありません。あ なたの個性は唯一無二であり、世界中どこにも同じものを持つ人はいません。他人と比較し たり真似たりする必要はなのです。\n大切なのは、自分自身が楽しいと思うことや不思議だと思うこと、ときめきを感じること など、自分の心から求めているものを優先することです。「磨く」や「発揮する」と意識しない くても、本当に好きなものや興味ある事柄へ自然と気持ちが向いていけば、それだけで自分  自身の世界は広がります。それこそが本当の「個性を磨く」ということでしよう。\n結局、他人との比較ではなく、自分自身の内面から湧き上がる欲求や好奇心によって行動 すると、その結果が独自の道筋となり、それこそ本当の意味で自分らしい人生につながります す。 このプロセスそのものがお互い異なる存在として価値あるのであり、それぞ  れの日常 生活でもっと自然体で過ごすための匕ン卜になるでしょう。\n36.          文中に「違和感があります」 とあるが、それはなぜか。\nA   .個 性は生まれつき決まっているので、磨くことができないと考えているから\nB    .個  性という言葉が、外見的な奇抜さを表すために使われることが多いから\nC. 若者が個性を出そうとすると、社会から否定されてしまうから\nD    .個 性を重視するあまり、人間関係がうまくいかなくなっているから\n37.         文中の(ア)に入れるのに最も適当なものはどれか。\nA.    しかし          B. そのため               C.      したがって                 D. それから\n38.筆者によると、「個性を磨く」ために必要なことは何か。\nA.他人に負けないような特別なスキルを身につけること\nB.       社会の期待に応えるような立派な人間になること\nC.   自分の心から楽しいと思えることを優先して行動すること\nD.       周囲の人々と積極的に関わって視野を広げること\n39.         文中の「このプロセス」 とは何か。\nA.他人と比較しながら自分の欠点を見つけるプロセス\nB.       社会のルールに従って行動するプロセス\nC. 他人の意見を参考にして自分の個性を確立するプロセス\nD.       内面から湧き上がる欲求や好奇心によって行動するプロセス\n40. この文章で筆者が最も伝えたいことは何か。\nA.       若者はもっと社会に対して自分の意見を主張すべきだ。\nB    .個 性を磨くためには、専門的な教育を受ける必要がある。\nC    .個 性とは外見ではなく、内面から自然に表れるものである。\nD. 他人との比較を通して、自分の個性に気づくことができる。\n第三部分语言运用(共两节，满分30分)\n第一节(共10小题；每小题1.5分，满分15分)\n阅读下面短文，从每题所给的A、B 、C、D四个选项中选出最佳选项。\n寒さが増す季節、暖かい布団から出るのが難しくなる冬がやってきました。私は冬が好きです が、特に夜の星空には心惹かれます。故郷は自然豊かな場所で、山々と広大な田んぼや畑に 41       お り、その風景はまるで『となりのト卜口』に登場する       42     大自然です。そして何よりも自慢でき るのが、澄み切った冬の夜空。無数の星たちが瞬く様子は、本当に素晴らしい 43      です。\n高校進学を機に上京した私44 、 この美しい星空を見られる機会は帰省時のみになりました。東  京では街中を彩るネオンサビル群の灯りによって満たされていて、それもまた魅力的ですが、長 野で見る星空には敵わないと思っています。\n今年で東京生活三年目の冬を迎え、不思議にも感じます。それまでとは異なり、少しだけ東京  でも星が多く見える45ま した。その理由は「節電」でした。この影響で街全体が少し暗くなり、 その結果として星空が 46        見えるようになったのでしょう。\n私は考えます。もし日本中、多くの人々が感動する 47        美しい星空を見ることになれば、人々 は  48 頻繁にそれをのぞむでしょう。そして、その願いから街明かりも徐々に減退して 49\nと思います。それによって今私たち自身だけではなく、未来世代への美しい夜空も守れることで しよう。一人でも多くの人々にこの素晴らしい星空を体験し、それについて 50        と強く願ってい ます。\n41.A.        しずまれて            B. こめて           C.かこまれて         D. うなずいて\n42.    A. ように                B.のみたいな     C.     らしい            D. ような\n43.A. べき                B. もの          C. はず              D.つもり\n44.     A.かどうか              B.     とって        C. によれば          D.      からこそ\n45. A.   気にし                B. 気になり         C.気がし              D. 気がなり\n46.A. あかるく             B. きびしく        C.かなしく           D. おおきく\n47. A. では                B. のに            C. でも               D. ほ ど\n48.A. もっと              B. もちろん        C. もっとも           D. ほっと\n49.A. しまうと             B. あげたら       C. るなら            D. いけば\n50 .  A.  考えぶりだ            B.       考えてほしい    C.考 えて以来だ       D.    考えてはいけない\n第二节(共10小题，每小题1.5分，满分15分)\n阅读下面短文，在空白处填入适当的助词或括号内单词的正确形式，括号内单词有双下划线时，写出该单 词的汉字或假名。\n卒業生の皆さん、今日は私が大好きな中国のことわざを紹介したいと思います。それは「人間 万事寒翁が馬、略して「寒翁が馬」です。このことわざ51          は深教訓があります。\nこの物語は、中国のお城近くの村に住むおじいさんが主人公です。彼の唯一の財産は一頭の馬  で、一人息子  52          共に暮らしていました。しかある日、その貴重な馬が逃げてしまいました。 村人たちはすぐに集まり、「大変ですね」とおじいさんを慰めました。でも、おじいさんは  53\n(冷静だ)「いやいや、これは何か良い事の始まりかもしれない」と言ったそうです。\n数日後、その馬が帰ってきただけでなく、それよりも優れた良馬を  54      (連れる)屎りまし た。村人たちは再び集まって、「素晴らしい! 55         (いい)たですね」と喜びました。しかし、 おじいさんはまたもや「いやいや、これは何か悪い事の始まりかもしれない」と答えました。\nその後、息子がお気に     56      (入る)になった新しい馬に乗っていたところ、落ちて足を骨折し てしまいました。またもや村人たちは来て、「なんという災難でしょう」と同情しました。それで もおじいさんは「いやいや、これは何かいいことかもしれないよ」と言うのでした。\nしばらくすると      57(せんそう)が起こり、多くの若者たちが微兵された。そして多く の場合、生還することなく命を落としてしまいました。しかし、おじいさんの息子だけは足を怪 我していたため徵兵     58      (する)ず、生き残ることとなりました。\nこの話から学べるように、一見不運と思える 5 9 ( 出 来 事 ) にも幸運につながる可能性があ りますし、その逆もあります。「塞翁が馬」は状況によって感情的になりすぎず、おじいさん\n60         ようなどっしりとした構え方で人生を見る重要性を教えてくれるものだと思います。この 教訓を胸に、日々の生活に柔軟さと冷静さを持って臨んでください。\n第四部分写作(共两节，满分40分)\n第一节(满分10分)\n假设你是李明，上周因故未能参加外教的口语课，且忘记提前请假。请就此给外教写一封 道歉邮件，解释原因，并保证以后会准时参加课程，有事一定提前请假。\n(1)字数80~120字;   (2)格式正确,书写清楚;    (3)使用「です ・ ます」体。\n第二节(满分30分)\n大家是否发现，出行购物时，越来越多的人不再使用现金支付，更多人倾向
