,500 円 B.3,200 円 C.3,300 円\n听下面的录音,回答第18至20题。", "ruby_html": "17. <ruby>男<rt>おとこ</rt></ruby>の<ruby>人<rt>にん</rt></ruby>はいくら<ruby>払い<rt>はらい</rt></ruby>ましたか。\n。A.3,500 <ruby>円<rt>えん</rt></ruby> B.3,200 <ruby>円<rt>えん</rt></ruby> C.3,300 <ruby>円<rt>えん</rt></ruby>\n<ruby>円<rt>えん</rt></ruby><ruby>听<rt>きん</rt></ruby><ruby>下面<rt>かめん</rt></ruby><ruby>的<rt>てき</rt></ruby>录,<ruby>回答<rt>かいとう</rt></ruby><ruby>第<rt>だい</rt></ruby>18<ruby>至<rt>いた</rt></ruby>20题", "translation_cn": "17. 该男子付了多少钱？ A. 3,500 日元 B. 3,200 日元 C. 3,300 日元 答案第 18 至 20 号。"}, {"number": 18, "answer": "B", "body": "18. 吉田さんはどのパソコンがいいですか。\nA.A 型のパソコン B.B 型のパソコン C.C 型のパソコン", "ruby_html": "18. <ruby>吉田<rt>よしだ</rt></ruby>さんはどのパソコンがいいですか。\n。A.A <ruby>型<rt>かた</rt></ruby>のパソコン B.B <ruby>型<rt>かた</rt></ruby>のパソコン C.C <ruby>型<rt>かた</rt></ruby>のパソコン", "translation_cn": "18. 吉田先生，您想要哪台电脑？ A.A型计算机 B.B型计算机 C.C型计算机"}, {"number": 19, "answer": "C", "body": "19.鈴木さんはパソコンで絵を描きます。どのパソコンがいいですか。\nA.A 型のパソコン B.B 型のパソコン C.C 型のパソコン", "ruby_html": "19.<ruby>鈴木<rt>すずき</rt></ruby>さんはパソコンで<ruby>絵<rt>え</rt></ruby>を<ruby>描き<rt>えがき</rt></ruby>ます。どのパソコンがいいですか。\n。A.A <ruby>型<rt>かた</rt></ruby>のパソコン B.B <ruby>型<rt>かた</rt></ruby>のパソコン C.C <ruby>型<rt>かた</rt></ruby>のパソコン", "translation_cn": "19. 铃木先生在电脑上画画。您更喜欢哪台电脑？ A.A型计算机 B.B型计算机 C.C型计算机"}, {"number": 20, "answer": "A", "body": "20. 松田さんはよくネットゲームをしています。どのパソコンがいいですか。\nA.A 型のパソコン B.B 型のパソコン C.C 型のパソコン", "ruby_html": "20. <ruby>松田<rt>まつだ</rt></ruby>さんはよくネットゲームをしています。どのパソコンがいいですか。\n。A.A <ruby>型<rt>かた</rt></ruby>のパソコン B.B <ruby>型<rt>かた</rt></ruby>のパソコン C.C <ruby>型<rt>かた</rt></ruby>のパソコン", "translation_cn": "20. 松田先生经常玩网络游戏。您更喜欢哪台电脑？ A.A型计算机 B.B型计算机 C.C型计算机"}, {"number": 21, "answer": "D", "body": "(一)\n私たちの生活を便利で快適にしてくれるプラスチックですが、多くは自然に分解されないという課題があります。プラスチックは悪いものというイメージを持つ人が多いかもしれません。しかし、いまさらまったく使わない生活は考えられません。プラスチックとの共生を考えることが大切です。\nプラスチックのリサイクルも進んでいますが、最終的にはゴミとなり、焼かれることで二酸化炭素が発生します。(ア)、近年増えているのが、石油のかわりにサトウキビやトウモロコシ(甘蔗和玉米)といった植物を使った「バイオマスプラスチック」です。レジ袋の場合はサトウキビを原料としてエタノール(乙醇)を取り出し、エチレン(乙烯)を作ります。\nエチレンからポリエチレンにするのは、石油と同じ手順です。自然の中で分解される「生分解性プラスチック」もあります。土の中の微生物がプラスチックを分解してくれて、最後は二酸化炭素と水になります。\n使ったプラスチックを化学的に分解してナフサ(粗汽油)に戻し、再び材料として利用するリサイクルについても研究が進んでいます。\n\n21. 文中の「課題」に対して、どうすべきか。\nA. 分解できる材料で作られた製品を多めに生産すべきだ。\nB. 分解されないプラスチックの使用を禁止すべきだ。\nC. プラスチックの悪さをもう一度見直すべきだ。\nD. プラスチックとどう共生できるか考えるべきだ。", "ruby_html": "(<ruby>一<rt>いち</rt></ruby>)\n)<ruby>私たち<rt>わたしたち</rt></ruby>の<ruby>生活<rt>せいかつ</rt></ruby>を<ruby>便利<rt>べんり</rt></ruby>で<ruby>快適<rt>かいてき</rt></ruby>にしてくれるプラスチックですが、<ruby>多く<rt>おおく</rt></ruby>は<ruby>自然<rt>しぜん</rt></ruby>に<ruby>分解<rt>ぶんかい</rt></ruby>されないという<ruby>課題<rt>かだい</rt></ruby>があります。プラスチックは<ruby>悪い<rt>わるい</rt></ruby>ものというイメージを<ruby>持つ<rt>もつ</rt></ruby><ruby>人<rt>にん</rt></ruby>が<ruby>多い<rt>おおい</rt></ruby>かもしれません。しかし、いまさらまったく<ruby>使わ<rt>つかわ</rt></ruby>ない<ruby>生活<rt>せいかつ</rt></ruby>は<ruby>考え<rt>かんがえ</rt></ruby>られません。プラスチックとの<ruby>共生<rt>きょうせい</rt></ruby>を<ruby>考え<rt>かんがえ</rt></ruby>ることが<ruby>大切<rt>たいせつ</rt></ruby>です。\n。プラスチックのリサイクルも<ruby>進ん<rt>すすん</rt></ruby>でいますが、<ruby>最終的<rt>さいしゅうてき</rt></ruby>にはゴミとなり、<ruby>焼か<rt>やか</rt></ruby>れることで<ruby>二酸化炭素<rt>にさんかたんそ</rt></ruby>が<ruby>発生<rt>はっせい</rt></ruby>します。(ア)、<ruby>近年<rt>きんねん</rt></ruby><ruby>増え<rt>ふえ</rt></ruby>ているのが、<ruby>石油<rt>せきゆ</rt></ruby>のかわりにサトウキビやトウモロコシ(<ruby>甘蔗<rt>かんしょ</rt></ruby><ruby>和<rt>わ</rt></ruby><ruby>玉<rt>たま</rt></ruby><ruby>米<rt>こめ</rt></ruby>)といった<ruby>植物<rt>しょくぶつ</rt></ruby>を<ruby>使った<rt>つかった</rt></ruby>「バイオマスプラスチック」です。レジ<ruby>袋<rt>ふくろ</rt></ruby>の<ruby>場合<rt>ばあい</rt></ruby>はサトウキビを<ruby>原料<rt>げんりょう</rt></ruby>としてエタノール(<ruby>乙<rt>おつ</rt></ruby><ruby>醇<rt>じゅん</rt></ruby>)を<ruby>取り出し<rt>とりだし</rt></ruby>、エチレン(<ruby>乙<rt>おつ</rt></ruby>烯を<ruby>作り<rt>つくり</rt></ruby>ます。\n。エチレンからポリエチレンにするのは、<ruby>石油<rt>せきゆ</rt></ruby>と<ruby>同じ<rt>おなじ</rt></ruby><ruby>手順<rt>てじゅん</rt></ruby>です。<ruby>自然<rt>しぜん</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で<ruby>分解<rt>ぶんかい</rt></ruby>される「<ruby>生<rt>なま</rt></ruby><ruby>分解性<rt>ぶんかいせい</rt></ruby>プラスチック」もあります。<ruby>土<rt>つち</rt></ruby>の<ruby>中の<rt>なかの</rt></ruby><ruby>微生物<rt>びせいぶつ</rt></ruby>がプラスチックを<ruby>分解<rt>ぶんかい</rt></ruby>してくれて、<ruby>最後<rt>さいご</rt></ruby>は<ruby>二酸化炭素<rt>にさんかたんそ</rt></ruby>と<ruby>水<rt>みず</rt></ruby>になります。\n。<ruby>使った<rt>つかった</rt></ruby>プラスチックを<ruby>化学的<rt>かがくてき</rt></ruby>に<ruby>分解<rt>ぶんかい</rt></ruby>してナフサ(<ruby>粗<rt>そ</rt></ruby><ruby>汽<rt>き</rt></ruby><ruby>油<rt>あぶら</rt></ruby>)に<ruby>戻し<rt>もどし</rt></ruby>、<ruby>再び<rt>ふたたび</rt></ruby><ruby>材料<rt>ざいりょう</rt></ruby>として<ruby>利用<rt>りよう</rt></ruby>するリサイクルについても<ruby>研究<rt>けんきゅう</rt></ruby>が<ruby>進ん<rt>すすん</rt></ruby>でいます。\n。\n。21. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「<ruby>課題<rt>かだい</rt></ruby>」に<ruby>対し<rt>たいし</rt></ruby>て、どうすべきか。\n。A. <ruby>分解<rt>ぶんかい</rt></ruby>できる<ruby>材料<rt>ざいりょう</rt></ruby>で<ruby>作ら<rt>つくら</rt></ruby>れた<ruby>製品<rt>せいひん</rt></ruby>を<ruby>多め<rt>おおめ</rt></ruby>に<ruby>生産<rt>せいさん</rt></ruby>すべきだ。\n。B. <ruby>分解<rt>ぶんかい</rt></ruby>されないプラスチックの<ruby>使用<rt>しよう</rt></ruby>を<ruby>禁止<rt>きんし</rt></ruby>すべきだ。\n。C. プラスチックの<ruby>悪さ<rt>わるさ</rt></ruby>をもう<ruby>一度<rt>いちど</rt></ruby><ruby>見直す<rt>みなおす</rt></ruby>べきだ。\n。D. プラスチックとどう<ruby>共生<rt>きょうせい</rt></ruby>できるか<ruby>考え<rt>かんがえ</rt></ruby>るべきだ。", "translation_cn": "(1)塑料使我们的生活方便舒适，但问题是许多塑料不能自然分解。很多人可能会有这样的印象：塑料不好。然而，我无法想象完全不使用它的生活。考虑与塑料共存很重要。塑料回收正在取得进展，但最终它会变成垃圾，燃烧时会产生二氧化碳。 (a) 近年来，以甘蔗、玉米（红薯米）等植物代替石油的生物质塑料不断增加。就塑料袋而言，乙醇是从甘蔗中提取的，并由其制成乙烯。将乙烯转化为聚乙烯的过程与石油的过程相同。还有在自然中分解的“生物降解塑料”。土壤中的微生物分解塑料，最终结果是二氧化碳和水。回收研究也在取得进展，其中包括对用过的塑料进行化学分解，并将其返回石脑油（原油蒸汽油），然后可以再次用作材料。 21.对于文中的“问题”我们该怎么办？答：我们应该生产更多由可降解材料制成的产品。 B. 应禁止使用不可降解的塑料。 C. 我们应该重新考虑塑料有多糟糕。 D. 我们应该考虑如何与塑料共存。"}, {"number": 22, "answer": "A", "body": "22. 文中の(ア)に入れるのに最も適当なものはどれか。\nA. そこで B. それに C. そうしたら D. そのように", "ruby_html": "22. <ruby>文中<rt>ぶんちゅう</rt></ruby>の(ア)に<ruby>入れ<rt>いれ</rt></ruby>るのに<ruby>最も<rt>もっとも</rt></ruby><ruby>適当<rt>てきとう</rt></ruby>なものはどれか。\n。A. そこで B. それに C. そうしたら D. そのように", "translation_cn": "22. 以下哪项最适合放在句子的 (a) 中？ A. 那里 B. 另外 C. 然后 D. 那样"}, {"number": 23, "answer": "B", "body": "23. 「バイオマスプラスチック」の製品として、正しいのはどれか。\nA. ガソリンから取り出した物質で作られたゴム手袋\nB. トウモロコシから取り出した物質で作られた食器\nC. 石油から取り出した物質で作られたレジ袋\nD. ナフサから取り出した物質で作られた包装資材", "ruby_html": "23. 「バイオマスプラスチック」の<ruby>製品<rt>せいひん</rt></ruby>として、<ruby>正しい<rt>ただしい</rt></ruby>のはどれか。\n。A. ガソリンから<ruby>取り出し<rt>とりだし</rt></ruby>た<ruby>物質<rt>ぶっしつ</rt></ruby>で<ruby>作ら<rt>つくら</rt></ruby>れたゴム<ruby>手袋<rt>てぶくろ</rt></ruby>\n<ruby>手袋<rt>てぶくろ</rt></ruby>B. トウモロコシから<ruby>取り出し<rt>とりだし</rt></ruby>た<ruby>物質<rt>ぶっしつ</rt></ruby>で<ruby>作ら<rt>つくら</rt></ruby>れた<ruby>食器<rt>しょっき</rt></ruby>\n<ruby>食器<rt>しょっき</rt></ruby>C. <ruby>石油<rt>せきゆ</rt></ruby>から<ruby>取り出し<rt>とりだし</rt></ruby>た<ruby>物質<rt>ぶっしつ</rt></ruby>で<ruby>作ら<rt>つくら</rt></ruby>れたレジ<ruby>袋<rt>ふくろ</rt></ruby>\n<ruby>袋<rt>ふくろ</rt></ruby>D. ナフサから<ruby>取り出し<rt>とりだし</rt></ruby>た<ruby>物質<rt>ぶっしつ</rt></ruby>で<ruby>作ら<rt>つくら</rt></ruby>れた<ruby>包装<rt>ほうそう</rt></ruby><ruby>資材<rt>しざい</rt></ruby>", "translation_cn": "23. 作为“生物质塑料”产品，以下哪项是正确的？ A. 由汽油衍生物质制成的橡胶手套 B. 由玉米衍生物质制成的餐具 C. 由石油衍生物质制成的塑料袋 D. 由石脑油衍生物质制成的包装材料"}, {"number": 24, "answer": "C", "body": "24. 「生分解性プラスチック」はどんなプラスチックか。\nA. 植物から取り出した化学的な物質を使い、合成されるプラスチック\nB. 化学的に分解でき、そしてもう一度リサイクルできるプラスチック\nC. 土の中の微生物が分解でき、最後は二酸化炭素と水になるプラスチック\nD. 自然の微生物に分解され、植物の栄養として吸収されるプラスチック", "ruby_html": "24. 「<ruby>生<rt>なま</rt></ruby><ruby>分解性<rt>ぶんかいせい</rt></ruby>プラスチック」はどんなプラスチックか。\n。A. <ruby>植物<rt>しょくぶつ</rt></ruby>から<ruby>取り出し<rt>とりだし</rt></ruby>た<ruby>化学的<rt>かがくてき</rt></ruby>な<ruby>物質<rt>ぶっしつ</rt></ruby>を<ruby>使い<rt>つかい</rt></ruby>、<ruby>合成<rt>ごうせい</rt></ruby>されるプラスチック\nプラスチックB. <ruby>化学的<rt>かがくてき</rt></ruby>に<ruby>分解<rt>ぶんかい</rt></ruby>でき、そしてもう<ruby>一度<rt>いちど</rt></ruby>リサイクルできるプラスチック\nプラスチックC. <ruby>土<rt>つち</rt></ruby>の<ruby>中の<rt>なかの</rt></ruby><ruby>微生物<rt>びせいぶつ</rt></ruby>が<ruby>分解<rt>ぶんかい</rt></ruby>でき、<ruby>最後<rt>さいご</rt></ruby>は<ruby>二酸化炭素<rt>にさんかたんそ</rt></ruby>と<ruby>水<rt>みず</rt></ruby>になるプラスチック\nプラスチックD. <ruby>自然<rt>しぜん</rt></ruby>の<ruby>微生物<rt>びせいぶつ</rt></ruby>に<ruby>分解<rt>ぶんかい</rt></ruby>され、<ruby>植物<rt>しょくぶつ</rt></ruby>の<ruby>栄養<rt>えいよう</rt></ruby>として<ruby>吸収<rt>きゅうしゅう</rt></ruby>されるプラスチック", "translation_cn": "24. 什么样的塑料是“生物降解塑料”？ A. 利用从植物中提取的化学物质合成的塑料 B. 可以化学分解然后再次回收的塑料 C. 可以被土壤中的微生物分解，变成二氧化碳和水的塑料 D. 被自然微生物分解并被植物作为营养物质吸收的塑料"}, {"number": 25, "answer": "B", "body": "25. また研究が続いているのは何か。\nA. 地球にある再生可能な天然資源を探し、開発すること\nB. プラスチックを化学的に分解してナフサに戻し、再利用すること\nC. バイオマスプラスチックを作るに使える植物の種類を増やすこと\nD. 使われているプラスチックを合成する手順を簡易化させること", "ruby_html": "25. また<ruby>研究<rt>けんきゅう</rt></ruby>が<ruby>続い<rt>つづい</rt></ruby>ているのは<ruby>何か<rt>なにか</rt></ruby>。\n。A. <ruby>地球<rt>ちきゅう</rt></ruby>にある<ruby>再生可能<rt>さいせいかのう</rt></ruby>な<ruby>天然<rt>てんねん</rt></ruby><ruby>資源<rt>しげん</rt></ruby>を<ruby>探し<rt>さがし</rt></ruby>、<ruby>開発<rt>かいはつ</rt></ruby>すること\nすることB. プラスチックを<ruby>化学的<rt>かがくてき</rt></ruby>に<ruby>分解<rt>ぶんかい</rt></ruby>してナフサに<ruby>戻し<rt>もどし</rt></ruby>、<ruby>再利用<rt>さいりよう</rt></ruby>すること\nすることC. バイオマスプラスチックを<ruby>作る<rt>つくる</rt></ruby>に<ruby>使え<rt>つかえ</rt></ruby>る<ruby>植物<rt>しょくぶつ</rt></ruby>の<ruby>種類<rt>しゅるい</rt></ruby>を<ruby>増やす<rt>ふやす</rt></ruby>こと\nことD. <ruby>使わ<rt>つかわ</rt></ruby>れているプラスチックを<ruby>合成<rt>ごうせい</rt></ruby>する<ruby>手順<rt>てじゅん</rt></ruby>を<ruby>簡易化<rt>かんいか</rt></ruby>させること", "translation_cn": "25. 还有什么正在研究？ A. 寻找和开发地球上的可再生自然资源 B. 通过化学方式将塑料分解成石脑油以供再利用 C. 增加可用于制造生物质塑料的植物种类 D. 简化所用塑料的合成过程"}, {"number": 26, "answer": "B", "body": "(二)\n寒い季節に、虫がなかなか見られなくなります。少し寂しいですが、寒い時だけに出てくる虫もいます。冬に一番よく見られるのは、冬尺という小さな蛾の仲間です。幼虫が尺取虫なので、尺蛾と呼ばれ、その中の一部が冬に現れるのです。\n冬尺は秋遅くから、春になる前の寒い時期に出てきます。木の葉が落ちた森で、暖かい日に、ひらひらと飛ぶ様子が見られます。おもしろいのは、雌は飛ぶのが苦手なものが多いことです。なかには、羽がなくなって、まったく飛べなくなったものもいます。そういうものは、山の中の手すりや、木の枝を見て回って探してみましょう。また、寒い時期にずっといるわけではなく、種によって出る時期は決まっています。なかなか探すのは難しいかもしれませんが、この時期の暖かい日に山を歩いて探してみると楽しいと思います。\n(ア)、元気になるのは春や夏でも、成虫で冬を越す虫もいます。例えば、ホソミオツネントンボ(細身越冬蜻蜓)はそういう昆虫です。普段は水辺にいますが、この時期は森の中で過ごし、暖かい日に飛ぶのが見られます。枯れ枝のように目立たない色をしています。\nまた、キクテハやアカテハ(木叶蝶和赤蛱蝶)などの蝶も成虫で冬を越し、暖かい日には飛ぶこともあります。そのほか、蠅などの小さい虫にも、冬を好んで飛び回るものがいます。昆虫というのはいろいろ暮らし方で生きるものがいて、冬にも元気にしているものがいるというのは本当にびっくりです。\n\n26. 冬尺はいつ出てくるか。\nA. 初春から初秋までの暑い時期\nB. 深秋から春の前までの寒い時期\nC. 真冬から初春までの暖かい時期\nD. 真夏から真冬までの長い時期", "ruby_html": "(<ruby>二<rt>に</rt></ruby>)\n)<ruby>寒い<rt>さむい</rt></ruby><ruby>季節<rt>きせつ</rt></ruby>に、<ruby>虫<rt>むし</rt></ruby>がなかなか<ruby>見ら<rt>みら</rt></ruby>れなくなります。<ruby>少し<rt>すこし</rt></ruby><ruby>寂しい<rt>さびしい</rt></ruby>ですが、<ruby>寒い<rt>さむい</rt></ruby><ruby>時<rt>とき</rt></ruby>だけに<ruby>出て<rt>でて</rt></ruby>くる<ruby>虫<rt>むし</rt></ruby>もいます。<ruby>冬<rt>ふゆ</rt></ruby>に<ruby>一番<rt>いちばん</rt></ruby>よく<ruby>見ら<rt>みら</rt></ruby>れるのは、<ruby>冬<rt>ふゆ</rt></ruby><ruby>尺<rt>しゃく</rt></ruby>という<ruby>小さ<rt>ちいさ</rt></ruby>な<ruby>蛾<rt>が</rt></ruby>の<ruby>仲間<rt>なかま</rt></ruby>です。<ruby>幼虫<rt>ようちゅう</rt></ruby>が<ruby>尺取虫<rt>しゃくとりむし</rt></ruby>なので、<ruby>尺蛾<rt>しゃくが</rt></ruby>と<ruby>呼ば<rt>よば</rt></ruby>れ、その<ruby>中の<rt>なかの</rt></ruby><ruby>一部<rt>いちぶ</rt></ruby>が<ruby>冬<rt>ふゆ</rt></ruby>に<ruby>現れ<rt>あらわれ</rt></ruby>るのです。\n。<ruby>冬<rt>ふゆ</rt></ruby><ruby>尺<rt>しゃく</rt></ruby>は<ruby>秋<rt>あき</rt></ruby><ruby>遅く<rt>おそく</rt></ruby>から、<ruby>春<rt>はる</rt></ruby>になる<ruby>前<rt>まえ</rt></ruby>の<ruby>寒い<rt>さむい</rt></ruby><ruby>時期<rt>じき</rt></ruby>に<ruby>出て<rt>でて</rt></ruby>きます。<ruby>木の葉<rt>このは</rt></ruby>が<ruby>落ち<rt>おち</rt></ruby>た<ruby>森<rt>もり</rt></ruby>で、<ruby>暖かい<rt>あたたかい</rt></ruby><ruby>日<rt>にち</rt></ruby>に、ひらひらと<ruby>飛ぶ<rt>とぶ</rt></ruby><ruby>様子<rt>ようす</rt></ruby>が<ruby>見ら<rt>みら</rt></ruby>れます。おもしろいのは、<ruby>雌<rt>めす</rt></ruby>は<ruby>飛ぶ<rt>とぶ</rt></ruby>のが<ruby>苦手<rt>にがて</rt></ruby>なものが<ruby>多い<rt>おおい</rt></ruby>ことです。なかには、<ruby>羽<rt>はね</rt></ruby>がなくなって、まったく<ruby>飛べ<rt>とべ</rt></ruby>なくなったものもいます。そういうものは、<ruby>山<rt>やま</rt></ruby>の<ruby>中の<rt>なかの</rt></ruby><ruby>手<rt>て</rt></ruby>すりや、<ruby>木<rt>き</rt></ruby>の<ruby>枝<rt>えだ</rt></ruby>を<ruby>見て<rt>みて</rt></ruby><ruby>回っ<rt>まわっ</rt></ruby>て<ruby>探し<rt>さがし</rt></ruby>てみましょう。また、<ruby>寒い<rt>さむい</rt></ruby><ruby>時期<rt>じき</rt></ruby>にずっといるわけではなく、<ruby>種<rt>たね</rt></ruby>によって<ruby>出る<rt>でる</rt></ruby><ruby>時期<rt>じき</rt></ruby>は<ruby>決ま<rt>きま</rt></ruby>っています。なかなか<ruby>探す<rt>さがす</rt></ruby>のは<ruby>難しい<rt>むずかしい</rt></ruby>かもしれませんが、この<ruby>時期<rt>じき</rt></ruby>の<ruby>暖かい<rt>あたたかい</rt></ruby><ruby>日<rt>にち</rt></ruby>に<ruby>山<rt>やま</rt></ruby>を<ruby>歩い<rt>あるい</rt></ruby>て<ruby>探し<rt>さがし</rt></ruby>てみると<ruby>楽しい<rt>たのしい</rt></ruby>と<ruby>思い<rt>おもい</rt></ruby>ます。\n。(ア)、<ruby>元気<rt>げんき</rt></ruby>になるのは<ruby>春<rt>はる</rt></ruby>や<ruby>夏<rt>なつ</rt></ruby>でも、<ruby>成虫<rt>せいちゅう</rt></ruby>で<ruby>冬<rt>ふゆ</rt></ruby>を<ruby>越す<rt>こす</rt></ruby><ruby>虫<rt>むし</rt></ruby>もいます。<ruby>例えば<rt>たとえば</rt></ruby>、ホソミオツネントンボ(<ruby>細身<rt>ほそみ</rt></ruby><ruby>越冬<rt>えっとう</rt></ruby><ruby>蜻蜓<rt>とんぼ</rt></ruby>)はそういう<ruby>昆虫<rt>こんちゅう</rt></ruby>です。<ruby>普段<rt>ふだん</rt></ruby>は<ruby>水辺<rt>すいへん</rt></ruby>にいますが、この<ruby>時期<rt>じき</rt></ruby>は<ruby>森<rt>もり</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で<ruby>過ご<rt>すご</rt></ruby>し、<ruby>暖かい<rt>あたたかい</rt></ruby><ruby>日<rt>にち</rt></ruby>に<ruby>飛ぶ<rt>とぶ</rt></ruby>のが<ruby>見ら<rt>みら</rt></ruby>れます。<ruby>枯れ<rt>かれ</rt></ruby><ruby>枝<rt>えだ</rt></ruby>のように<ruby>目立た<rt>めだた</rt></ruby>ない<ruby>色<rt>いろ</rt></ruby>をしています。\n。また、キクテハやアカテハ(<ruby>木<rt>き</rt></ruby><ruby>叶<rt>かのう</rt></ruby><ruby>蝶<rt>ちょう</rt></ruby><ruby>和<rt>わ</rt></ruby><ruby>赤<rt>あか</rt></ruby>蛱)などの<ruby>蝶<rt>ちょう</rt></ruby>も<ruby>成虫<rt>せいちゅう</rt></ruby>で<ruby>冬<rt>ふゆ</rt></ruby>を<ruby>越し<rt>こし</rt></ruby>、<ruby>暖かい<rt>あたたかい</rt></ruby><ruby>日<rt>にち</rt></ruby>には<ruby>飛ぶ<rt>とぶ</rt></ruby>こともあります。そのほか、<ruby>蠅<rt>はえ</rt></ruby>などの<ruby>小さい<rt>ちーさい</rt></ruby><ruby>虫<rt>むし</rt></ruby>にも、<ruby>冬<rt>ふゆ</rt></ruby>を<ruby>好ん<rt>このん</rt></ruby>で<ruby>飛び<rt>とび</rt></ruby><ruby>回る<rt>まわる</rt></ruby>ものがいます。<ruby>昆虫<rt>こんちゅう</rt></ruby>というのはいろいろ<ruby>暮らし<rt>くらし</rt></ruby><ruby>方<rt>ほう</rt></ruby>で<ruby>生き<rt>いき</rt></ruby>るものがいて、<ruby>冬<rt>ふゆ</rt></ruby>にも<ruby>元気<rt>げんき</rt></ruby>にしているものがいるというのは<ruby>本当<rt>ほんとう</rt></ruby>にびっくりです。\n。\n。26. <ruby>冬<rt>ふゆ</rt></ruby><ruby>尺<rt>しゃく</rt></ruby>はいつ<ruby>出て<rt>でて</rt></ruby>くるか。\n。A. <ruby>初春<rt>しょしゅん</rt></ruby>から<ruby>初秋<rt>しょしゅう</rt></ruby>までの<ruby>暑い<rt>あつい</rt></ruby><ruby>時期<rt>じき</rt></ruby>\n<ruby>時期<rt>じき</rt></ruby>B. <ruby>深秋<rt>しんしゅう</rt></ruby>から<ruby>春<rt>はる</rt></ruby>の<ruby>前<rt>まえ</rt></ruby>までの<ruby>寒い<rt>さむい</rt></ruby><ruby>時期<rt>じき</rt></ruby>\n<ruby>時期<rt>じき</rt></ruby>C. <ruby>真冬<rt>まふゆ</rt></ruby>から<ruby>初春<rt>しょしゅん</rt></ruby>までの<ruby>暖かい<rt>あたたかい</rt></ruby><ruby>時期<rt>じき</rt></ruby>\n<ruby>時期<rt>じき</rt></ruby>D. <ruby>真夏<rt>まなつ</rt></ruby>から<ruby>真冬<rt>まふゆ</rt></ruby>までの<ruby>長い<rt>ながい</rt></ruby><ruby>時期<rt>じき</rt></ruby>", "translation_cn": "(2)寒冷季节昆虫不易见到。有点寂寞，不过有些虫子只有天冷的时候才会出来。冬天最常见的蛾子是一种叫做冬蛾的小蛾子。因幼虫为尺蠖，故称尺蛾，有的在冬季出现。冬尺出现在晚秋到春天之前的寒冷季节。在温暖的日子里，当树叶落下时，你可以看到它们在森林里翩翩起舞。有趣的是，许多女性并不擅长飞行。有些人失去了翅膀，根本无法飞翔。在山周围寻找扶手和树枝之类的东西。而且，它们不会一直呆在寒冷的季节，出现的时间取决于物种。找到它们可能很困难，但我认为每年这个时候在温暖的日子里步行上山寻找它们会很有趣。 (a) 有些昆虫在成年后能存活下来，即使它们在春季或夏季变得活跃。例如，细长的越冬蜻蜓就是这样的昆虫。它们通常生活在水边，但每年的这个时候它们都会在森林里度过，在温暖的日子里可以看到它们飞翔。它有一种不显眼的颜色，类似于枯枝。此外，Kikuteha 和 Akateha（黑野蝴蝶和 Akakagi 蝴蝶）等蝴蝶以成虫的形式过冬，并可能在温暖的日子飞走。另外，还有一些小昆虫，比如苍蝇，喜欢在冬天飞来飞去。昆虫可以以多种方式生活，其中一些甚至在冬天也能保持健康，真是令人惊讶。 26.冬尺什么时候出？ A. 早春至初秋的炎热期 B. 深秋至早春的寒冷期 C. 仲冬至早春的温暖期 D. 盛夏至仲冬的长时期"}, {"number": 27, "answer": "D", "body": "27. 文中の「そういうもの」の指すものは何か。\nA. 飛ぶのが苦手だが、ひらひらと飛べる雄の冬尺\nB. 飛ぶのが苦手だが、ひらひらと飛べる雌の冬尺\nC. 羽がなく、ぜんぜん飛べなくなった雄の冬尺\nD. 羽がなく、ぜんぜん飛べなくなった雌の冬尺", "ruby_html": "27. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「そういうもの」の<ruby>指す<rt>さす</rt></ruby>ものは<ruby>何か<rt>なにか</rt></ruby>。\n。A. <ruby>飛ぶ<rt>とぶ</rt></ruby>のが<ruby>苦手<rt>にがて</rt></ruby>だが、ひらひらと<ruby>飛べ<rt>とべ</rt></ruby>る<ruby>雄<rt>おす</rt></ruby>の<ruby>冬<rt>ふゆ</rt></ruby><ruby>尺<rt>しゃく</rt></ruby>\n<ruby>尺<rt>しゃく</rt></ruby>B. <ruby>飛ぶ<rt>とぶ</rt></ruby>のが<ruby>苦手<rt>にがて</rt></ruby>だが、ひらひらと<ruby>飛べ<rt>とべ</rt></ruby>る<ruby>雌<rt>めす</rt></ruby>の<ruby>冬<rt>ふゆ</rt></ruby><ruby>尺<rt>しゃく</rt></ruby>\n<ruby>尺<rt>しゃく</rt></ruby>C. <ruby>羽<rt>はね</rt></ruby>がなく、ぜんぜん<ruby>飛べ<rt>とべ</rt></ruby>なくなった<ruby>雄<rt>おす</rt></ruby>の<ruby>冬<rt>ふゆ</rt></ruby><ruby>尺<rt>しゃく</rt></ruby>\n<ruby>尺<rt>しゃく</rt></ruby>D. <ruby>羽<rt>はね</rt></ruby>がなく、ぜんぜん<ruby>飛べ<rt>とべ</rt></ruby>なくなった<ruby>雌<rt>めす</rt></ruby>の<ruby>冬<rt>ふゆ</rt></ruby><ruby>尺<rt>しゃく</rt></ruby>", "translation_cn": "27. 句子中的“那种事”指什么？ A. 不擅长飞行，但会扑动的雄性冬尺 B. 不擅长飞行，但会扑动的雌性冬尺 C. 没有翅膀，根本无法飞行的雄性冬尺 D. 没有翅膀，根本无法飞行的雌性冬尺"}, {"number": 28, "answer": "C", "body": "28. 文中の(ア)に入れるのに最も適当なのはどれか。\nA. そのため B. そのように C. そのほか D. そのうえに", "ruby_html": "28. <ruby>文中<rt>ぶんちゅう</rt></ruby>の(ア)に<ruby>入れ<rt>いれ</rt></ruby>るのに<ruby>最も<rt>もっとも</rt></ruby><ruby>適当<rt>てきとう</rt></ruby>なのはどれか。\n。A. そのため B. そのように C. そのほか D. そのうえに", "translation_cn": "28. 以下哪项最适合放在句子中的 (a) 中？ A. 因此 B. 所以 C. 除了 D. 除了"}, {"number": 29, "answer": "A", "body": "29. 文中に「そういう昆虫」とあるが、どんな昆虫か。\nA. 成虫で冬を越す虫\nB. 幼虫で水の中に生きる虫\nC. 成虫で水辺で暮らす虫\nD. 幼虫で森の中で過ごす虫", "ruby_html": "29. <ruby>文中<rt>ぶんちゅう</rt></ruby>に「そういう<ruby>昆虫<rt>こんちゅう</rt></ruby>」とあるが、どんな<ruby>昆虫<rt>こんちゅう</rt></ruby>か。\n。A. <ruby>成虫<rt>せいちゅう</rt></ruby>で<ruby>冬<rt>ふゆ</rt></ruby>を<ruby>越す<rt>こす</rt></ruby><ruby>虫<rt>むし</rt></ruby>\n<ruby>虫<rt>むし</rt></ruby>B. <ruby>幼虫<rt>ようちゅう</rt></ruby>で<ruby>水<rt>みず</rt></ruby>の<ruby>中に<rt>なかに</rt></ruby><ruby>生き<rt>いき</rt></ruby>る<ruby>虫<rt>むし</rt></ruby>\n<ruby>虫<rt>むし</rt></ruby>C. <ruby>成虫<rt>せいちゅう</rt></ruby>で<ruby>水辺<rt>すいへん</rt></ruby>で<ruby>暮ら<rt>くら</rt></ruby>す<ruby>虫<rt>むし</rt></ruby>\n<ruby>虫<rt>むし</rt></ruby>D. <ruby>幼虫<rt>ようちゅう</rt></ruby>で<ruby>森<rt>もり</rt></ruby>の<ruby>中<rt>なか</rt></ruby>で<ruby>過ご<rt>すご</rt></ruby>す<ruby>虫<rt>むし</rt></ruby>", "translation_cn": "29. 课文说“那种昆虫”。它是什么昆虫？ A. 以成虫形式越冬的昆虫 B. 以幼虫形式生活在水中的昆虫 C. 以成虫形式生活在水附近的昆虫 D. 以幼虫形式生活在森林中的昆虫"}, {"number": 30, "answer": "B", "body": "30. 文章の内容に合っているのはどれか。\nA. 寒い時に出てくる昆虫の種類は少ないが、量はほかの季節より多い。\nB. 寒い時期の暖かい日に森に行くと、冬に出る昆虫を見る可能性がある。\nC. 寒い時に出てくる昆虫はだいたい同じ時期に出て、探すのも簡単だ。\nD. 寒い時期に成虫で活躍している昆虫がいるのは筆者にとって珍しくない。", "ruby_html": "30. <ruby>文章<rt>ぶんしょう</rt></ruby>の<ruby>内容<rt>ないよう</rt></ruby>に<ruby>合っ<rt>あっ</rt></ruby>ているのはどれか。\n。A. <ruby>寒い<rt>さむい</rt></ruby><ruby>時に<rt>ときに</rt></ruby><ruby>出て<rt>でて</rt></ruby>くる<ruby>昆虫<rt>こんちゅう</rt></ruby>の<ruby>種類<rt>しゅるい</rt></ruby>は<ruby>少ない<rt>すくない</rt></ruby>が、<ruby>量<rt>りょう</rt></ruby>はほかの<ruby>季節<rt>きせつ</rt></ruby>より<ruby>多い<rt>おおい</rt></ruby>。\n。B. <ruby>寒い<rt>さむい</rt></ruby><ruby>時期<rt>じき</rt></ruby>の<ruby>暖かい<rt>あたたかい</rt></ruby><ruby>日<rt>にち</rt></ruby>に<ruby>森<rt>もり</rt></ruby>に<ruby>行く<rt>いく</rt></ruby>と、<ruby>冬<rt>ふゆ</rt></ruby>に<ruby>出る<rt>でる</rt></ruby><ruby>昆虫<rt>こんちゅう</rt></ruby>を<ruby>見る<rt>みる</rt></ruby><ruby>可能性<rt>かのうせい</rt></ruby>がある。\n。C. <ruby>寒い<rt>さむい</rt></ruby><ruby>時に<rt>ときに</rt></ruby><ruby>出て<rt>でて</rt></ruby>くる<ruby>昆虫<rt>こんちゅう</rt></ruby>はだいたい<ruby>同じ<rt>おなじ</rt></ruby><ruby>時期<rt>じき</rt></ruby>に<ruby>出て<rt>でて</rt></ruby>、<ruby>探す<rt>さがす</rt></ruby>のも<ruby>簡単<rt>かんたん</rt></ruby>だ。\n。D. <ruby>寒い<rt>さむい</rt></ruby><ruby>時期<rt>じき</rt></ruby>に<ruby>成虫<rt>せいちゅう</rt></ruby>で<ruby>活躍<rt>かつやく</rt></ruby>している<ruby>昆虫<rt>こんちゅう</rt></ruby>がいるのは<ruby>筆者<rt>ひっしゃ</rt></ruby>にとって<ruby>珍しく<rt>めずらしく</rt></ruby>ない。", "translation_cn": "30.下列哪项与句子的内容相符？ A. 天冷时出来的昆虫种类较少，但比其他季节较多。 B. 如果您在寒冷季节的温暖日子去森林，您可能会看到冬季昆虫。 C. 天冷时出来的昆虫通常同时出来，很容易发现。 D. 对我来说，在寒冷季节发现成虫活跃的昆虫并不罕见。"}, {"number": 31, "answer": "A", "body": "(三)\n川根由美子さん(67歳)が今年2月に受け取った段ボール箱には、自費出版した小説200冊が入っていました。福祉の仕事をしながら文章を書き続けてきた彼女は、自信がなかったため、「誰も読まない」と言われるのを恐れていたそうです。(ア)表紙にはこだわり、砂浜の絵と大好きなカキツバタの青い色で和なデザインにしました。同人誌仲間から良い反応をもらえたことで、本にしてよかったと思えるようになりました。\n自費出版とは著者の思いを凝縮したものですが、多くの場合、それが広く読まれることなく消えてしまうことがあります。そこで、川根さんは5月に自宅で「本屋」を始めました。この本屋は利益を考えず、作者同士が交流できる場を指しています。訪れる人は少ないもの、自分の本も置いてほしいという希望者がおり、一生に一度だけでも形として残したいという意気込みが感じられます。「活字によって生き様を残す」という想いが伝わってくると言います。\nこの店には多種多様な自費出版物があります。例えば街の電器屋さんによる郷土史研究にもとづいた時代小説や、30年越しにあぜ道についての研究書などがあります。本を見ただけでも楽しいですが、その背後にある執筆者それぞれの背景やストーリーを知れば、一層その魅力が増します。\n店名「旅する本屋ラボール」には、自費出版された本たちが見知らぬ誰かへ渡り、「どこか遠くへと旅してほしい」という願いが込められています。このような活動が、小さなコミュニティ内外で新たなつながりや発見を生み出すことにつながっています。\n\n31. 文中の(ア)に入れるのに最も適当なものはどれか。\nA. それでも B. そのため C. しかも D. ところで", "ruby_html": "(<ruby>三<rt>さん</rt></ruby>)\n)<ruby>川根<rt>かわね</rt></ruby><ruby>由美子<rt>ゆみこ</rt></ruby>さん(67<ruby>歳<rt>とし</rt></ruby>)が<ruby>今年<rt>こんねん</rt></ruby>2<ruby>月<rt>がつ</rt></ruby>に<ruby>受け取っ<rt>うけとっ</rt></ruby>た<ruby>段ボール<rt>だんぼーる</rt></ruby><ruby>箱<rt>はこ</rt></ruby>には、<ruby>自費出版<rt>じひしゅっぱん</rt></ruby>した<ruby>小説<rt>しょうせつ</rt></ruby>200<ruby>冊<rt>さつ</rt></ruby>が<ruby>入っ<rt>いっっ</rt></ruby>ていました。<ruby>福祉<rt>ふくし</rt></ruby>の<ruby>仕事<rt>しごと</rt></ruby>をしながら<ruby>文章<rt>ぶんしょう</rt></ruby>を<ruby>書き<rt>かき</rt></ruby><ruby>続け<rt>つづけ</rt></ruby>てきた<ruby>彼女<rt>かのじょ</rt></ruby>は、<ruby>自信<rt>じしん</rt></ruby>がなかったため、「<ruby>誰も<rt>だれも</rt></ruby><ruby>読ま<rt>よま</rt></ruby>ない」と<ruby>言わ<rt>いわ</rt></ruby>れるのを<ruby>恐れ<rt>おそれ</rt></ruby>ていたそうです。(ア)<ruby>表紙<rt>ひょうし</rt></ruby>にはこだわり、<ruby>砂浜<rt>すなはま</rt></ruby>の<ruby>絵<rt>え</rt></ruby>と<ruby>大好き<rt>だいすき</rt></ruby>なカキツバタの<ruby>青い<rt>あおい</rt></ruby><ruby>色<rt>いろ</rt></ruby>で<ruby>和な<rt>なごな</rt></ruby>デザインにしました。<ruby>同人誌<rt>どうじんし</rt></ruby><ruby>仲間<rt>なかま</rt></ruby>から<ruby>良い<rt>よい</rt></ruby><ruby>反応<rt>はんのう</rt></ruby>をもらえたことで、<ruby>本<rt>ほん</rt></ruby>にしてよかったと<ruby>思え<rt>おもえ</rt></ruby>るようになりました。\n。<ruby>自費出版<rt>じひしゅっぱん</rt></ruby>とは<ruby>著者<rt>ちょしゃ</rt></ruby>の<ruby>思い<rt>おもい</rt></ruby>を<ruby>凝縮<rt>ぎょうしゅく</rt></ruby>したものですが、<ruby>多く<rt>おおく</rt></ruby>の<ruby>場合<rt>ばあい</rt></ruby>、それが<ruby>広く<rt>ひろく</rt></ruby><ruby>読ま<rt>よま</rt></ruby>れることなく<ruby>消え<rt>きえ</rt></ruby>てしまうことがあります。そこで、<ruby>川根<rt>かわね</rt></ruby>さんは5<ruby>月<rt>がつ</rt></ruby>に<ruby>自宅<rt>じたく</rt></ruby>で「<ruby>本屋<rt>ほんや</rt></ruby>」を<ruby>始め<rt>はじめ</rt></ruby>ました。この<ruby>本屋<rt>ほんや</rt></ruby>は<ruby>利益<rt>りえき</rt></ruby>を<ruby>考え<rt>かんがえ</rt></ruby>ず、<ruby>作者<rt>さくしゃ</rt></ruby><ruby>同士<rt>どうし</rt></ruby>が<ruby>交流<rt>こうりゅう</rt></ruby>できる<ruby>場<rt>ば</rt></ruby>を<ruby>指し<rt>さし</rt></ruby>ています。<ruby>訪れ<rt>おとずれ</rt></ruby>る<ruby>人<rt>にん</rt></ruby>は<ruby>少ない<rt>すくない</rt></ruby>もの、<ruby>自分<rt>じぶん</rt></ruby>の<ruby>本<rt>ほん</rt></ruby>も<ruby>置い<rt>おい</rt></ruby>てほしいという<ruby>希望者<rt>きぼうしゃ</rt></ruby>がおり、<ruby>一生<rt>いっしょう</rt></ruby>に<ruby>一度<rt>いちど</rt></ruby>だけでも<ruby>形<rt>かたち</rt></ruby>として<ruby>残した<rt>のこした</rt></ruby>いという<ruby>意気込み<rt>いきごみ</rt></ruby>が<ruby>感じ<rt>かんじ</rt></ruby>られます。「<ruby>活字<rt>かつじ</rt></ruby>によって<ruby>生き<rt>いき</rt></ruby><ruby>様<rt>さま</rt></ruby>を<ruby>残す<rt>のこす</rt></ruby>」という<ruby>想い<rt>おもい</rt></ruby>が<ruby>伝わ<rt>つたわ</rt></ruby>ってくると<ruby>言い<rt>いい</rt></ruby>ます。\n。この<ruby>店<rt>みせ</rt></ruby>には<ruby>多種多様<rt>たしゅたよう</rt></ruby>な<ruby>自費出版<rt>じひしゅっぱん</rt></ruby><ruby>物<rt>もの</rt></ruby>があります。<ruby>例えば<rt>たとえば</rt></ruby><ruby>街<rt>まち</rt></ruby>の<ruby>電器屋<rt>でんきや</rt></ruby>さんによる<ruby>郷土史<rt>きょうどし</rt></ruby><ruby>研究<rt>けんきゅう</rt></ruby>にもとづいた<ruby>時代<rt>じだい</rt></ruby><ruby>小説<rt>しょうせつ</rt></ruby>や、30<ruby>年越し<rt>としこし</rt></ruby>にあぜ<ruby>道<rt>みち</rt></ruby>についての<ruby>研究書<rt>けんきゅうしょ</rt></ruby>などがあります。<ruby>本<rt>ほん</rt></ruby>を<ruby>見た<rt>みた</rt></ruby>だけでも<ruby>楽しい<rt>たのしい</rt></ruby>ですが、その<ruby>背後<rt>はいご</rt></ruby>にある<ruby>執筆者<rt>しっぴつしゃ</rt></ruby>それぞれの<ruby>背景<rt>はいけい</rt></ruby>やストーリーを<ruby>知れ<rt>しれ</rt></ruby>ば、<ruby>一層<rt>いっそう</rt></ruby>その<ruby>魅力<rt>みりょく</rt></ruby>が<ruby>増し<rt>まし</rt></ruby>ます。\n。<ruby>店名<rt>てんめい</rt></ruby>「<ruby>旅<rt>たび</rt></ruby>する<ruby>本屋<rt>ほんや</rt></ruby>ラボール」には、<ruby>自費出版<rt>じひしゅっぱん</rt></ruby>された<ruby>本<rt>ほん</rt></ruby>たちが<ruby>見知ら<rt>みしら</rt></ruby>ぬ<ruby>誰か<rt>だれか</rt></ruby>へ<ruby>渡り<rt>わたり</rt></ruby>、「どこか<ruby>遠く<rt>とおく</rt></ruby>へと<ruby>旅<rt>たび</rt></ruby>してほしい」という<ruby>願い<rt>ねがい</rt></ruby>が<ruby>込め<rt>こめ</rt></ruby>られています。このような<ruby>活動<rt>かつどう</rt></ruby>が、<ruby>小さ<rt>ちいさ</rt></ruby>なコミュニティ<ruby>内外<rt>ないがい</rt></ruby>で<ruby>新た<rt>あらた</rt></ruby>なつながりや<ruby>発見<rt>はっけん</rt></ruby>を<ruby>生み出す<rt>うみだす</rt></ruby>ことにつながっています。\n。\n。31. <ruby>文中<rt>ぶんちゅう</rt></ruby>の(ア)に<ruby>入れ<rt>いれ</rt></ruby>るのに<ruby>最も<rt>もっとも</rt></ruby><ruby>適当<rt>てきとう</rt></ruby>なものはどれか。\n。A. それでも B. そのため C. しかも D. ところで", "translation_cn": "（3）河根由美子（67岁）今年2月收到的纸箱里装着200本自行出版的小说。尽管她在福利院工作的同时继续写作，但她缺乏自信，害怕被告知没有人会读她的作品。 (A) 我对封面非常讲究，选择了日式设计，上面有沙滩的图片和我最喜欢的柿子的蓝色。我从同人志朋友那里得到的积极反馈让我很高兴我把它变成了一本书。自出版是作者思想的浓缩版，但在很多情况下，它没有被广泛阅读就消失了。于是，五月份，川根在家里开了一家“书店”。这家书店是一个作者可以互相交流而不考虑利润的地方。虽然来的人不多，但还是有一些人愿意把自己的书放在那里，你可以感受到他们的热情，想要给这里留下深刻的印象，哪怕一生只有一次。据说传达了“通过印刷保存一种生活方式”的理念。这家商店有各种各样的自行出版的出版物。例如，有镇上一家电器店根据当地历史研究而写的历史小说，还有出版了30多年的步道研究书籍。光是看书就很有趣，但了解每个作者背后的背景和故事会更有吸引力。店名“旅行书店La Baule”反映了人们希望将自己出版的书籍交给陌生人，让他们“去遥远的地方旅行”。这样的活动可以在小社区内外建立新的联系和发现。 31. 以下哪项最适合放在句子中的 (a) 中？ A. 还是 B. 因为那个 C. 而且 D. 顺便说一下"}, {"number": 32, "answer": "C", "body": "32. 川根さんが始めた「本屋」の目的として、最も適当なものはどれか。\nA. 自費出版物を広く販売して利益を上げること\nB. 郷土史や研究書などの本を収集して展示すること\nC. 作者同士が交流できる場を提供すること\nD. 活字で書かれた本をデジタル化し保存すること", "ruby_html": "32. <ruby>川根<rt>かわね</rt></ruby>さんが<ruby>始め<rt>はじめ</rt></ruby>た「<ruby>本屋<rt>ほんや</rt></ruby>」の<ruby>目的<rt>もくてき</rt></ruby>として、<ruby>最も<rt>もっとも</rt></ruby><ruby>適当<rt>てきとう</rt></ruby>なものはどれか。\n。A. <ruby>自費出版<rt>じひしゅっぱん</rt></ruby><ruby>物<rt>もの</rt></ruby>を<ruby>広く<rt>ひろく</rt></ruby><ruby>販売<rt>はんばい</rt></ruby>して<ruby>利益<rt>りえき</rt></ruby>を<ruby>上げ<rt>あげ</rt></ruby>ること\nることB. <ruby>郷土史<rt>きょうどし</rt></ruby>や<ruby>研究書<rt>けんきゅうしょ</rt></ruby>などの<ruby>本<rt>ほん</rt></ruby>を<ruby>収集<rt>しゅうしゅう</rt></ruby>して<ruby>展示<rt>てんじ</rt></ruby>すること\nすることC. <ruby>作者<rt>さくしゃ</rt></ruby><ruby>同士<rt>どうし</rt></ruby>が<ruby>交流<rt>こうりゅう</rt></ruby>できる<ruby>場<rt>ば</rt></ruby>を<ruby>提供<rt>ていきょう</rt></ruby>すること\nすることD. <ruby>活字<rt>かつじ</rt></ruby>で<ruby>書か<rt>かか</rt></ruby>れた<ruby>本<rt>ほん</rt></ruby>をデジタル<ruby>化し<rt>かし</rt></ruby><ruby>保存<rt>ほぞん</rt></ruby>すること", "translation_cn": "32. 以下哪一项是川根先生开设的“书店”的最合适的目的？ A. 通过广泛销售自行出版的作品来获利 B. 收集和展示当地历史和研究书籍等书籍 C. 提供作者可以相互交流的场所 D. 将印刷书籍数字化并保存"}, {"number": 33, "answer": "D", "body": "33. 文中の「意気込み」を最も正しく表すものはどれか。\nA. 将来を考えた冷静な決断\nB. すぐに結果を出すための努力\nC. ビジネスとして成功させたいという考え\nD. 自分の本を世に出したいという強い思い", "ruby_html": "33. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「<ruby>意気込み<rt>いきごみ</rt></ruby>」を<ruby>最も<rt>もっとも</rt></ruby><ruby>正しく<rt>ただしく</rt></ruby><ruby>表す<rt>あらわす</rt></ruby>ものはどれか。\n。A. <ruby>将来<rt>しょうらい</rt></ruby>を<ruby>考え<rt>かんがえ</rt></ruby>た<ruby>冷静<rt>れいせい</rt></ruby>な<ruby>決断<rt>けつだん</rt></ruby>\n<ruby>決断<rt>けつだん</rt></ruby>B. すぐに<ruby>結果<rt>けっか</rt></ruby>を<ruby>出す<rt>だす</rt></ruby>ための<ruby>努力<rt>どりょく</rt></ruby>\n<ruby>努力<rt>どりょく</rt></ruby>C. ビジネスとして<ruby>成功<rt>せいこう</rt></ruby>させたいという<ruby>考え<rt>かんがえ</rt></ruby>\n<ruby>考え<rt>かんがえ</rt></ruby>D. <ruby>自分<rt>じぶん</rt></ruby>の<ruby>本<rt>ほん</rt></ruby>を<ruby>世に<rt>よに</rt></ruby><ruby>出し<rt>だし</rt></ruby>たいという<ruby>強い<rt>つよい</rt></ruby><ruby>思い<rt>おもい</rt></ruby>", "translation_cn": "33. 以下哪项最能表达句子中的“热情”？ A. 着眼未来，冷静决策 B. 努力立即取得成果 C. 使其成为一家成功企业的想法 D. 将您的书推向世界的强烈愿望"}, {"number": 34, "answer": "A", "body": "34. 文中の「旅する本屋ラボール」の店名に込められた願いは何か。\nA. 自費出版された本が見知らぬ人の手に渡ることを願う。\nB. 多くの人が本を通じて旅行に出かけることを願う。\nC. 作者が自分の本を持って各地を旅することを願う。\nD. 小さなコミュニティの外に本屋を広げることを願う。", "ruby_html": "34. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「<ruby>旅<rt>たび</rt></ruby>する<ruby>本屋<rt>ほんや</rt></ruby>ラボール」の<ruby>店名<rt>てんめい</rt></ruby>に<ruby>込め<rt>こめ</rt></ruby>られた<ruby>願い<rt>ねがい</rt></ruby>は<ruby>何か<rt>なにか</rt></ruby>。\n。A. <ruby>自費出版<rt>じひしゅっぱん</rt></ruby>された<ruby>本<rt>ほん</rt></ruby>が<ruby>見知ら<rt>みしら</rt></ruby>ぬ<ruby>人<rt>にん</rt></ruby>の<ruby>手に<rt>てに</rt></ruby><ruby>渡る<rt>わたる</rt></ruby>ことを<ruby>願う<rt>ねがう</rt></ruby>。\n。B. <ruby>多く<rt>おおく</rt></ruby>の<ruby>人<rt>にん</rt></ruby>が<ruby>本<rt>ほん</rt></ruby>を<ruby>通じ<rt>つうじ</rt></ruby>て<ruby>旅行<rt>りょこう</rt></ruby>に<ruby>出か<rt>でか</rt></ruby>けることを<ruby>願う<rt>ねがう</rt></ruby>。\n。C. <ruby>作者<rt>さくしゃ</rt></ruby>が<ruby>自分<rt>じぶん</rt></ruby>の<ruby>本<rt>ほん</rt></ruby>を<ruby>持っ<rt>もっ</rt></ruby>て<ruby>各地<rt>かくち</rt></ruby>を<ruby>旅<rt>たび</rt></ruby>することを<ruby>願う<rt>ねがう</rt></ruby>。\n。D. <ruby>小さ<rt>ちいさ</rt></ruby>なコミュニティの<ruby>外<rt>そと</rt></ruby>に<ruby>本屋<rt>ほんや</rt></ruby>を<ruby>広げ<rt>ひろげ</rt></ruby>ることを<ruby>願う<rt>ねがう</rt></ruby>。", "translation_cn": "34.文中店名“旅行书店La Baule”所包含的愿望是什么？答：我希望我自己出版的书最终落入陌生人手中。 B.我希望很多人通过书来旅行。 C. 我希望作者能带着他的书环游世界。 D. 我希望将我的书店扩展到我的小社区之外。"}, {"number": 35, "answer": "B", "body": "35. この文章の内容と合っているものはどれか。\nA. 川根さんは最初から自費出版に自信を持っていた。\nB. 自費出版物には、作者の経験や思いが反映されている。\nC. この本屋は訪れる人が多く、常ににぎわっている。\nD. この本屋では、利益を上げるための販売戦略を行っている。", "ruby_html": "35. この<ruby>文章<rt>ぶんしょう</rt></ruby>の<ruby>内容<rt>ないよう</rt></ruby>と<ruby>合っ<rt>あっ</rt></ruby>ているものはどれか。\n。A. <ruby>川根<rt>かわね</rt></ruby>さんは<ruby>最初<rt>さいしょ</rt></ruby>から<ruby>自費出版<rt>じひしゅっぱん</rt></ruby>に<ruby>自信<rt>じしん</rt></ruby>を<ruby>持っ<rt>もっ</rt></ruby>ていた。\n。B. <ruby>自費出版<rt>じひしゅっぱん</rt></ruby><ruby>物<rt>もの</rt></ruby>には、<ruby>作者<rt>さくしゃ</rt></ruby>の<ruby>経験<rt>けいけん</rt></ruby>や<ruby>思い<rt>おもい</rt></ruby>が<ruby>反映<rt>はんえい</rt></ruby>されている。\n。C. この<ruby>本屋<rt>ほんや</rt></ruby>は<ruby>訪れ<rt>おとずれ</rt></ruby>る<ruby>人<rt>にん</rt></ruby>が<ruby>多く<rt>おおく</rt></ruby>、<ruby>常に<rt>つねに</rt></ruby>にぎわっている。\n。D. この<ruby>本屋<rt>ほんや</rt></ruby>では、<ruby>利益<rt>りえき</rt></ruby>を<ruby>上げ<rt>あげ</rt></ruby>るための<ruby>販売戦略<rt>はんばいせんりゃく</rt></ruby>を<ruby>行って<rt>いって</rt></ruby>いる。", "translation_cn": "35.下列哪项与本文内容相符？ A. 河根先生从一开始就对自助出版充满信心。 B.自行出版的作品反映作者的经历和想法。 C. 这家书店来客很多，总是很忙。 D. 这家书店采用销售策略来增加利润。"}, {"number": 36, "answer": "B", "body": "(四)\n日本ではよく「若者はもっと個性を出すべきだ」や「個性を磨くべきだ」と言われますが、 私はこうした意見にはあまり意味がないと感じています。特に、日本で「個性」という言葉\nが外見に関して使われることにも違和感があります。「個性的なファッション」や「個性的な ハアスタイル」といえば、多くの場合、人々を驚かせるような奇抜さを指しています。\nこのように考えると、「個性=目立つこと」という誤解が広まっているのではないでしょう うか。(ア) 、本質的には、この世に生まれた人は誰もがそれぞれ異なる個性を持っていま す。そのため、誰かから「磨け」と命じられて義務のように努力する必要はありません。あ なたの個性は唯一無二であり、世界中どこにも同じものを持つ人はいません。他人と比較し たり真似たりする必要はなのです。\n大切なのは、自分自身が楽しいと思うことや不思議だと思うこと、ときめきを感じること など、自分の心から求めているものを優先することです。「磨く」や「発揮する」と意識しない くても、本当に好きなものや興味ある事柄へ自然と気持ちが向いていけば、それだけで自分 自身の世界は広がります。それこそが本当の「個性を磨く」ということでしよう。\n結局、他人との比較ではなく、自分自身の内面から湧き上がる欲求や好奇心によって行動 すると、その結果が独自の道筋となり、それこそ本当の意味で自分らしい人生につながります す。 このプロセスそのものがお互い異なる存在として価値あるのであり、それぞ れの日常 生活でもっと自然体で過ごすための匕ン卜になるでしょう。\n\n36. 文中に「違和感があります」 とあるが、それはなぜか。\nA .個 性は生まれつき決まっているので、磨くことができないと考えているから\nB .個 性という言葉が、外見的な奇抜さを表すために使われることが多いから\nC. 若者が個性を出そうとすると、社会から否定されてしまうから\nD .個 性を重視するあまり、人間関係がうまくいかなくなっているから", "ruby_html": "(<ruby>四<rt>し</rt></ruby>)\n)<ruby>日本<rt>にっぽん</rt></ruby>ではよく「<ruby>若者<rt>わかもの</rt></ruby>はもっと<ruby>個性<rt>こせい</rt></ruby>を<ruby>出す<rt>だす</rt></ruby>べきだ」や「<ruby>個性<rt>こせい</rt></ruby>を<ruby>磨く<rt>みがく</rt></ruby>べきだ」と<ruby>言わ<rt>いわ</rt></ruby>れますが、 <ruby>私<rt>わたし</rt></ruby>はこうした<ruby>意見<rt>いけん</rt></ruby>にはあまり<ruby>意味<rt>いみ</rt></ruby>がないと<ruby>感じ<rt>かんじ</rt></ruby>ています。<ruby>特に<rt>とくに</rt></ruby>、<ruby>日本<rt>にっぽん</rt></ruby>で「<ruby>個性<rt>こせい</rt></ruby>」という<ruby>言葉<rt>ことば</rt></ruby>\n<ruby>言葉<rt>ことば</rt></ruby>が<ruby>外見<rt>がいけん</rt></ruby>に<ruby>関し<rt>かんし</rt></ruby>て<ruby>使わ<rt>つかわ</rt></ruby>れることにも<ruby>違和感<rt>いわかん</rt></ruby>があります。「<ruby>個性的<rt>こせいてき</rt></ruby>なファッション」や「<ruby>個性的<rt>こせいてき</rt></ruby>な ハアスタイル」といえば、<ruby>多く<rt>おおく</rt></ruby>の<ruby>場合<rt>ばあい</rt></ruby>、<ruby>人々<rt>ひとびと</rt></ruby>を<ruby>驚か<rt>おどろか</rt></ruby>せるような<ruby>奇抜<rt>きばつ</rt></ruby>さを<ruby>指し<rt>さし</rt></ruby>ています。\n。このように<ruby>考え<rt>かんがえ</rt></ruby>ると、「<ruby>個性<rt>こせい</rt></ruby>=<ruby>目立つ<rt>めだつ</rt></ruby>こと」という<ruby>誤解<rt>ごかい</rt></ruby>が<ruby>広ま<rt>ひろま</rt></ruby>っているのではないでしょう うか。(ア) 、<ruby>本質的<rt>ほんしつてき</rt></ruby>には、この<ruby>世に<rt>よに</rt></ruby><ruby>生まれ<rt>うまれ</rt></ruby>た<ruby>人<rt>にん</rt></ruby>は<ruby>誰も<rt>だれも</rt></ruby>がそれぞれ<ruby>異なる<rt>ことなる</rt></ruby><ruby>個性<rt>こせい</rt></ruby>を<ruby>持っ<rt>もっ</rt></ruby>ていま す。そのため、<ruby>誰か<rt>だれか</rt></ruby>から「<ruby>磨け<rt>みがけ</rt></ruby>」と<ruby>命じ<rt>めいじ</rt></ruby>られて<ruby>義務<rt>ぎむ</rt></ruby>のように<ruby>努力<rt>どりょく</rt></ruby>する<ruby>必要<rt>ひつよう</rt></ruby>はありません。あ なたの<ruby>個性<rt>こせい</rt></ruby>は<ruby>唯一無二<rt>ゆいいつむに</rt></ruby>であり、<ruby>世界中<rt>せかいじゅう</rt></ruby>どこにも<ruby>同じ<rt>おなじ</rt></ruby>ものを<ruby>持つ<rt>もつ</rt></ruby><ruby>人<rt>にん</rt></ruby>はいません。<ruby>他人<rt>たにん</rt></ruby>と<ruby>比較<rt>ひかく</rt></ruby>し たり<ruby>真似<rt>まね</rt></ruby>たりする<ruby>必要<rt>ひつよう</rt></ruby>はなのです。\n。<ruby>大切<rt>たいせつ</rt></ruby>なのは、<ruby>自分自身<rt>じぶんじしん</rt></ruby>が<ruby>楽しい<rt>たのしい</rt></ruby>と<ruby>思う<rt>おもう</rt></ruby>ことや<ruby>不思議<rt>ふしぎ</rt></ruby>だと<ruby>思う<rt>おもう</rt></ruby>こと、ときめきを<ruby>感じ<rt>かんじ</rt></ruby>ること など、<ruby>自分<rt>じぶん</rt></ruby>の<ruby>心<rt>こころ</rt></ruby>から<ruby>求め<rt>もとめ</rt></ruby>ているものを<ruby>優先<rt>ゆうせん</rt></ruby>することです。「<ruby>磨く<rt>みがく</rt></ruby>」や「<ruby>発揮<rt>はっき</rt></ruby>する」と<ruby>意識<rt>いしき</rt></ruby>しない くても、<ruby>本当<rt>ほんとう</rt></ruby>に<ruby>好き<rt>すき</rt></ruby>なものや<ruby>興味<rt>きょうみ</rt></ruby>ある<ruby>事柄<rt>ことがら</rt></ruby>へ<ruby>自然<rt>しぜん</rt></ruby>と<ruby>気持ち<rt>きもち</rt></ruby>が<ruby>向い<rt>むい</rt></ruby>ていけば、それだけで<ruby>自分<rt>じぶん</rt></ruby> <ruby>自身<rt>じしん</rt></ruby>の<ruby>世界<rt>せかい</rt></ruby>は<ruby>広が<rt>ひろが</rt></ruby>ります。それこそが<ruby>本当<rt>ほんとう</rt></ruby>の「<ruby>個性<rt>こせい</rt></ruby>を<ruby>磨く<rt>みがく</rt></ruby>」ということでしよう。\n。<ruby>結局<rt>けっきょく</rt></ruby>、<ruby>他人<rt>たにん</rt></ruby>との<ruby>比較<rt>ひかく</rt></ruby>ではなく、<ruby>自分自身<rt>じぶんじしん</rt></ruby>の<ruby>内面<rt>ないめん</rt></ruby>から<ruby>湧き<rt>わき</rt></ruby><ruby>上が<rt>あが</rt></ruby>る<ruby>欲求<rt>よっきゅう</rt></ruby>や<ruby>好奇心<rt>こうきしん</rt></ruby>によって<ruby>行動<rt>こうどう</rt></ruby> すると、その<ruby>結果<rt>けっか</rt></ruby>が<ruby>独自<rt>どくじ</rt></ruby>の<ruby>道筋<rt>みちすじ</rt></ruby>となり、それこそ<ruby>本当<rt>ほんとう</rt></ruby>の<ruby>意味<rt>いみ</rt></ruby>で<ruby>自分<rt>じぶん</rt></ruby>らしい<ruby>人生<rt>じんせい</rt></ruby>につながります す。 このプロセスそのものがお<ruby>互い<rt>たがい</rt></ruby><ruby>異なる<rt>ことなる</rt></ruby><ruby>存在<rt>そんざい</rt></ruby>として<ruby>価値<rt>かち</rt></ruby>あるのであり、それぞ れの<ruby>日常<rt>にちじょう</rt></ruby> <ruby>生活<rt>せいかつ</rt></ruby>でもっと<ruby>自然体<rt>しぜんたい</rt></ruby>で<ruby>過ご<rt>すご</rt></ruby>すための<ruby>匕<rt>さじ</rt></ruby>ン<ruby>卜<rt>ぼく</rt></ruby>になるでしょう。\n。\n。36. <ruby>文中<rt>ぶんちゅう</rt></ruby>に「<ruby>違和感<rt>いわかん</rt></ruby>があります」 とあるが、それはなぜか。\n。A .<ruby>個<rt>こ</rt></ruby> <ruby>性<rt>せい</rt></ruby>は<ruby>生まれつき<rt>うまれつき</rt></ruby><ruby>決ま<rt>きま</rt></ruby>っているので、<ruby>磨く<rt>みがく</rt></ruby>ことができないと<ruby>考え<rt>かんがえ</rt></ruby>ているから\nているからB .<ruby>個<rt>こ</rt></ruby> <ruby>性<rt>せい</rt></ruby>という<ruby>言葉<rt>ことば</rt></ruby>が、<ruby>外見的<rt>がいけんてき</rt></ruby>な<ruby>奇抜<rt>きばつ</rt></ruby>さを<ruby>表す<rt>あらわす</rt></ruby>ために<ruby>使わ<rt>つかわ</rt></ruby>れることが<ruby>多い<rt>おおい</rt></ruby>から\nからC. <ruby>若者<rt>わかもの</rt></ruby>が<ruby>個性<rt>こせい</rt></ruby>を<ruby>出そ<rt>だそ</rt></ruby>うとすると、<ruby>社会<rt>しゃかい</rt></ruby>から<ruby>否定<rt>ひてい</rt></ruby>されてしまうから\nされてしまうからD .<ruby>個<rt>こ</rt></ruby> <ruby>性<rt>せい</rt></ruby>を<ruby>重視<rt>じゅうし</rt></ruby>するあまり、<ruby>人間関係<rt>にんげんかんけい</rt></ruby>がうまくいかなくなっているから", "translation_cn": "（4）在日本，人们常说“年轻人应该表现出更多的个性”或“他们应该磨练自己的个性”，但我觉得这些观点意义不大。特别是，我觉得很奇怪，在日本，“个性”这个词被用来指外表。当我们谈论“独特的时尚”或“独特的风格”时，我们通常指的是令人惊讶的古怪行为。考虑到这一点，我认为存在一种普遍的误解，即“个性=脱颖而出”。 (a) 本质上，每个出生在这个世界上的人都有不同的性格。因此，当有人告诉你“好好复习”时，你不必觉得自己有义务去努力。你的个性是独一无二的，世界上没有其他人拥有相同的个性。没有必要比较或模仿别人。重要的是优先考虑你真正想要的东西，比如你觉得有趣的东西，你觉得神秘的东西，以及让你感到兴奋的东西。即使你不考虑“提高”或“锻炼你的技能”，如果你自然地将注意力转向你真正喜欢或感兴趣的事情，你的世界就会扩大。这就是真正的“个性的提高”。最终，如果你根据自己内心产生的欲望和好奇心行事，而不是与他人比较，结果将成为你自己独特的道路，这将通向真正属于你自己的生活。这个过程本身很有价值，因为我们每个人都与众不同，并且可以作为我们每个人日常生活中更自然生活的指南。 36.为什么这句话说“我感觉不舒服”？ A.因为他们认为个性是与生俱来的，无法改善的。 B. 个性这个词经常被用来描述外在的怪癖。 C. 当年轻人试图表达自己的个性时，他们被社会拒绝。 D、因为他们太注重个性，所以人际关系不太融洽。"}, {"number": 37, "answer": "A", "body": "37. 文中の(ア)に入れるのに最も適当なものはどれか。\nA. しかし B. そのため C. したがって D. それから", "ruby_html": "37. <ruby>文中<rt>ぶんちゅう</rt></ruby>の(ア)に<ruby>入れ<rt>いれ</rt></ruby>るのに<ruby>最も<rt>もっとも</rt></ruby><ruby>適当<rt>てきとう</rt></ruby>なものはどれか。\n。A. しかし B. そのため C. したがって D. それから", "translation_cn": "37. 以下哪项最适合放在句子中的 (a) 中？ A. 但是 B. 因此 C. 因此 D. 那么"}, {"number": 38, "answer": "C", "body": "38.筆者によると、「個性を磨く」ために必要なことは何か。\nA.他人に負けないような特別なスキルを身につけること\nB. 社会の期待に応えるような立派な人間になること\nC. 自分の心から楽しいと思えることを優先して行動すること\nD. 周囲の人々と積極的に関わって視野を広げること", "ruby_html": "38.<ruby>筆者<rt>ひっしゃ</rt></ruby>によると、「<ruby>個性<rt>こせい</rt></ruby>を<ruby>磨く<rt>みがく</rt></ruby>」ために<ruby>必要<rt>ひつよう</rt></ruby>なことは<ruby>何か<rt>なにか</rt></ruby>。\n。A.<ruby>他人<rt>たにん</rt></ruby>に<ruby>負け<rt>まけ</rt></ruby>ないような<ruby>特別<rt>とくべつ</rt></ruby>なスキルを<ruby>身に<rt>みに</rt></ruby>つけること\nつけることB. <ruby>社会<rt>しゃかい</rt></ruby>の<ruby>期待<rt>きたい</rt></ruby>に<ruby>応え<rt>こたえ</rt></ruby>るような<ruby>立派<rt>りっぱ</rt></ruby>な<ruby>人間<rt>にんげん</rt></ruby>になること\nになることC. <ruby>自分<rt>じぶん</rt></ruby>の<ruby>心<rt>こころ</rt></ruby>から<ruby>楽しい<rt>たのしい</rt></ruby>と<ruby>思え<rt>おもえ</rt></ruby>ることを<ruby>優先<rt>ゆうせん</rt></ruby>して<ruby>行動<rt>こうどう</rt></ruby>すること\nすることD. <ruby>周囲<rt>しゅうい</rt></ruby>の<ruby>人々<rt>ひとびと</rt></ruby>と<ruby>積極的に<rt>せっきょくてきに</rt></ruby><ruby>関わ<rt>かかわ</rt></ruby>って<ruby>視野<rt>しや</rt></ruby>を<ruby>広げ<rt>ひろげ</rt></ruby>ること", "translation_cn": "38.作者认为，“提高一个人的个性”需要什么？ A. 获得不被别人超越的特殊技能 B. 成为一个不辜负社会期望的优秀人 C. 优先考虑自己真正喜欢的事情 D. 积极与周围的人交往，开阔视野"}, {"number": 39, "answer": "D", "body": "39. 文中の「このプロセス」 とは何か。\nA.他人と比較しながら自分の欠点を見つけるプロセス\nB. 社会のルールに従って行動するプロセス\nC. 他人の意見を参考にして自分の個性を確立するプロセス\nD. 内面から湧き上がる欲求や好奇心によって行動するプロセス", "ruby_html": "39. <ruby>文中<rt>ぶんちゅう</rt></ruby>の「このプロセス」 とは<ruby>何か<rt>なにか</rt></ruby>。\n。A.<ruby>他人<rt>たにん</rt></ruby>と<ruby>比較<rt>ひかく</rt></ruby>しながら<ruby>自分<rt>じぶん</rt></ruby>の<ruby>欠点<rt>けってん</rt></ruby>を<ruby>見つ<rt>みつ</rt></ruby>けるプロセス\nプロセスB. <ruby>社会<rt>しゃかい</rt></ruby>のルールに<ruby>従って<rt>したがって</rt></ruby><ruby>行動<rt>こうどう</rt></ruby>するプロセス\nプロセスC. <ruby>他人<rt>たにん</rt></ruby>の<ruby>意見<rt>いけん</rt></ruby>を<ruby>参考<rt>さんこう</rt></ruby>にして<ruby>自分<rt>じぶん</rt></ruby>の<ruby>個性<rt>こせい</rt></ruby>を<ruby>確立<rt>かくりつ</rt></ruby>するプロセス\nプロセスD. <ruby>内面<rt>ないめん</rt></ruby>から<ruby>湧き<rt>わき</rt></ruby><ruby>上が<rt>あが</rt></ruby>る<ruby>欲求<rt>よっきゅう</rt></ruby>や<ruby>好奇心<rt>こうきしん</rt></ruby>によって<ruby>行動<rt>こうどう</rt></ruby>するプロセス", "translation_cn": "39.句子中的“这个过程”是什么意思？ A. 与他人比较时发现自己缺点的过程 B. 按照社会规则行事的过程 C. 通过参考他人的意见来确立自己个性的过程 D. 基于内心产生的欲望和好奇心而行动的过程"}, {"number": 40, "answer": "C", "body": "40. この文章で筆者が最も伝えたいことは何か。\nA. 若者はもっと社会に対して自分の意見を主張すべきだ。\nB .個 性を磨くためには、専門的な教育を受ける必要がある。\nC .個 性とは外見ではなく、内面から自然に表れるものである。\nD. 他人との比較を通して、自分の個性に気づくことができる。", "ruby_html": "40. この<ruby>文章<rt>ぶんしょう</rt></ruby>で<ruby>筆者<rt>ひっしゃ</rt></ruby>が<ruby>最も<rt>もっとも</rt></ruby><ruby>伝え<rt>つたえ</rt></ruby>たいことは<ruby>何か<rt>なにか</rt></ruby>。\n。A. <ruby>若者<rt>わかもの</rt></ruby>はもっと<ruby>社会<rt>しゃかい</rt></ruby>に<ruby>対し<rt>たいし</rt></ruby>て<ruby>自分<rt>じぶん</rt></ruby>の<ruby>意見<rt>いけん</rt></ruby>を<ruby>主張<rt>しゅちょう</rt></ruby>すべきだ。\n。B .<ruby>個<rt>こ</rt></ruby> <ruby>性<rt>せい</rt></ruby>を<ruby>磨く<rt>みがく</rt></ruby>ためには、<ruby>専門的<rt>せんもんてき</rt></ruby>な<ruby>教育<rt>きょういく</rt></ruby>を<ruby>受ける<rt>うける</rt></ruby><ruby>必要<rt>ひつよう</rt></ruby>がある。\n。C .<ruby>個<rt>こ</rt></ruby> <ruby>性<rt>せい</rt></ruby>とは<ruby>外見<rt>がいけん</rt></ruby>ではなく、<ruby>内面<rt>ないめん</rt></ruby>から<ruby>自然<rt>しぜん</rt></ruby>に<ruby>表れ<rt>あらわれ</rt></ruby>るものである。\n。D. <ruby>他人<rt>たにん</rt></ruby>との<ruby>比較<rt>ひかく</rt></ruby>を<ruby>通し<rt>とうし</rt></ruby>て、<ruby>自分<rt>じぶん</rt></ruby>の<ruby>個性<rt>こせい</rt></ruby>に<ruby>気づ<rt>きづ</rt></ruby>くことができる。", "translation_cn": "40.作者在这段话中最想表达的是什么？ A. 年轻人应该更多地向社会表达自己的意见。 B.为了磨练你的个性，你需要接受专门的教育。 C.个性是从内部自然显现出来的，而不是从外部显现出来的。 D、通过与他人的比较，你可以认识到自己的个性。"}, {"number": 41, "answer": "C", "body": "寒さが増す季節、暖かい布団から出るのが難しくなる冬がやってきました。私は冬が好きです が、特に夜の星空には心惹かれます。故郷は自然豊かな場所で、山々と広大な田んぼや畑に 41 お り、その風景はまるで『となりのト卜口』に登場する 42 大自然です。そして何よりも自慢でき るのが、澄み切った冬の夜空。無数の星たちが瞬く様子は、本当に素晴らしい 43 です。\n高校進学を機に上京した私44 、 この美しい星空を見られる機会は帰省時のみになりました。東 京では街中を彩るネオンサビル群の灯りによって満たされていて、それもまた魅力的ですが、長 野で見る星空には敵わないと思っています。\n今年で東京生活三年目の冬を迎え、不思議にも感じます。それまでとは異なり、少しだけ東京 でも星が多く見える45ま した。その理由は「節電」でした。この影響で街全体が少し暗くなり、 その結果として星空が 46 見えるようになったのでしょう。\n私は考えます。もし日本中、多くの人々が感動する 47 美しい星空を見ることになれば、人々 は 48 頻繁にそれをのぞむでしょう。そして、その願いから街明かりも徐々に減退して 49\nと思います。それによって今私たち自身だけではなく、未来世代への美しい夜空も守れることで しよう。一人でも多くの人々にこの素晴らしい星空を体験し、それについて 50 と強く願ってい ます。\n\n41.A. しずまれて B. こめて C.かこまれて D. うなずいて", "ruby_html": "<ruby>寒さ<rt>さむさ</rt></ruby>が<ruby>増す<rt>ます</rt></ruby><ruby>季節<rt>きせつ</rt></ruby>、<ruby>暖かい<rt>あたたかい</rt></ruby><ruby>布団<rt>ふとん</rt></ruby>から<ruby>出る<rt>でる</rt></ruby>のが<ruby>難しく<rt>むずかしく</rt></ruby>なる<ruby>冬<rt>ふゆ</rt></ruby>がやってきました。<ruby>私<rt>わたし</rt></ruby>は<ruby>冬<rt>ふゆ</rt></ruby>が<ruby>好き<rt>すき</rt></ruby>です が、<ruby>特に<rt>とくに</rt></ruby><ruby>夜<rt>よる</rt></ruby>の<ruby>星空<rt>ほしぞら</rt></ruby>には<ruby>心<rt>こころ</rt></ruby><ruby>惹か<rt>ひか</rt></ruby>れます。<ruby>故郷は<rt>ふるさとは</rt></ruby><ruby>自然<rt>しぜん</rt></ruby><ruby>豊か<rt>ゆたか</rt></ruby>な<ruby>場所<rt>ばしょ</rt></ruby>で、<ruby>山々<rt>やまやま</rt></ruby>と<ruby>広大<rt>こうだい</rt></ruby>な<ruby>田んぼ<rt>たんぼ</rt></ruby>や<ruby>畑<rt>はたけ</rt></ruby>に 41 お り、その<ruby>風景<rt>ふうけい</rt></ruby>はまるで『となりのト<ruby>卜<rt>ぼく</rt></ruby><ruby>口<rt>くち</rt></ruby>』に<ruby>登場<rt>とうじょう</rt></ruby>する 42 <ruby>大自然<rt>だいしぜん</rt></ruby>です。そして<ruby>何<rt>なに</rt></ruby>よりも<ruby>自慢<rt>じまん</rt></ruby>でき るのが、<ruby>澄み<rt>すみ</rt></ruby><ruby>切っ<rt>きっ</rt></ruby>た<ruby>冬<rt>ふゆ</rt></ruby>の< 人是马”，简称“老人是马”。这句谚语51有深刻的教训。这个故事的主角是一位住在中国城堡附近村庄的老人。他唯一的资产是一匹马，他和他唯一的儿子住在一起。但有一天，那匹珍贵的马跑掉了。村民们赶紧围过来安慰老人，说：“很难受。”但老人却平静地说：53，“不，不，这可能是好事的开始。”几天后，马不仅回来了，还带来了54匹更好的马。村民们又聚集在一起，欢欣鼓舞地说：“太好了！”但老人又回答：“不，不，这可能是坏事的开始。”后来，我儿子骑一匹喜欢的新马时，摔了一跤，摔断了腿。村民们又来同情他，说：“真是一场灾难！”但老人说：“不，不，这可能是一件好事。”过了一会儿，57发生了，许多年轻人被制服了。在许多情况下，他们没有活下来而是死了。然而，祖父的儿子是唯一腿部受伤的人，因此无法加入士兵并幸存下来。从这个故事中你可以了解到，乍一看不吉利的事情可能会带来好运，反之亦然。我认为“Seo ga Uma”教会了我们不要根据情况变得过于情绪化，并像60岁的祖父一样从有尊严的角度看待生活的重要性。请牢记这一教训，灵活、冷静地对待你的日常生活。六十号天空"}]}], "grammarNotes": [{"jp": "ため", "kana": "ため", "cn": "原因/目的。阅读中要看前后句判断“因为”还是“为了”。"}, {"jp": "ように", "kana": "ように", "cn": "目的、样态或比喻。接可能/ない形时常表示目的。"}, {"jp": "によって", "kana": "によって", "cn": "依据、手段、原因，或随对象变化。"}, {"jp": "にとって", "kana": "にとって", "cn": "对……来说，后面多接评价判断。"}, {"jp": "として", "kana": "として", "cn": "作为……，表示身份、资格、立场。"}, {"jp": "だけでなく", "kana": "だけでなく", "cn": "不仅……而且……，常与「も」呼应。"}, {"jp": "わけではない", "kana": "わけではない", "cn": "并不是……，部分否定。"}, {"jp": "かもしれない", "kana": "かもしれない", "cn": "也许/可能，表示不确定推量。"}, {"jp": "ことがある", "kana": "ことがある", "cn": "有时会……；「たことがある」表示经历。"}, {"jp": "てしまう", "kana": "てしまう", "cn": "完成、遗憾、失误或不可控结果。"}, {"jp": "てくれる", "kana": "てくれる", "cn": "别人为我方做，或某事给我方带来益处。"}, {"jp": "ながら", "kana": "ながら", "cn": "一边……一边……；也可表示逆接。"}, {"jp": "ば", "kana": "ば", "cn": "条件形，如果……。"}, {"jp": "ても", "kana": "ても", "cn": "即使……也……。"}, {"jp": "思いがち", "kana": "おもいがち", "cn": "「动词ます形/名词 + がち」表示容易出现某种倾向，多用于负面或偏向性的状态；「思いがち」就是“容易以为/往往认为”。"}, {"jp": "とは限らない", "kana": "とはかぎらない", "cn": "表示“不一定……/未必……”。常用于纠正绝对化判断，如「理解できているとは限らない」= 未必真的理解了。"}, {"jp": "読み取る", "kana": "よみとる", "cn": "复合动词，表示从文字、表情、背景等信息中“读出、领会、理解”。阅读题中常指把隐含信息理解出来。"}, {"jp": "余裕がなくなり", "kana": "よゆうがなくなり", "cn": "「余裕がある/ない」表示有/没有从容、余地；「なくなり」表示变化成没有，句中指“变得没有余力/从容”。"}, {"jp": "見落として", "kana": "みおとして", "cn": "「見落とす」表示看漏、忽略。本句常用于说明因为先入为主而忽略关键内容。"}, {"jp": "受け止める", "kana": "うけとめる", "cn": "复合动词。「受ける」+「止める」，原义是接住、挡住；抽象用法表示“认真接受、理解、消化”对方的话或情绪。"}, {"jp": "受け止め", "kana": "うけとめ", "cn": "「受け止める」的连用形。句中「より深く受け止める」表示更深入地理解、接纳对方的话。"}, {"jp": "引き出す", "kana": "ひきだす", "cn": "复合动词。「引く」+「出す」，表示拉出来、引出；抽象用法表示把能力、反应、想法等激发出来。"}, {"jp": "思い込む", "kana": "おもいこむ", "cn": "复合动词。「思う」+「込む」，表示深信、认定、想当然地以为。常带有主观判断过强的语感。"}, {"jp": "思い込むこと", "kana": "おもいこむこと", "cn": "名词化表达，表示“认定这件事/想当然地以为”。阅读中常用于指出错误认知。"}, {"jp": "汲み取る", "kana": "くみとる", "cn": "复合动词。原义是舀取水；抽象用法表示体会、理解、领会对方的心情或意图。"}, {"jp": "汲み取れて", "kana": "くみとれて", "cn": "「汲み取る」的可能形「汲み取れる」接て形，表示“能够领会/能够体会”。否定常见为「汲み取れていない」。"}, {"jp": "見直す", "kana": "みなおす", "cn": "复合动词。「見る」+「直す」，表示重新看、重新审视、重新评价。文中「状態を見直す」= 重新审视自己的状态。"}, {"jp": "見直すこと", "kana": "みなおすこと", "cn": "把「見直す」名词化，表示“重新审视这件事”。常作主语或宾语。"}, {"jp": "つもり", "kana": "つもり", "cn": "用法1：表示打算、计划，如「行くつもりだ」= 打算去。用法2：表示自以为、自己认为，如「聞けているつもり」= 自以为听懂了。阅读中常考第二种。"}, {"jp": "聞けているつもり", "kana": "きけているつもり", "cn": "「动词可能形ている + つもり」表示“自以为已经能……”。这里指自以为已经听懂，但实际可能没有真正理解。"}, {"jp": "あちこち", "kana": "あちこち", "cn": "副词/代词，表示“到处、这儿那儿”。文中「あちこちで聞こえる」= 到处都能听到。"}, {"jp": "目が覚める", "kana": "めがさめる", "cn": "惯用表达，表示“醒来、清醒过来”。也可用于比喻突然醒悟。"}, {"jp": "目が覚め", "kana": "めがさめ", "cn": "「目が覚める」的连用形。文中「静電気で目が覚める」表示因为静电而醒来。"}, {"jp": "思わず", "kana": "おもわず", "cn": "副词，表示“不由得、禁不住”。强调不是有意识地做，而是自然反应。"}, {"jp": "出来事", "kana": "できごと", "cn": "名词，表示“事件、事情”。常指生活中发生的一件事。"}, {"jp": "たびに", "kana": "たびに", "cn": "接动词辞书形或名词+の，表示“每当……就……”。如「上着を脱ぐたびに」= 每次脱外套时。"}, {"jp": "軽く跳ね", "kana": "かるくはね", "cn": "「軽く」表示轻轻地、稍微；「跳ねる」表示跳起、弹起。文中指粉笔灰轻轻弹起。"}, {"jp": "跳ね", "kana": "はね", "cn": "「跳ねる」的连用形，表示跳起、弹起、飞溅。"}, {"jp": "かえって", "kana": "かえって", "cn": "副词，表示“反而、却”。用于结果与预想相反的情况。"}, {"jp": "ぼそっと", "kana": "ぼそっと", "cn": "拟态副词，表示小声嘟囔、低声说话的样子。"}, {"jp": "ぱっと", "kana": "ぱっと", "cn": "拟态副词，表示突然、一下子、迅速明亮起来。文中「ぱっと明るくなる」指气氛一下子明朗。"}, {"jp": "くだらない", "kana": "くだらない", "cn": "形容词，表示无聊的、无价值的、不正经的。文中「くだらない冗談」是轻松的小玩笑。"}, {"jp": "思い出して", "kana": "おもいだして", "cn": "「思い出す」的て形，表示想起、回忆起。"}, {"jp": "思い出し", "kana": "おもいだし", "cn": "「思い出す」的连用形，表示想起、回忆。"}, {"jp": "むしろ", "kana": "むしろ", "cn": "副词，表示“倒不如说、反而”。用于提出与前面预期不同或更合适的判断。"}, {"jp": "心当たり", "kana": "こころあたり", "cn": "名词，表示“线索、头绪、想得到的相关情况”。「心当たりの方」= 有线索/知道情况的人。"}, {"jp": "見入った", "kana": "みいった", "cn": "「見入る」的た形，表示看得入神、凝视。文中指被便条内容吸引而仔细看。"}, {"jp": "わけではない", "kana": "わけではない", "cn": "表示“不一定……/并不是……”。「必ず持ち主が見つかるわけではない」= 并不一定能找到失主。"}, {"jp": "当たり前", "kana": "あたりまえ", "cn": "名词/な形容词，表示理所当然、普通、应该如此。文中指很多人把拾物上交视作理所当然。"}, {"jp": "しばらく", "kana": "しばらく", "cn": "副词，表示一会儿、暂时、片刻。文中「しばらく迷っていた」= 犹豫了一会儿。"}, {"jp": "歩き出した", "kana": "あるきだした", "cn": "复合动词「歩く+出す」的过去形，表示开始走、迈步走出。"}, {"jp": "思いやる", "kana": "おもいやる", "cn": "动词，表示体谅、关怀、替别人着想。文中「見えない他人を思いやる」= 体谅看不见的他人。"}, {"jp": "さえ", "kana": "さえ", "cn": "副助词，表示“连……都”或最低条件；在「自分さえ良ければ」中表示“只要自己好就行”。"}, {"jp": "自分さえ良ければ", "kana": "じぶんさえよければ", "cn": "固定感很强的表达，表示“只要自己方便/自己好就行”，带有自私、只顾自己的语气。"}, {"jp": "目立ち始めている", "kana": "めだちはじめている", "cn": "复合表达「动词ます形+始める」表示开始……；「ている」表示这种趋势正在持续。即“开始变得显眼/突出”。"}, {"jp": "炎上につながる", "kana": "えんじょうにつながる", "cn": "「炎上」指网络上批评集中、舆论爆发；「につながる」表示导致、引发。即“引发舆论争议”。"}, {"jp": "見つめ直す", "kana": "みつめなおす", "cn": "复合动词，表示重新凝视、重新审视。比「見直す」更强调认真面对自身行为或问题。"}, {"jp": "上り切る", "kana": "のぼりきる", "cn": "复合动词。「切る」作补助动词表示彻底完成；「上り切る」= 完全登上、走到楼梯顶。"}, {"jp": "上り切るころ", "kana": "のぼりきるころ", "cn": "表示“快/刚走到顶的时候”。「ころ」表示大致时间点。"}, {"jp": "振り返った", "kana": "ふりかえった", "cn": "「振り返る」的过去形，表示回头看；也可表示回顾。文中是再次回头看便条。"}, {"jp": "名もなき", "kana": "なもなき", "cn": "连体表达，表示无名的、不知名的。文中「名もなき善意」= 无名的善意。"}, {"jp": "よみがえる", "kana": "よみがえる", "cn": "动词，表示复苏、重新浮现。用于记忆时表示“回想起来、浮现在脑海中”。"}, {"jp": "受け入れ", "kana": "うけいれ", "cn": "「受け入れる」的连用形/名词化，表示接受、接纳。文中「広く受け入れられた」= 被广泛接受。"}, {"jp": "受け入れられた", "kana": "うけいれられた", "cn": "「受け入れる」的被动态过去形，表示“被接受了”。"}, {"jp": "によれば", "kana": "によれば", "cn": "表示信息来源或判断依据，“据……说/根据……”。常用于引用专家、资料、报道。"}, {"jp": "落ち着き", "kana": "おちつき", "cn": "名词，表示安定、平静、沉稳。文中「落ち着きを与える」= 给人安定感。"}, {"jp": "てしまう", "kana": "てしまう", "cn": "表示动作完成、遗憾结果或不由自主发生；如「優先してしまう」带有“无意中就优先了”的语感。"}, {"jp": "ようになる", "kana": "ようになる", "cn": "表示状态变化，“变得会……/开始……”。常接动词基本形或可能形。"}, {"jp": "なければならない", "kana": "なければならない", "cn": "必须……。由否定条件构成，语气较正式。"}, {"jp": "こそ", "kana": "こそ", "cn": "强调助词，“正是……才……”。用于突出关键对象或原因。"}, {"jp": "ほど", "kana": "ほど", "cn": "表示程度，“到……程度”；也可构成「AほどB」比较句。"}], "furigana": [["円滑", "えんかつ"], ["錯覚", "さっかく"], ["価値観", "かちかん"], ["無意識", "むいしき"], ["静電気", "せいでんき"], ["乾燥", "かんそう"], ["衝突", "しょうとつ"], ["雰囲気", "ふんいき"], ["想像力", "そうぞうりょく"], ["公共空間", "こうきょうくうかん"], ["善意", "ぜんい"], ["香り", "かおり"], ["嗅覚", "きゅうかく"], ["大脳辺縁系", "だいのうへんえんけい"], ["自律神経", "じりつしんけい"], ["言葉", "ことば"], ["距離", "きょり"], ["感謝", "かんしゃ"], ["励まし", "はげまし"], ["責任", "せきにん"], ["星空", "ほしぞら"], ["節電", "せつでん"], ["個性", "こせい"], ["内面", "ないめん"], ["馬", "うま"], ["冷静", "れいせい"], ["戦争", "せんそう"], ["徴兵", "ちょうへい"], ["現金", "げんきん"]]};
    let exam = DATA.exams[0], qno = 1;
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function mark(s) {
      let out = esc(s);
      DATA.furigana.forEach(([w,k]) => out = out.replaceAll(esc(w), `<ruby>${esc(w)}<rt>${esc(k)}</rt></ruby>`));
      DATA.grammarNotes.forEach(n => out = out.replaceAll(esc(n.jp), `<span class="grammar" title="${esc(n.cn)}">${esc(n.jp)}</span>`));
      return out;
    }
    function qPage(n) {
      const approx = Math.max(1, Math.min(exam.pages.length, Math.ceil(n / (exam.id === 'henan' ? 15 : 6))));
      return exam.pages[approx - 1] || exam.pages[0];
    }
    function renderShell() {
      navTitle.textContent = exam.title; title.textContent = exam.title; sub.textContent = '共60题；答案表完整校验；阅读文本已做假名标注和语法高亮。';
      examTabs.innerHTML = DATA.exams.map(e => `<button class="exam-tab ${e.id===exam.id?'active':''}" data-exam="${e.id}">${esc(e.title)}</button>`).join('');
      qnav.innerHTML = Array.from({length:60}, (_,i)=>`<button class="qbtn ${i+1===qno?'active':''}" data-q="${i+1}">${i+1}</button>`).join('');
      const paperPages = exam.paperPages || exam.pages;
      paperScroller.innerHTML = paperPages.map(p => `<div class="paper-page-label">第 ${p.page} 页</div><img class="paper" src="${p.image}" alt="原卷第 ${p.page} 页">`).join('');
    }
    function renderQuestion() {
      const q = exam.questions.find(x => x.number === qno);
      qTitle.textContent = `第 ${qno} 题`;
      qAnswer.textContent = `答案：${q.answer}`;
      qBody.innerHTML = q.ruby_html || mark(q.body);
      qCn.textContent = q.translation_cn || '（暂无中文翻译）';
      pageLabel.textContent = '可滚动查看整卷';
      const hits = DATA.grammarNotes.filter(n => q.body.includes(n.jp));
      currentGrammar.innerHTML = hits.length
        ? hits.map(n => `<div class="grammar-item"><b>${esc(n.jp)}（${esc(n.kana)}）</b><br>${esc(n.cn)}</div>`).join('')
        : '<div class="hint">当前题暂未匹配到重点语法。阅读题请切换到该组首题查看原文中的语法点。</div>';
      qnav.querySelectorAll('.qbtn').forEach(b => b.classList.toggle('active', Number(b.dataset.q)===qno));
    }
    function renderOtherViews() {
      const paperPages = exam.paperPages || exam.pages;
      paperView.innerHTML = paperPages.map(p => `<div class="panel"><div class="head"><h2>原卷第 ${p.page} 页</h2></div><div class="body"><img class="paper" src="${p.image}"></div></div>`).join('');
      answersView.innerHTML = `<div class="panel" style="grid-column:1/-1"><div class="head"><h2>1-60 答案对应表</h2></div><div class="body"><div class="answers">${exam.questions.map(q=>`<div class="answer">${q.number}：${esc(q.answer)}</div>`).join('')}</div></div></div><div class="panel" style="grid-column:1/-1"><div class="head"><h2>答案解析文本</h2></div><div class="body"><div class="jp">${mark(exam.answerText)}</div></div></div>`;
      grammarView.innerHTML = `<div class="panel" style="grid-column:1/-1"><div class="head"><h2>重点语法讲解</h2></div><div class="body">${DATA.grammarNotes.map(n=>`<div class="note"><b>${esc(n.jp)}（${esc(n.kana)}）</b><br>${esc(n.cn)}</div>`).join('')}</div></div>`;
    }
    function renderAll() { renderShell(); renderQuestion(); renderOtherViews(); }
    document.addEventListener('click', e => {
      const eb = e.target.closest('[data-exam]'); if (eb) { exam = DATA.exams.find(x=>x.id===eb.dataset.exam); qno=1; renderAll(); return; }
      const qb = e.target.closest('[data-q]'); if (qb) { qno=Number(qb.dataset.q); renderQuestion(); return; }
      const tb = e.target.closest('[data-view]'); if (tb) {
        document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b===tb));
        ['question','paper','answers','grammar'].forEach(v=>document.getElementById(v+'View').classList.toggle('hidden', v!==tb.dataset.view));
      }
    });
    renderAll();
  </script>
</body>
</html>
